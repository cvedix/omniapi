# API endpoint: /v1/core/groups
# Tag: Groups

/v1/core/groups:
  get:
    summary: List all groups
    description: 'Returns a list of all groups with summary information including group name, description, instance count,
      and metadata.


      The response includes:

      - Total count of groups

      - Number of default groups

      - Number of custom groups

      - Summary information for each group (ID, name, description, instance count, etc.)


      This endpoint is useful for getting an overview of all groups in the system without fetching detailed information for
      each one.

      '
    operationId: listGroups
    tags:
    - Groups
    responses:
      '200':
        description: List of groups
        content:
          application/json:
            schema:
              type: object
              properties:
                groups:
                  type: array
                  items:
                    $ref: '#/components/schemas/GroupInfo'
                total:
                  type: integer
                  description: Total number of groups
                default:
                  type: integer
                  description: Number of default groups
                custom:
                  type: integer
                  description: Number of custom groups
            example:
              total: 2
              default: 0
              custom: 2
              groups:
              - groupId: cameras
                groupName: Security Cameras
                description: Group for security camera instances
                instanceCount: 3
                isDefault: false
                readOnly: false
              - groupId: test
                groupName: Test Group
                description: Group for testing
                instanceCount: 1
                isDefault: false
                readOnly: false
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Create a new group
    description: 'Creates a new group for organizing instances. Groups help organize and manage multiple instances together.


      **Group Properties:**

      - **groupId** (required): Unique identifier for the group (alphanumeric, underscores, hyphens only)

      - **groupName** (optional): Display name for the group (defaults to groupId if not provided)

      - **description** (optional): Description of the group''s purpose


      **Validation:**

      - Group ID must be unique

      - Group ID must match pattern: `^[A-Za-z0-9_-]+$`

      - Group name must match pattern: `^[A-Za-z0-9 -_]+$`


      **Persistence:**

      - Groups are automatically saved to storage

      - Group files are stored in `/var/lib/edgeos-api/groups` (configurable via `GROUPS_DIR` environment variable)


      **Returns:** The created group information including timestamps.

      '
    operationId: createGroup
    tags:
    - Groups
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateGroupRequest'
          example:
            groupId: cameras
            groupName: Security Cameras
            description: Group for security camera instances
    responses:
      '201':
        description: Group created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupInfo'
      '400':
        description: Bad request (validation failed or group already exists)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for groups
    operationId: listGroupsOptions
    tags:
    - Groups
    responses:
      '200':
        description: CORS preflight response
