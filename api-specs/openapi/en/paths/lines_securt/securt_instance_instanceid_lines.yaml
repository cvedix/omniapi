# API endpoint: /v1/securt/instance/{instanceId}/lines
# Tag: Lines SecuRT

/v1/securt/instance/{instanceId}/lines:
  get:
    summary: Get analytics lines for SecuRT instance
    description: Returns all analytics lines configured for a SecuRT instance. This includes crossing lines, counting lines,
      and tailgating lines.
    operationId: getSecuRTLines
    tags:
    - Lines SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '200':
        description: Analytics lines retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                crossing:
                  type: array
                  description: Crossing lines
                  items:
                    type: object
                counting:
                  type: array
                  description: Counting lines
                  items:
                    type: object
                tailgating:
                  type: array
                  description: Tailgating lines
                  items:
                    type: object
            example:
              crossing: []
              counting: []
              tailgating: []
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Delete all lines for SecuRT instance
    description: Deletes all analytics lines for a SecuRT instance
    operationId: deleteAllSecuRTLines
    tags:
    - Lines SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '204':
        description: All lines deleted successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for lines
    operationId: getSecuRTLinesOptions
    tags:
    - Lines SecuRT
    responses:
      '200':
        description: CORS preflight response
