# API endpoint: /v1/securt/instance/{instanceId}/line/{lineId}
# Tag: Lines SecuRT

/v1/securt/instance/{instanceId}/line/{lineId}:
  delete:
    summary: Delete line by ID
    description: Deletes a specific line by its ID
    operationId: deleteLine
    tags:
    - Lines SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    - name: lineId
      in: path
      required: true
      schema:
        type: string
      description: Line ID
    responses:
      '204':
        description: Line deleted successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance or line not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for line by ID
    operationId: deleteLineOptions
    tags:
    - Lines SecuRT
    responses:
      '200':
        description: CORS preflight response
