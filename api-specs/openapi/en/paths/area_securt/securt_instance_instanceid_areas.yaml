# API endpoint: /v1/securt/instance/{instanceId}/areas
# Tag: Area SecuRT

/v1/securt/instance/{instanceId}/areas:
  get:
    summary: Get analytics areas for SecuRT instance
    description: Returns all analytics areas configured for a SecuRT instance. This includes crossing areas, intrusion areas,
      loitering areas, crowding areas, occupancy areas, crowd estimation areas, dwelling areas, armed person areas, object
      left areas, object removed areas, fallen person areas, vehicle guard areas (experimental), and face covered areas (experimental).
    operationId: getSecuRTAreas
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '200':
        description: Analytics areas retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                crossing:
                  type: array
                  description: Crossing areas
                  items:
                    $ref: '#/components/schemas/CrossingAreaRead'
                intrusion:
                  type: array
                  description: Intrusion areas
                  items:
                    $ref: '#/components/schemas/IntrusionAreaRead'
                loitering:
                  type: array
                  description: Loitering areas
                  items:
                    $ref: '#/components/schemas/LoiteringAreaRead'
                crowding:
                  type: array
                  description: Crowding areas
                  items:
                    $ref: '#/components/schemas/CrowdingAreaRead'
                occupancy:
                  type: array
                  description: Occupancy areas
                  items:
                    $ref: '#/components/schemas/OccupancyAreaRead'
                crowdEstimation:
                  type: array
                  description: Crowd estimation areas
                  items:
                    $ref: '#/components/schemas/CrowdEstimationAreaRead'
                dwelling:
                  type: array
                  description: Dwelling areas
                  items:
                    $ref: '#/components/schemas/DwellingAreaRead'
                armedPerson:
                  type: array
                  description: Armed person areas
                  items:
                    $ref: '#/components/schemas/ArmedPersonAreaRead'
                objectLeft:
                  type: array
                  description: Object left areas
                  items:
                    $ref: '#/components/schemas/ObjectLeftAreaRead'
                objectRemoved:
                  type: array
                  description: Object removed areas
                  items:
                    $ref: '#/components/schemas/ObjectRemovedAreaRead'
                fallenPerson:
                  type: array
                  description: Fallen person areas
                  items:
                    $ref: '#/components/schemas/FallenPersonAreaRead'
                vehicleGuard:
                  type: array
                  description: Vehicle guard areas (experimental)
                  items:
                    $ref: '#/components/schemas/VehicleGuardAreaRead'
                faceCovered:
                  type: array
                  description: Face covered areas (experimental)
                  items:
                    $ref: '#/components/schemas/FaceCoveredAreaRead'
            example:
              crossing: []
              intrusion: []
              loitering: []
              crowding: []
              occupancy: []
              crowdEstimation: []
              dwelling: []
              armedPerson: []
              objectLeft: []
              objectRemoved: []
              fallenPerson: []
              vehicleGuard: []
              faceCovered: []
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for areas
    operationId: getSecuRTAreasOptions
    tags:
    - Area SecuRT
    responses:
      '200':
        description: CORS preflight response
  delete:
    summary: Delete all areas for SecuRT instance
    description: Deletes all analytics areas for a SecuRT instance
    operationId: deleteAllSecuRTAreas
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '204':
        description: All areas deleted successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
