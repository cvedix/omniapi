# API endpoint: /v1/onvif/cameras
# Tag: ONVIF

/v1/onvif/cameras:
  get:
    summary: Get all discovered ONVIF cameras
    description: 'Retrieve a list of all ONVIF cameras that have been discovered on the network.

      **Camera Information:** - Each camera includes IP address, UUID, manufacturer, model, and serial number - Cameras are
      filtered based on whitelist support (if configured) - Only cameras that pass whitelist validation are returned

      **Usage:** 1. First call POST /v1/onvif/discover to discover cameras 2. Then call this endpoint to retrieve the list
      of discovered cameras 3. Use the camera ID (IP or UUID) to get streams or set credentials '
    operationId: getONVIFCameras
    tags:
    - ONVIF
    responses:
      '200':
        description: List of discovered ONVIF cameras
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ONVIFCamera'
            example:
            - ip: 192.168.1.100
              uuid: 00000000-0000-0000-0000-000000000000
              manufacturer: Hikvision
              model: DS-2CD2347G1-LU
              serialNumber: ABC123456
            - ip: 192.168.1.101
              uuid: 11111111-1111-1111-1111-111111111111
              manufacturer: Axis
              model: P3245-LVE
              serialNumber: DEF789012
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for ONVIF cameras
    operationId: getONVIFCamerasOptions
    tags:
    - ONVIF
    responses:
      '200':
        description: CORS preflight response
