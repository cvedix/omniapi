# API endpoint: /v1/onvif/streams/{cameraid}
# Tag: ONVIF

/v1/onvif/streams/{cameraid}:
  get:
    summary: Get streams for an ONVIF camera
    description: 'Retrieve available video streams for a specific ONVIF camera.

      **Camera ID:** - Can be either the camera IP address (e.g., "192.168.1.100") or UUID - IP address format: 0-255.0-255.0-255.0-255

      **Stream Information:** - Each stream includes profile token, resolution (width/height), frame rate (fps), and RTSP
      URI - Streams are retrieved using ONVIF Media service - Camera credentials must be set before retrieving streams (if
      authentication is required)

      **Usage:** 1. Discover cameras using POST /v1/onvif/discover 2. Get camera list using GET /v1/onvif/cameras 3. Set credentials
      using POST /v1/onvif/camera/{cameraid}/credentials (if needed) 4. Get streams using this endpoint '
    operationId: getONVIFStreams
    tags:
    - ONVIF
    parameters:
    - name: cameraid
      in: path
      required: true
      schema:
        type: string
      description: Camera identifier (IP address or UUID)
      example: 192.168.1.100
    responses:
      '200':
        description: List of available streams for the camera
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ONVIFStream'
            example:
            - token: Profile_1
              width: 1920
              height: 1080
              fps: 30
              uri: rtsp://192.168.1.100:554/Streaming/Channels/101
            - token: Profile_2
              width: 640
              height: 480
              fps: 15
              uri: rtsp://192.168.1.100:554/Streaming/Channels/102
      '400':
        description: Bad request (missing or invalid camera ID)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Camera not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for ONVIF streams
    operationId: getONVIFStreamsOptions
    tags:
    - ONVIF
    responses:
      '200':
        description: CORS preflight response
