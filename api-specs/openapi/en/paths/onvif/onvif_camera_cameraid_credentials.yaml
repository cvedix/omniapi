# API endpoint: /v1/onvif/camera/{cameraid}/credentials
# Tag: ONVIF

/v1/onvif/camera/{cameraid}/credentials:
  post:
    summary: Set credentials for an ONVIF camera
    description: 'Set authentication credentials for a specific ONVIF camera.

      **Camera ID:** - Can be either the camera IP address (e.g., "192.168.1.100") or UUID - IP address format: 0-255.0-255.0-255.0-255

      **Credentials:** - Username and password are required - Credentials are stored securely and used for subsequent ONVIF
      operations - If camera is not found, a suggestion may be provided if a similar IP is detected

      **Usage:** 1. Discover cameras using POST /v1/onvif/discover 2. Get camera list using GET /v1/onvif/cameras 3. Set credentials
      using this endpoint 4. Get streams using GET /v1/onvif/streams/{cameraid} '
    operationId: setONVIFCredentials
    tags:
    - ONVIF
    parameters:
    - name: cameraid
      in: path
      required: true
      schema:
        type: string
      description: Camera identifier (IP address or UUID)
      example: 192.168.1.100
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ONVIFCredentialsRequest'
          example:
            username: admin
            password: password123
    responses:
      '204':
        description: Credentials set successfully
      '400':
        description: Bad request (missing username or password, invalid JSON)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Camera not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for ONVIF credentials
    operationId: setONVIFCredentialsOptions
    tags:
    - ONVIF
    responses:
      '200':
        description: CORS preflight response
