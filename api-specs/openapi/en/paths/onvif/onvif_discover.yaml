# API endpoint: /v1/onvif/discover
# Tag: ONVIF

/v1/onvif/discover:
  post:
    summary: Discover ONVIF cameras
    description: 'Discover ONVIF cameras on the network using WS-Discovery protocol.

      This endpoint initiates an asynchronous discovery process that searches for ONVIF-compliant cameras on the local network.

      **Timeout Parameter:** - Optional query parameter `timeout` (1-30 seconds, default: 5) - Controls how long to wait for
      camera responses during discovery

      **Response:** - Returns 204 No Content when discovery is initiated - Use GET /v1/onvif/cameras to retrieve discovered
      cameras after discovery completes '
    operationId: discoverONVIFCameras
    tags:
    - ONVIF
    parameters:
    - name: timeout
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 30
        default: 5
      description: 'Discovery timeout in seconds (1-30, default: 5)'
      example: 5
    responses:
      '204':
        description: Discovery process started successfully
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for ONVIF discovery
    operationId: discoverONVIFCamerasOptions
    tags:
    - ONVIF
    responses:
      '200':
        description: CORS preflight response
