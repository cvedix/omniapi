# API endpoint: /v1/core/instance/{instanceId}/stops
# Tag: Area Core

/v1/core/instance/{instanceId}/stops:
  get:
    summary: Get all stop zones
    description: 'Returns all stop zones configured for a ba_stop instance.

      Stop zones are used to detect objects that stop inside a defined ROI in the video stream.

      '
    operationId: getAllStops
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    responses:
      '200':
        description: List of stop zones
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopsResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Create one or more stop zones
    description: 'Creates one or more stop zones for a ba_stop instance.


      **Request Format:**

      - Single zone: Send a single object (CreateStopRequest)

      - Multiple zones: Send an array of objects [CreateStopRequest, ...]


      **Real-time Update:** Stop zones require instance restart to apply changes.

      '
    operationId: createStop
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/CreateStopRequest'
            - type: array
              items:
                $ref: '#/components/schemas/CreateStopRequest'
          examples:
            singleZone:
              summary: Single stop zone (object)
              value:
                name: Stop Zone 1
                roi:
                - x: 100.0
                  y: 100.0
                - x: 200.0
                  y: 100.0
                - x: 200.0
                  y: 200.0
                min_stop_seconds: 3
                check_interval_frames: 20
                check_min_hit_frames: 50
                check_max_distance: 5
            multipleZones:
              summary: Multiple stop zones (array)
              value:
              - name: Stop Zone A
                roi:
                - x: 0
                  y: 0
                - x: 100
                  y: 0
                - x: 100
                  y: 100
                min_stop_seconds: 3
                check_interval_frames: 20
                check_min_hit_frames: 50
                check_max_distance: 5
              - name: Stop Zone B
                roi:
                - x: 50
                  y: 50
                - x: 150
                  y: 50
                - x: 150
                  y: 150
                min_stop_seconds: 3
                check_interval_frames: 20
                check_min_hit_frames: 50
                check_max_distance: 5
    responses:
      '201':
        description: Zone(s) created successfully. Returns single zone object for single request, or object with metadata
          for array request.
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/StopZone'
              - type: object
                properties:
                  message:
                    type: string
                    example: Stops created successfully
                  count:
                    type: integer
                    example: 2
                  stops:
                    type: array
                    items:
                      $ref: '#/components/schemas/StopZone'
      '400':
        description: Bad request (invalid coordinates or parameters)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Delete all stop zones
    description: 'Deletes all stop zones for a ba_stop instance.


      **Real-time Update:** Changes require instance restart.

      '
    operationId: deleteAllStops
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{Stop}'
    responses:
      '200':
        description: All stops deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: All stops deleted successfully
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for stops endpoints
    operationId: stopsOptions
    tags:
    - Area Core
    responses:
      '200':
        description: CORS preflight response
