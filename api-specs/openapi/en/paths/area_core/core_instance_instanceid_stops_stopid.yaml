# API endpoint: /v1/core/instance/{instanceId}/stops/{stopId}
# Tag: Area Core

/v1/core/instance/{instanceId}/stops/{stopId}:
  get:
    summary: Get a specific stop zone
    description: 'Returns a specific stop zone by ID for a ba_stop instance.

      '
    operationId: getStop
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    - name: stopId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the stop zone to retrieve
      example: '{stopId}'
    responses:
      '200':
        description: Stop zone retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopZone'
      '404':
        description: Instance or stop zone not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Update a specific stop zone
    description: 'Updates a specific stop zone by ID for a ba_stop instance.


      **Real-time Update:** Changes require instance restart.

      '
    operationId: updateStop
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    - name: stopId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the stop zone to update
      example: '{stopId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateStopRequest'
  delete:
    summary: Delete a specific stop zone
    description: 'Deletes a specific stop zone by ID for a ba_stop instance.


      **Real-time Update:** Changes require instance restart.

      '
    operationId: deleteStop
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    - name: stopId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the stop zone to delete
      example: '{stopId}'
    responses:
      '200':
        description: Stop zone deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Stop deleted successfully
      '404':
        description: Instance or stop zone not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for stops detail endpoint
    operationId: stopOptions
    tags:
    - Area Core
    responses:
      '200':
        description: CORS preflight response
