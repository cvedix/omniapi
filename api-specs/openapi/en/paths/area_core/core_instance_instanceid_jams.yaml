# API endpoint: /v1/core/instance/{instanceId}/jams
# Tag: Area Core

/v1/core/instance/{instanceId}/jams:
  get:
    summary: Get all jam zones
    description: 'Returns all jam zones configured for a ba_jam instance. Jam zones define ROIs where traffic congestion detection
      is performed.

      '
    operationId: getAllJams
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    responses:
      '200':
        description: List of jam zones
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JamsResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Create one or more jam zones
    description: 'Creates one or more jam zones for a ba_jam instance. Jam zones are used to detect traffic congestion within
      a specified ROI.


      **Request Format:**

      - Single zone: Send a single object (CreateJamRequest)

      - Multiple zones: Send an array of objects [CreateJamRequest, ...]


      **Real-time Update:** Zones are applied to the running instance when possible; otherwise, a restart will be triggered.

      '
    operationId: createJam
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/CreateJamRequest'
            - type: array
              items:
                $ref: '#/components/schemas/CreateJamRequest'
          examples:
            singleJam:
              summary: Single jam zone (object)
              value:
                name: Downtown Jam Zone
                roi:
                - x: 0
                  y: 100
                - x: 1920
                  y: 100
                - x: 1920
                  y: 400
                - x: 0
                  y: 400
                check_interval_frames: 20
                check_min_hit_frames: 50
                check_max_distance: 8
                check_min_stops: 8
                check_notify_interval: 10
            multipleJams:
              summary: Multiple jam zones (array)
              value:
              - name: Downtown Jam Zone
                roi:
                - x: 0
                  y: 100
                - x: 1920
                  y: 100
                - x: 1920
                  y: 400
                - x: 0
                  y: 400
                check_interval_frames: 20
                check_min_hit_frames: 50
                check_max_distance: 8
                check_min_stops: 8
                check_notify_interval: 10
              - name: Uptown Jam Zone
                roi:
                - x: 100
                  y: 200
                - x: 500
                  y: 200
                - x: 500
                  y: 400
                - x: 100
                  y: 400
                check_interval_frames: 20
                check_min_hit_frames: 50
                check_max_distance: 8
                check_min_stops: 8
                check_notify_interval: 10
    responses:
      '201':
        description: Zone(s) created successfully. Returns single zone object for single request, or object with metadata
          for array request.
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/JamZone'
              - $ref: '#/components/schemas/CreateJamsResponse'
      '400':
        description: Bad request (invalid ROI or parameters)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Delete all jam zones
    description: 'Deletes all jam zones for a ba_jam instance.


      **Real-time Update:** Zones are removed from the running instance when possible; otherwise, a restart will be triggered.

      '
    operationId: deleteAllJams
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{Downtown}'
    responses:
      '200':
        description: All zones deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: All jam zones deleted successfully
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for jams endpoints
    operationId: jamsOptions
    tags:
    - Area Core
    responses:
      '200':
        description: CORS preflight response
