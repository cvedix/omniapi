# API endpoint: /v1/securt/instance/{instanceId}/lpr
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/lpr:
  post:
    summary: Set license plate recognition (LPR)
    description: Enable or disable license plate recognition for a SecuRT instance
    operationId: setLPR
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enable
            properties:
              enable:
                type: boolean
                description: Enable license plate recognition
                example: true
    responses:
      '204':
        description: LPR configured successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  get:
    summary: Get license plate recognition (LPR) configuration
    description: Get LPR configuration for a SecuRT instance
    operationId: getLPR
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '200':
        description: LPR configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                enable:
                  type: boolean
                  description: LPR enabled status
                  example: true
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for LPR
    operationId: lprOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
