# API endpoint: /v1/securt/instance/{instanceId}/stats
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/stats:
  get:
    summary: Get SecuRT instance statistics
    description: Returns statistics for a SecuRT instance including frame rate, latency, frames processed, track count, and
      running status.
    operationId: getSecuRTInstanceStats
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '200':
        description: Statistics retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecuRTInstanceStats'
            example:
              startTime: 1704067200000
              frameRate: 30.5
              latency: 33.2
              framesProcessed: 91500
              trackCount: 5
              isRunning: true
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for stats
    operationId: getSecuRTInstanceStatsOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
