# API endpoint: /v1/securt/experimental/instance/{instanceId}/surrender_detection
# Tag: SecuRT Instance

/v1/securt/experimental/instance/{instanceId}/surrender_detection:
  post:
    summary: Set surrender detection (Experimental)
    description: 'Enable or disable surrender detection for a SecuRT instance.

      **Note:** This is an experimental feature and may be subject to change.
      '
    operationId: setSurrenderDetection
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enable
            properties:
              enable:
                type: boolean
                description: Enable surrender detection
                example: true
    responses:
      '204':
        description: Surrender detection configured successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  get:
    summary: Get surrender detection configuration (Experimental)
    description: 'Get surrender detection configuration for a SecuRT instance.

      **Note:** This is an experimental feature and may be subject to change.
      '
    operationId: getSurrenderDetection
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '200':
        description: Surrender detection configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: Surrender detection enabled status
                  example: true
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for surrender detection
    operationId: surrenderDetectionOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
