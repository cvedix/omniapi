# API endpoint: /v1/securt/instance
# Tag: SecuRT Instance

/v1/securt/instance:
  post:
    summary: Create a new SecuRT instance
    description: Creates a new SecuRT instance with the provided configuration. The instance ID will be auto-generated if
      not provided.
    operationId: createSecuRTInstance
    tags:
    - SecuRT Instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecuRTInstanceWrite'
          example:
            name: My SecuRT Instance
            detectorMode: SmartDetection
            detectionSensitivity: Low
            movementSensitivity: Low
            sensorModality: RGB
            frameRateLimit: 0
            metadataMode: false
            statisticsMode: false
            diagnosticsMode: false
            debugMode: false
    responses:
      '201':
        description: Instance created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                instanceId:
                  type: string
                  description: The ID of the created instance
                  example: securt-instance-123
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Instance already exists or creation failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for create instance
    operationId: createSecuRTInstanceOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
