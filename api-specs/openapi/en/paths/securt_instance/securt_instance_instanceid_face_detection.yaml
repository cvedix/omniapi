# API endpoint: /v1/securt/instance/{instanceId}/face_detection
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/face_detection:
  post:
    summary: Set face detection
    description: Enable or disable face detection for a SecuRT instance
    operationId: setFaceDetection
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enable
            properties:
              enable:
                type: boolean
                description: Enable face detection
                example: true
    responses:
      '204':
        description: Face detection configured successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for face detection
    operationId: faceDetectionOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
