# API endpoint: /v1/securt/instance/{instanceId}/performance_profile
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/performance_profile:
  post:
    summary: Set performance profile
    description: Configure performance profile for a SecuRT instance
    operationId: setPerformanceProfile
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - profile
            properties:
              profile:
                type: string
                enum:
                - Performance
                - Balanced
                - Quality
                description: Performance profile name
                example: Balanced
    responses:
      '204':
        description: Performance profile configured successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  get:
    summary: Get performance profile
    description: Get configured performance profile for a SecuRT instance
    operationId: getPerformanceProfile
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '200':
        description: Performance profile configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                profile:
                  type: string
                  enum:
                  - Performance
                  - Balanced
                  - Quality
                  description: Current performance profile
                  example: Balanced
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for performance profile
    operationId: performanceProfileOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
