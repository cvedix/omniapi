# API endpoint: /v1/securt/instance/{instanceId}/feature_extraction
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/feature_extraction:
  post:
    summary: Set feature extraction
    description: Configure feature extraction types for a SecuRT instance
    operationId: setFeatureExtraction
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - types
            properties:
              types:
                type: array
                items:
                  type: string
                description: Array of feature extraction types
                example:
                - face
                - body
    responses:
      '204':
        description: Feature extraction configured successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  get:
    summary: Get feature extraction
    description: Get configured feature extraction types for a SecuRT instance
    operationId: getFeatureExtraction
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '200':
        description: Feature extraction configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                types:
                  type: array
                  items:
                    type: string
                  description: Array of configured feature extraction types
                  example:
                  - face
                  - body
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for feature extraction
    operationId: featureExtractionOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
