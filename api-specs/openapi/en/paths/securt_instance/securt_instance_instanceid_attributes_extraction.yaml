# API endpoint: /v1/securt/instance/{instanceId}/attributes_extraction
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/attributes_extraction:
  post:
    summary: Set attributes extraction
    description: Configure attributes extraction for a SecuRT instance
    operationId: setAttributesExtraction
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              enabled:
                type: boolean
                description: Enable attributes extraction
                example: true
              attributes:
                type: array
                items:
                  type: string
                description: Array of attributes to extract
                example:
                - age
                - gender
                - clothing
    responses:
      '204':
        description: Attributes extraction configured successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  get:
    summary: Get attributes extraction
    description: Get configured attributes extraction for a SecuRT instance
    operationId: getAttributesExtraction
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    responses:
      '200':
        description: Attributes extraction configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                attributes:
                  type: array
                  items:
                    type: string
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for attributes extraction
    operationId: attributesExtractionOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
