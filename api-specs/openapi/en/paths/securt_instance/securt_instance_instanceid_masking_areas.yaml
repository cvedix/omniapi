# API endpoint: /v1/securt/instance/{instanceId}/masking_areas
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/masking_areas:
  post:
    summary: Set masking areas
    description: Configure masking areas for a SecuRT instance to hide certain regions from processing
    operationId: setMaskingAreas
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - areas
            properties:
              areas:
                type: array
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      x:
                        type: number
                      y:
                        type: number
                description: Array of masking area polygons, each polygon is an array of coordinates
                example:
                - - x: 0
                    y: 0
                  - x: 100
                    y: 0
                  - x: 100
                    y: 100
                  - x: 0
                    y: 100
    responses:
      '204':
        description: Masking areas configured successfully
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for masking areas
    operationId: maskingAreasOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: CORS preflight response
