# API endpoint: /hls/{instanceId}/segment_{segmentId}.ts
# Tag: Core

/hls/{instanceId}/segment_{segmentId}.ts:
  get:
    summary: Get HLS segment
    description: 'Get HLS video segment file (.ts) for an instance.

      This endpoint serves individual video segment files that are referenced in the HLS playlist.
      Segments are generated automatically when HLS output is enabled for an instance.
      '
    operationId: getHlsSegment
    tags:
    - Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID
    - name: segmentId
      in: path
      required: true
      schema:
        type: string
      description: Segment ID (e.g., "0", "1", "2")
    responses:
      '200':
        description: HLS video segment file
        content:
          video/mp2t:
            schema:
              type: string
              format: binary
      '404':
        description: Instance not found, HLS not enabled, or segment not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
