# API endpoint: /v1/core/system/preferences
# Tag: Core

/v1/core/system/preferences:
  get:
    summary: Get system preferences
    description: Returns system preferences from rtconfig.json. These settings affect VMS plugins UI and Web Panel.
    operationId: coreGetPreferencesV1
    tags:
    - Core
    responses:
      '200':
        description: System preferences
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemPreferencesResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for system preferences
    operationId: coreSystemPreferencesOptions
    tags:
    - Core
    responses:
      '200':
        description: CORS preflight response
