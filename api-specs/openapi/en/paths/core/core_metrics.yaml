# API endpoint: /v1/core/metrics
# Tag: Core

/v1/core/metrics:
  get:
    summary: Get Prometheus format metrics
    description: 'Returns system metrics in Prometheus format for monitoring and alerting.

      This endpoint is typically used by Prometheus scrapers.

      '
    operationId: getMetrics
    tags:
    - Core
    responses:
      '200':
        description: Prometheus format metrics
        content:
          text/plain:
            schema:
              type: string
              description: Metrics in Prometheus text format
              example: '# HELP http_requests_total Total number of HTTP requests

                # TYPE http_requests_total counter

                http_requests_total{method="GET",path="/v1/core/health"} 100

                '
