# API endpoint: /v1/core/system/decoders
# Tag: Core

/v1/core/system/decoders:
  get:
    summary: Get available system decoders
    description: Returns information about available hardware and software decoders in the system
    operationId: coreGetDecodersV1
    tags:
    - Core
    responses:
      '200':
        description: Decoder information
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemDecodersResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for system decoders
    operationId: coreSystemDecodersOptions
    tags:
    - Core
    responses:
      '200':
        description: CORS preflight response
