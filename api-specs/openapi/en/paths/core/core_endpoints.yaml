# API endpoint: /v1/core/endpoints
# Tag: Core

/v1/core/endpoints:
  get:
    summary: Get endpoint statistics
    description: 'Returns statistics for each API endpoint including request counts, response times,

      error rates, and other performance metrics.

      '
    operationId: getEndpointsStats
    tags:
    - Core
    responses:
      '200':
        description: Endpoint statistics
        content:
          application/json:
            schema:
              type: object
              description: Statistics for each endpoint
              additionalProperties: true
