# API endpoint: /v1/core/video/{videoName}
# Tag: Video

/v1/core/video/{videoName}:
  put:
    summary: Rename a video file
    description: 'Renames a video file on the server.

      You can specify a subdirectory using the `directory` query parameter if the file is in a subdirectory.

      '
    operationId: renameVideo
    tags:
    - Video
    parameters:
    - name: videoName
      in: path
      required: true
      schema:
        type: string
      description: Current name of the video file to rename
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Subdirectory path where the video file is located (e.g., "projects/myproject/videos", "users/user123").

        If not specified, the file is assumed to be in the base videos directory.

        '
      example: projects/myproject/videos
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - newName
            properties:
              newName:
                type: string
                description: New name for the video file (must have valid video file extension)
                example: my_video_v2.mp4
    responses:
      '200':
        description: Video file renamed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                oldName:
                  type: string
                newName:
                  type: string
                path:
                  type: string
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Video file not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: New name already exists
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Delete a video file
    description: 'Deletes a video file from the server.

      You can specify a subdirectory using the `directory` query parameter if the file is in a subdirectory.

      '
    operationId: deleteVideo
    tags:
    - Video
    parameters:
    - name: videoName
      in: path
      required: true
      schema:
        type: string
      description: Name of the video file to delete
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Subdirectory path where the video file is located (e.g., "projects/myproject/videos", "users/user123").

        If not specified, the file is assumed to be in the base videos directory.

        '
      example: projects/myproject/videos
    responses:
      '200':
        description: Video file deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                filename:
                  type: string
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Video file not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
