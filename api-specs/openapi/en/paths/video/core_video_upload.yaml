# API endpoint: /v1/core/video/upload
# Tag: Video

/v1/core/video/upload:
  post:
    summary: Upload a video file
    description: 'Uploads a video file (MP4, AVI, MKV, etc.) to the server.

      The file will be saved in the videos directory. You can specify a subdirectory

      using the `directory` query parameter (e.g., `projects/myproject/videos`).

      If the directory doesn''t exist, it will be created automatically.

      If no directory is specified, files will be saved in the base videos directory.

      '
    operationId: uploadVideo
    tags:
    - Video
    parameters:
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Subdirectory path where the video file should be saved.

        Use forward slashes to separate directory levels (e.g., "projects/myproject/videos", "users/user123", "category1/subcategory").

        The directory will be created automatically if it doesn''t exist.

        If not specified, files will be saved in the base videos directory.

        '
      example: projects/myproject/videos
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              files:
                type: array
                items:
                  type: string
                  format: binary
                description: Video file(s) to upload. Select multiple files to upload at once (.mp4, .avi, .mkv, .mov, .flv,
                  .wmv, .webm, etc.)
              file:
                type: string
                format: binary
                description: Single video file to upload (alternative to files array)
        application/octet-stream:
          schema:
            type: string
            format: binary
            description: Video file as binary data
    responses:
      '201':
        description: Video file(s) uploaded successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                count:
                  type: integer
                  description: Number of files uploaded successfully
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                      originalFilename:
                        type: string
                      path:
                        type: string
                      size:
                        type: integer
                      url:
                        type: string
                warnings:
                  type: array
                  items:
                    type: string
                  description: Warnings for files that failed to upload
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: File already exists
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for video upload
    operationId: uploadVideoOptions
    tags:
    - Video
    responses:
      '200':
        description: CORS preflight response
