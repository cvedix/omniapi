# API endpoint: /v1/core/ai/metrics
# Tag: AI

/v1/core/ai/metrics:
  get:
    summary: Get AI processing metrics
    description: 'Returns detailed metrics about AI processing including performance statistics,

      cache statistics, and rate limiter information.

      '
    operationId: getAIMetrics
    tags:
    - AI
    responses:
      '200':
        description: AI processing metrics
        content:
          application/json:
            schema:
              type: object
              properties:
                cache:
                  type: object
                  properties:
                    size:
                      type: integer
                      format: int64
                      description: Current cache size
                    max_size:
                      type: integer
                      format: int64
                      description: Maximum cache capacity
                    hit_rate:
                      type: number
                      format: float
                      description: Cache hit rate (0.0 to 1.0)
                rate_limiter:
                  type: object
                  properties:
                    total_keys:
                      type: integer
                      format: int64
                      description: Total number of rate limit keys
                    active_keys:
                      type: integer
                      format: int64
                      description: Number of active rate limit keys
