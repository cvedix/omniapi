# API endpoint: /v1/core/instance/batch/restart
# Tag: Instances

/v1/core/instance/batch/restart:
  post:
    summary: Restart multiple instances concurrently
    description: Restarts multiple instances concurrently by stopping and then starting them. All operations run in parallel
      for optimal performance.
    operationId: batchRestartInstances
    tags:
    - Instances
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - instanceIds
            properties:
              instanceIds:
                type: array
                items:
                  type: string
                description: Array of instance IDs to restart
                example:
                - instance-1
                - instance-2
                - instance-3
    responses:
      '200':
        description: Batch restart operation completed
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    type: object
                    properties:
                      instanceId:
                        type: string
                      success:
                        type: boolean
                      status:
                        type: string
                      running:
                        type: boolean
                      error:
                        type: string
                total:
                  type: integer
                success:
                  type: integer
                failed:
                  type: integer
                message:
                  type: string
            example:
              results:
              - instanceId: instance-1
                success: true
                status: restarted
                running: true
              - instanceId: instance-2
                success: false
                status: failed
                error: Could not restart instance. Check if instance exists and has a pipeline.
              total: 2
              success: 1
              failed: 1
              message: Batch restart operation completed
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for batch restart
    operationId: batchRestartInstancesOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
