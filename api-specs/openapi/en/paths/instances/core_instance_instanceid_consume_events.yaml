# API endpoint: /v1/core/instance/{instanceId}/consume_events
# Tag: Instances

/v1/core/instance/{instanceId}/consume_events:
  get:
    summary: Consume events from instance
    description: 'Consumes events from the instance event queue. Events are published by the instance processing pipeline
      and can be consumed via this endpoint.

      **Event Format:** - Each event has a `dataType` (e.g., "detection", "tracking", "analytics") and a `jsonObject` (JSON
      serialized string) - Events follow the schema at https://bin.cvedia.com/schema/

      **Behavior:** - Returns all available events from the queue - Events are removed from the queue after consumption -
      Returns 204 No Content if no events are available - Returns 200 OK with array of events if events are available'
    operationId: coreConsumeEventsV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    responses:
      '200':
        description: Events retrieved successfully
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  dataType:
                    type: string
                    description: Event data type (e.g., "detection", "tracking", "analytics")
                  jsonObject:
                    type: string
                    description: JSON serialized string containing event data
            example:
            - dataType: detection
              jsonObject: '{"timestamp": "2024-01-01T00:00:00Z", "objects": []}'
            - dataType: tracking
              jsonObject: '{"timestamp": "2024-01-01T00:00:01Z", "tracks": []}'
      '204':
        description: No events available
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for consume events endpoint
    operationId: consumeEventsOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
