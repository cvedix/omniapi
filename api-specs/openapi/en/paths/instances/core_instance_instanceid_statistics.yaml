# API endpoint: /v1/core/instance/{instanceId}/statistics
# Tag: Instances

/v1/core/instance/{instanceId}/statistics:
  get:
    summary: Get instance statistics
    description: 'Returns real-time statistics for a specific instance. Statistics include frames processed, framerate, latency,
      resolution, and queue information.


      **Statistics Include:**

      - Frames processed count

      - Source framerate (FPS from source)

      - Current framerate (processing FPS)

      - Average latency (milliseconds)

      - Input queue size

      - Dropped frames count

      - Resolution and format information

      - Source resolution


      **Important Notes:**

      - Statistics are calculated in real-time

      - Statistics reset to 0 when instance is restarted

      - Statistics are not persisted (only calculated when requested)

      - Instance must be running to get statistics

      '
    operationId: getStatistics
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID (UUID)
      example: '{instanceId}'
    responses:
      '200':
        description: Statistics retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceStatisticsResponse'
            example:
              frames_processed: 1250
              source_framerate: 30.0
              current_framerate: 25.5
              latency: 200.0
              start_time: 1764900520
              input_queue_size: 2
              dropped_frames_count: 5
              resolution: 1280x720
              format: BGR
              source_resolution: 1920x1080
      '404':
        description: Instance not found or not running
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Not found
              message: 'Instance not found or not running: a5204fc9-9a59-f80f-fb9f-bf3b42214943'
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for get statistics
    operationId: getStatisticsOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
