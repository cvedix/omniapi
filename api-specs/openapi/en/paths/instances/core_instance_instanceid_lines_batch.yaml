# API endpoint: /v1/core/instance/{instanceId}/lines/batch
# Tag: Instances

/v1/core/instance/{instanceId}/lines/batch:
  post:
    summary: Batch update crossing lines
    description: 'Update multiple crossing lines for a ba_crossline instance in a single request.

      This endpoint allows updating multiple crossing lines at once, which is more efficient than updating them individually.
      The instance will be restarted automatically to apply the changes if it is currently running.
      '
    operationId: batchUpdateLines
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
              - id
              - coordinates
              properties:
                id:
                  type: string
                  description: Line ID
                name:
                  type: string
                  description: Line name
                coordinates:
                  type: array
                  items:
                    type: object
                    properties:
                      x:
                        type: number
                      y:
                        type: number
                  minItems: 2
                  description: Line coordinates (at least 2 points)
                direction:
                  type: string
                  enum:
                  - bidirectional
                  - forward
                  - backward
                  description: Crossing direction
            example:
            - id: line1
              name: Main Line
              coordinates:
              - x: 0
                y: 50
              - x: 100
                y: 50
              direction: bidirectional
    responses:
      '200':
        description: Lines updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                updated:
                  type: integer
                  description: Number of lines updated
                  example: 2
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for batch update lines
    operationId: batchUpdateLinesOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
