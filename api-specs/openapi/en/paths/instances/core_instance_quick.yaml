# API endpoint: /v1/core/instance/quick
# Tag: Instances

/v1/core/instance/quick:
  post:
    summary: Create instance quickly
    description: 'Creates a new AI instance with simplified parameters. Automatically maps solution types to appropriate solution IDs and provides default values.

      This endpoint is designed for quick instance creation with minimal configuration. It accepts simplified parameters and automatically:
      - Maps solution types (e.g., "face_detection", "ba_crossline") to solution IDs
      - Provides default values for missing parameters
      - Converts development paths to production paths
      '
    operationId: createQuickInstance
    tags:
    - Instances
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - solutionType
            properties:
              name:
                type: string
                description: Instance display name
                example: My Quick Instance
              solutionType:
                type: string
                description: Solution type (e.g., "face_detection", "ba_crossline", "ba_jam", "ba_stop")
                example: face_detection
              group:
                type: string
                description: Instance group name
                example: default
              persistent:
                type: boolean
                description: Whether to persist instance configuration
                default: true
              autoStart:
                type: boolean
                description: Whether to automatically start the instance
                default: false
              input:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - file
                    - rtsp
                    - http
                    description: Input type
                  source:
                    type: string
                    description: Input source (file path, RTSP URL, etc.)
              inputType:
                type: string
                description: Input type (alternative to input.type)
              output:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - file
                    - rtmp
                    - http
                    description: Output type
                  destination:
                    type: string
                    description: Output destination
              outputType:
                type: string
                description: Output type (alternative to output.type)
    responses:
      '201':
        description: Instance created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceInfo'
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for quick instance
    operationId: createQuickInstanceOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
