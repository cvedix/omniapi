# API endpoint: /v1/core/instance/{instanceId}/classes
# Tag: Instances

/v1/core/instance/{instanceId}/classes:
  get:
    summary: Get instance classes
    description: Get the list of detection classes supported by the instance
    operationId: getInstanceClasses
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID (UUID)
    responses:
      '200':
        description: List of supported classes
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
              example:
              - person
              - car
              - bicycle
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
