# API endpoint: /v1/core/instance/{instanceId}/output/hls
# Tag: Instances

/v1/core/instance/{instanceId}/output/hls:
  post:
    summary: Configure HLS output for instance
    description: 'Enables or disables HLS (HTTP Live Streaming) output for an instance. When enabled, returns the URI of the
      HLS stream.

      **HLS Output:** - HLS stream is accessible via HTTP - Playlist file (.m3u8) is generated automatically - Video segments
      (.ts files) are generated automatically - Stream can be played in VLC, web browsers, or other HLS-compatible players'
    operationId: coreSetOutputHlsV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enabled
            properties:
              enabled:
                type: boolean
                description: Enable or disable HLS output
          examples:
            enableHls:
              summary: Enable HLS output
              value:
                enabled: true
            disableHls:
              summary: Disable HLS output
              value:
                enabled: false
    responses:
      '200':
        description: HLS output configured successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                uri:
                  type: string
                  description: HLS stream URI (e.g., http://localhost:8080/hls/{instanceId}/stream.m3u8)
                  example: http://localhost:8080/hls/{instanceId}/stream.m3u8
      '204':
        description: HLS output disabled successfully
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '406':
        description: Could not set HLS output
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for HLS output endpoint
    operationId: hlsOutputOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
