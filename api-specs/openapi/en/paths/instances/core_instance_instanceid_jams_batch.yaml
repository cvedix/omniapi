# API endpoint: /v1/core/instance/{instanceId}/jams/batch
# Tag: Instances

/v1/core/instance/{instanceId}/jams/batch:
  post:
    summary: Batch update jam zones
    description: 'Update multiple jam zones for a ba_jam instance in a single request.

      This endpoint allows updating multiple jam zones at once, which is more efficient than updating them individually.
      The instance will be restarted automatically to apply the changes if it is currently running.
      '
    operationId: batchUpdateJams
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
              - id
              - roi
              properties:
                id:
                  type: string
                  description: Jam zone ID
                name:
                  type: string
                  description: Jam zone name
                roi:
                  type: array
                  items:
                    type: object
                    properties:
                      x:
                        type: number
                      y:
                        type: number
                  description: Region of interest (polygon with at least 3 points)
                threshold:
                  type: number
                  description: Detection threshold
                maxCount:
                  type: integer
                  description: Maximum count threshold
            example:
            - id: jam1
              name: Zone 1
              roi:
              - x: 0
                y: 0
              - x: 100
                y: 0
              - x: 100
                y: 100
              - x: 0
                y: 100
    responses:
      '200':
        description: Jam zones updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                updated:
                  type: integer
                  description: Number of jam zones updated
                  example: 2
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for batch update jams
    operationId: batchUpdateJamsOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
