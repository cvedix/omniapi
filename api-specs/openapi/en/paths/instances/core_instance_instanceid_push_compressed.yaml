# API endpoint: /v1/core/instance/{instanceId}/push/compressed
# Tag: Instances

/v1/core/instance/{instanceId}/push/compressed:
  post:
    summary: Push compressed frame into instance
    description: 'Push a compressed frame (JPEG, PNG, BMP, etc.) into an instance for processing. The frame will be decoded
      using OpenCV and processed by the instance pipeline.

      **Supported Formats:** - JPEG/JPEG - PNG - BMP - TIFF - WebP - Other formats supported by OpenCV `imdecode()`

      **Request Format:** - Content-Type: `multipart/form-data` - Field `frame`: Binary compressed frame data - Field `timestamp`:
      int64 timestamp (optional, defaults to current time)

      The instance must be running to accept frames. Frames are queued and processed asynchronously. '
    operationId: corePostCompressedFrameV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of the instance (UUID)
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
            - frame
            properties:
              frame:
                type: string
                format: binary
                description: Compressed frame data (JPEG, PNG, BMP, etc.)
              timestamp:
                type: integer
                format: int64
                description: Frame timestamp in milliseconds (optional)
    responses:
      '204':
        description: Frame pushed successfully
      '400':
        description: Bad request (invalid frame data or missing required fields)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Instance is not currently running
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error (decode failure, queue full, etc.)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for push compressed frame
    operationId: pushCompressedFrameOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
