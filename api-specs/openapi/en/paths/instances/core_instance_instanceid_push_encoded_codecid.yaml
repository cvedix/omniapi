# API endpoint: /v1/core/instance/{instanceId}/push/encoded/{codecId}
# Tag: Instances

/v1/core/instance/{instanceId}/push/encoded/{codecId}:
  post:
    summary: Push encoded frame into instance
    description: 'Push an encoded frame (H.264/H.265) into an instance for processing. The frame will be decoded and processed
      by the instance pipeline.

      **Supported Codecs:** - `h264`: H.264/AVC - `h265`: H.265/HEVC - `hevc`: Alias for h265

      **Request Format:** - Content-Type: `multipart/form-data` - Field `frame`: Binary encoded frame data - Field `timestamp`:
      int64 timestamp (optional, defaults to current time)

      The instance must be running to accept frames. Frames are queued and processed asynchronously. '
    operationId: corePostEncodedFrameV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of the instance (UUID)
    - name: codecId
      in: path
      required: true
      schema:
        type: string
        enum:
        - h264
        - h265
        - hevc
      description: Codec identifier (h264, h265, or hevc)
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
            - frame
            properties:
              frame:
                type: string
                format: binary
                description: Encoded frame data (H.264/H.265)
              timestamp:
                type: integer
                format: int64
                description: Frame timestamp in milliseconds (optional)
    responses:
      '204':
        description: Frame pushed successfully
      '400':
        description: Bad request (unsupported codec, invalid frame data, or missing required fields)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Instance is not currently running
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error (decode failure, queue full, etc.)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for push encoded frame
    operationId: pushEncodedFrameOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
