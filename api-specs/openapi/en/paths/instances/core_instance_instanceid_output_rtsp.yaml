# API endpoint: /v1/core/instance/{instanceId}/output/rtsp
# Tag: Instances

/v1/core/instance/{instanceId}/output/rtsp:
  post:
    summary: Configure RTSP output for instance
    description: 'Enables or disables RTSP (Real-Time Streaming Protocol) output for an instance at the specified URI.

      **RTSP Output:** - RTSP stream can be accessed via RTSP clients (VLC, ffplay, etc.) - URI can be provided in request
      body or default will be used - Stream supports multiple RTSP clients simultaneously'
    operationId: coreSetOutputRtspV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enabled
            properties:
              enabled:
                type: boolean
                description: Enable or disable RTSP output
              uri:
                type: string
                description: RTSP URI (optional, default will be used if not provided)
                example: rtsp://localhost:8554/stream
          examples:
            enableRtsp:
              summary: Enable RTSP output with custom URI
              value:
                enabled: true
                uri: rtsp://localhost:8554/stream
            enableRtspDefault:
              summary: Enable RTSP output with default URI
              value:
                enabled: true
            disableRtsp:
              summary: Disable RTSP output
              value:
                enabled: false
    responses:
      '204':
        description: RTSP output configured successfully
      '400':
        description: Bad request (parsing error or invalid arguments)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for RTSP output endpoint
    operationId: rtspOutputOptions
    tags:
    - Instances
    responses:
      '200':
        description: CORS preflight response
