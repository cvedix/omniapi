# API endpoint: /v1/core/model/upload
# Tag: Models

/v1/core/model/upload:
  post:
    summary: Upload a model file
    description: 'Uploads a model file (ONNX, weights, etc.) to the server.

      The file will be saved in the models directory. You can specify a subdirectory

      using the `directory` query parameter (e.g., `projects/myproject/models`).

      If the directory doesn''t exist, it will be created automatically.

      If no directory is specified, files will be saved in the base models directory.

      '
    operationId: uploadModel
    tags:
    - Models
    parameters:
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Subdirectory path where the model file should be saved.

        Use forward slashes to separate directory levels (e.g., "projects/myproject/models", "detection/yolov8", "classification/resnet50").

        The directory will be created automatically if it doesn''t exist.

        If not specified, files will be saved in the base models directory.

        '
      example: projects/myproject/models
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              files:
                type: array
                items:
                  type: string
                  format: binary
                description: Model file(s) to upload. Select multiple files to upload at once (.onnx, .rknn, .weights, .cfg,
                  .pt, .pth, .pb, .tflite)
              file:
                type: string
                format: binary
                description: Single model file to upload (alternative to files array)
        application/octet-stream:
          schema:
            type: string
            format: binary
            description: Model file as binary data
    responses:
      '201':
        description: Model file(s) uploaded successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                count:
                  type: integer
                  description: Number of files uploaded successfully
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                      originalFilename:
                        type: string
                      path:
                        type: string
                      size:
                        type: integer
                      url:
                        type: string
                warnings:
                  type: array
                  items:
                    type: string
                  description: Warnings for files that failed to upload
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: File already exists
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for model upload
    operationId: uploadModelOptions
    tags:
    - Models
    responses:
      '200':
        description: CORS preflight response
