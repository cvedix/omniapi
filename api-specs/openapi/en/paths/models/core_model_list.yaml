# API endpoint: /v1/core/model/list
# Tag: Models

/v1/core/model/list:
  get:
    summary: List uploaded model files
    description: "Returns a list of model files that have been uploaded to the server.\n- If `directory` parameter is not\
      \ specified: Recursively searches and lists all model files\n  in the entire models directory tree (including all subdirectories).\n\
      - If `directory` parameter is specified: Lists only files in that specific directory\n  (non-recursive, does not search\
      \ subdirectories).\n"
    operationId: listModels
    tags:
    - Models
    parameters:
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Subdirectory path to list files from (e.g., "projects/myproject/models", "detection/yolov8").

        If specified, only lists files in that directory (non-recursive).

        If not specified, recursively searches all subdirectories.

        '
      example: projects/myproject/models
    responses:
      '200':
        description: List of model files
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                models:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                      path:
                        type: string
                      size:
                        type: integer
                      modified:
                        type: string
                count:
                  type: integer
                directory:
                  type: string
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
