# API endpoint: /v1/core/solution
# Tag: Solutions

/v1/core/solution:
  get:
    summary: List all solutions
    description: Returns a list of all available solutions with summary information including solution type and pipeline node
      count.
    operationId: listSolutions
    tags:
    - Solutions
    responses:
      '200':
        description: List of solutions
        content:
          application/json:
            schema:
              type: object
              properties:
                solutions:
                  type: array
                  items:
                    $ref: '#/components/schemas/SolutionSummary'
                total:
                  type: integer
                  description: Total number of solutions
                default:
                  type: integer
                  description: Number of default solutions
                custom:
                  type: integer
                  description: Number of custom solutions
            example:
              total: 2
              default: 1
              custom: 1
              solutions:
              - solutionId: face_detection
                solutionName: Face Detection
                solutionType: face_detection
                isDefault: true
                pipelineNodeCount: 3
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Create a new solution
    description: Creates a new custom solution configuration. Custom solutions can be modified and deleted, unlike default
      solutions.
    operationId: createSolution
    tags:
    - Solutions
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateSolutionRequest'
          example:
            solutionId: custom_face_detection
            solutionName: Custom Face Detection
            solutionType: face_detection
            pipeline:
            - nodeType: rtsp_src
              nodeName: source_{instanceId}
              parameters:
                url: rtsp://localhost/stream
            - nodeType: yunet_face_detector
              nodeName: detector_{instanceId}
              parameters:
                model_path: models/face/yunet.onnx
            - nodeType: file_des
              nodeName: output_{instanceId}
              parameters:
                output_path: /tmp/output
            defaults:
              RTSP_URL: rtsp://localhost/stream
    responses:
      '201':
        description: Solution created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolutionConfig'
      '400':
        description: Bad request (validation failed)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Solution already exists
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for solutions
    operationId: listSolutionsOptions
    tags:
    - Solutions
    responses:
      '200':
        description: CORS preflight response
