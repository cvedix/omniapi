# API endpoint: /v1/core/instance/{instanceId}/lines/{lineId}
# Tag: Lines Core

/v1/core/instance/{instanceId}/lines/{lineId}:
  get:
    summary: Get a specific crossing line
    description: 'Returns a specific crossing line by ID for a ba_crossline instance.

      '
    operationId: getLine
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    - name: lineId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the line to retrieve
      example: '{lineId}'
    responses:
      '200':
        description: Line retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrossingLine'
      '404':
        description: Instance or line not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Update a specific crossing line
    description: 'Updates a specific crossing line by ID for a ba_crossline instance.

      The line will be updated on the video stream and used for counting objects.


      **Real-time Update:** The line is immediately applied to the running video stream without requiring instance restart.

      '
    operationId: updateLine
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    - name: lineId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the line to update
      example: '{lineId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateLineRequest'
          examples:
            updateLine:
              summary: Update line coordinates and direction
              value:
                name: Updated Counting Line
                coordinates:
                - x: 200.0
                  y: 400.0
                - x: 700.0
                  y: 400.0
                direction: Up
                classes:
                - Person
                - Vehicle
                color:
                - 0
                - 255
                - 0
                - 255
    responses:
      '200':
        description: Line updated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrossingLine'
      '400':
        description: Bad request (invalid coordinates or parameters)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance or line not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Delete a specific crossing line
    description: 'Deletes a specific crossing line by ID.


      **Real-time Update:** The line is immediately removed from the running video stream without requiring instance restart.

      '
    operationId: deleteLine
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{Updated}'
    - name: lineId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the line to delete
      example: '{lineId}'
    responses:
      '200':
        description: Line deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Line deleted successfully
      '404':
        description: Instance or line not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for line endpoints
    operationId: lineOptions
    tags:
    - Lines Core
    responses:
      '200':
        description: CORS preflight response
