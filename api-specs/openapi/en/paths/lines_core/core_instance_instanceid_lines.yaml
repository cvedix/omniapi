# API endpoint: /v1/core/instance/{instanceId}/lines
# Tag: Lines Core

/v1/core/instance/{instanceId}/lines:
  get:
    summary: Get all crossing lines
    description: 'Returns all crossing lines configured for a ba_crossline instance.

      Lines are used for counting objects crossing a defined line in the video stream.

      '
    operationId: getAllLines
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    responses:
      '200':
        description: List of crossing lines
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinesResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Create one or more crossing lines
    description: 'Creates one or more crossing lines for a ba_crossline instance.

      The lines will be drawn on the video stream and used for counting objects.


      **Request Format:**

      - Single line: Send a single object (CreateLineRequest)

      - Multiple lines: Send an array of objects [CreateLineRequest, ...]


      **Real-time Update:** Lines are immediately applied to the running video stream without requiring instance restart.

      '
    operationId: createLine
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/CreateLineRequest'
            - type: array
              items:
                $ref: '#/components/schemas/CreateLineRequest'
          examples:
            singleLine:
              summary: Single line (object)
              value:
                name: Counting Line 1
                coordinates:
                - x: 100.0
                  y: 300.0
                - x: 600.0
                  y: 300.0
                direction: Both
                classes:
                - Person
                - Vehicle
                color:
                - 255
                - 0
                - 0
                - 255
            multipleLines:
              summary: Multiple lines (array)
              value:
              - name: Entry Line
                coordinates:
                - x: 0
                  y: 250
                - x: 700
                  y: 220
                direction: Up
                classes:
                - Vehicle
                color:
                - 255
                - 0
                - 0
                - 255
              - name: Exit Line
                coordinates:
                - x: 100
                  y: 400
                - x: 800
                  y: 380
                direction: Down
                classes:
                - Vehicle
                color:
                - 0
                - 255
                - 0
                - 255
    responses:
      '201':
        description: Line(s) created successfully. Returns single line object for single request, or object with metadata
          for array request.
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/CrossingLine'
              - type: object
                properties:
                  message:
                    type: string
                    example: Lines created successfully
                  count:
                    type: integer
                    example: 2
                  lines:
                    type: array
                    items:
                      $ref: '#/components/schemas/CrossingLine'
      '400':
        description: Bad request (invalid coordinates or parameters)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Delete all crossing lines
    description: 'Deletes all crossing lines for a ba_crossline instance.


      **Real-time Update:** Lines are immediately removed from the running video stream without requiring instance restart.

      '
    operationId: deleteAllLines
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the instance
      example: '{Counting}'
    responses:
      '200':
        description: All lines deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: All lines deleted successfully
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for lines endpoints
    operationId: linesOptions
    tags:
    - Lines Core
    responses:
      '200':
        description: CORS preflight response
