# API endpoint: /v1/core/node
# Tag: Node

/v1/core/node:
  get:
    summary: List all pre-configured nodes
    description: 'Returns a list of all pre-configured nodes in the node pool.

      Can be filtered by availability status and category.

      '
    operationId: listNodes
    tags:
    - Node
    parameters:
    - name: available
      in: query
      required: false
      schema:
        type: string
        enum:
        - 'true'
        - 'false'
        - '1'
        - '0'
      description: Filter to show only available (not in use) nodes
      example: 'true'
    - name: category
      in: query
      required: false
      schema:
        type: string
        enum:
        - source
        - detector
        - processor
        - destination
        - broker
      description: Filter nodes by category
      example: source
    responses:
      '200':
        description: List of nodes retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeListResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Create a new pre-configured node
    description: Creates a new pre-configured node from a template with specified parameters
    operationId: createNode
    tags:
    - Node
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateNodeRequest'
    responses:
      '201':
        description: Node created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeResponse'
      '400':
        description: Bad request (missing required fields or invalid parameters)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for nodes
    operationId: listNodesOptions
    tags:
    - Node
    responses:
      '200':
        description: CORS preflight response
