# API endpoint: /v1/core/node/preconfigured/available
# Tag: Node

/v1/core/node/preconfigured/available:
  get:
    summary: List available pre-configured nodes
    description: Get list of available (not in use) pre-configured nodes
    operationId: getAvailableNodes
    tags:
    - Node
    responses:
      '200':
        description: List of available pre-configured nodes
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: object
                total:
                  type: integer
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
