# API endpoint: /v1/core/node/template/{templateId}
# Tag: Node

/v1/core/node/template/{templateId}:
  get:
    summary: Get template details
    description: Returns detailed information about a specific node template
    operationId: getTemplate
    tags:
    - Node
    parameters:
    - name: templateId
      in: path
      required: true
      schema:
        type: string
      description: Unique template identifier
      example: rtsp_src_template
    responses:
      '200':
        description: Template details retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateResponse'
      '404':
        description: Template not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for template
    operationId: getTemplateOptions
    tags:
    - Node
    responses:
      '200':
        description: CORS preflight response
