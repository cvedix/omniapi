# API endpoint: /v1/core/node/template/{category}
# Tag: Node

/v1/core/node/template/{category}:
  get:
    summary: Get templates by category
    description: Get list of node templates filtered by category
    operationId: getTemplatesByCategory
    tags:
    - Node
    parameters:
    - name: category
      in: path
      required: true
      schema:
        type: string
      description: Template category
      example: detection
    responses:
      '200':
        description: List of templates in the category
        content:
          application/json:
            schema:
              type: object
              properties:
                templates:
                  type: array
                  items:
                    type: object
                total:
                  type: integer
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
