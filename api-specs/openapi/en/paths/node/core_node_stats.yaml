# API endpoint: /v1/core/node/stats
# Tag: Node

/v1/core/node/stats:
  get:
    summary: Get node pool statistics
    description: Returns statistics about the node pool including total templates, total nodes, available nodes, and nodes
      by category
    operationId: getNodeStats
    tags:
    - Node
    responses:
      '200':
        description: Statistics retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeStatsResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for stats
    operationId: getNodeStatsOptions
    tags:
    - Node
    responses:
      '200':
        description: CORS preflight response
