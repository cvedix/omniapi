# API endpoint: /v1/core/node/preconfigured
# Tag: Node

/v1/core/node/preconfigured:
  get:
    summary: List pre-configured nodes
    description: Get list of all pre-configured nodes in the node pool
    operationId: getPreConfiguredNodes
    tags:
    - Node
    responses:
      '200':
        description: List of pre-configured nodes
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: object
                total:
                  type: integer
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Create pre-configured node
    description: Create a new pre-configured node from a template
    operationId: createPreConfiguredNode
    tags:
    - Node
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - templateId
            properties:
              templateId:
                type: string
                description: Template ID to use for creating the node
              parameters:
                type: object
                additionalProperties:
                  type: string
                description: Node parameters
    responses:
      '201':
        description: Node created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId:
                  type: string
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
