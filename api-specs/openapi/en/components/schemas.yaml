# Component schemas
components:
  schemas:
    HealthResponse:
      type: object
      required:
      - status
      - timestamp
      - uptime
      properties:
        status:
          type: string
          enum:
          - healthy
          - degraded
          - unhealthy
          description: Health status of the service
          example: healthy
        timestamp:
          type: string
          format: date-time
          description: Current timestamp in ISO 8601 format
          example: '2024-01-01T00:00:00.000Z'
        uptime:
          type: integer
          format: int64
          description: Service uptime in seconds
          example: 3600
        service:
          type: string
          description: Service name
          example: omniapi
        version:
          type: string
          description: Service version
          example: 1.0.0
    StatusResponse:
      type: object
      required:
      - total
      - configured
      - running
      - stopped
      - timestamp
      properties:
        total:
          type: integer
          description: Total number of configured instances
          example: 5
        configured:
          type: integer
          description: Number of configured instances (same as total)
          example: 5
        running:
          type: integer
          description: Number of instances currently running
          example: 3
        stopped:
          type: integer
          description: Number of instances currently stopped
          example: 2
        timestamp:
          type: string
          format: date-time
          description: Current timestamp in ISO 8601 format
          example: '2024-01-01T00:00:00.000Z'
    VersionResponse:
      type: object
      required:
      - version
      - api_version
      - service
      properties:
        version:
          type: string
          description: Application version
          example: 1.0.0
        build_time:
          type: string
          description: Build timestamp
          example: Jan 01 2024 00:00:00
        git_commit:
          type: string
          description: Git commit hash
          example: abc123def456
        api_version:
          type: string
          description: API version
          example: v1
        service:
          type: string
          description: Service name
          example: omniapi
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: integer
          description: Error code
        message:
          type: string
          description: Detailed error message
    LogFileInfo:
      type: object
      required:
      - date
      - size
      - path
      properties:
        date:
          type: string
          format: date
          description: Date of the log file (YYYY-MM-DD)
          example: '2024-01-01'
        size:
          type: integer
          format: int64
          description: Size of the log file in bytes
          example: 1024
        path:
          type: string
          description: Full path to the log file
          example: /var/log/omniapi/api_2024-01-01.log
    LogFilesResponse:
      type: object
      required:
      - categories
      properties:
        categories:
          type: object
          description: Log files organized by category
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/LogFileInfo'
          example:
            api:
            - date: '2024-01-01'
              size: 1024
              path: /var/log/omniapi/api_2024-01-01.log
            instance:
            - date: '2024-01-01'
              size: 2048
              path: /var/log/omniapi/instance_2024-01-01.log
    LogEntry:
      type: object
      required:
      - timestamp
      - level
      - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: Log timestamp in ISO 8601 format
          example: '2024-01-01T12:00:00.000Z'
        level:
          type: string
          description: Log level (INFO, ERROR, WARNING, DEBUG, etc.)
          example: INFO
        message:
          type: string
          description: Log message
          example: API request received
    LogsResponse:
      type: object
      required:
      - category
      - category_dir
      - files_count
      - total_lines
      - filtered_lines
      - logs
      properties:
        category:
          type: string
          description: Log category
          example: api
        category_dir:
          type: string
          description: Directory path for this category
          example: /var/log/omniapi/api
        files_count:
          type: integer
          description: Number of log files in this category
          example: 1
        total_lines:
          type: integer
          description: Total number of log lines before filtering
          example: 1000
        filtered_lines:
          type: integer
          description: Number of log lines after filtering
          example: 500
        logs:
          type: array
          description: Array of log entries
          items:
            $ref: '#/components/schemas/LogEntry'
    LogsByDateResponse:
      type: object
      required:
      - category
      - date
      - total_lines
      - filtered_lines
      - logs
      properties:
        category:
          type: string
          description: Log category
          example: api
        date:
          type: string
          format: date
          description: Date of the log file (YYYY-MM-DD)
          example: '2024-01-01'
        total_lines:
          type: integer
          description: Total number of log lines before filtering
          example: 1000
        filtered_lines:
          type: integer
          description: Number of log lines after filtering
          example: 500
        logs:
          type: array
          description: Array of log entries
          items:
            $ref: '#/components/schemas/LogEntry'
    SetInputRequest:
      type: object
      required:
      - type
      - uri
      properties:
        type:
          type: string
          description: Type of input source (File = local video file path)
          enum:
          - File
          - RTSP
          - HLS
          - Manual
          example: File
        uri:
          type: string
          description: URI or path (for File type use local path e.g. ./video.mp4)
          example: ./test_video.mp4
    InstanceConfig:
      type: object
      description: Instance configuration (config format, not runtime state)
      properties:
        InstanceId:
          type: string
          description: Unique identifier of the instance (UUID)
          example: '{instanceId}'
        DisplayName:
          type: string
          description: Display name of the instance
          example: Test Instance
        AutoStart:
          type: boolean
          description: Whether the instance should automatically start on system boot
          example: false
        AutoRestart:
          type: boolean
          description: Whether the instance should automatically restart on failure
          example: false
        Detector:
          type: object
          description: Detector configuration
          properties:
            preset_values:
              type: object
              description: Preset values for different detector modes
              additionalProperties:
                type: object
          example:
            preset_values:
              MosaicInference:
                Detector/conf_threshold: 0.7
        DetectorRegions:
          type: object
          description: Detector regions configuration
          additionalProperties: true
        Input:
          type: object
          description: Input source configuration
          properties:
            match_fps:
              type: boolean
              description: Whether to match FPS
            media_format:
              type: object
              properties:
                color_format:
                  type: integer
                default_format:
                  type: boolean
                height:
                  type: integer
                is_software:
                  type: boolean
                name:
                  type: string
            media_type:
              type: string
              description: Type of media input (e.g., "Images", "IP Camera", "File")
            output_fps:
              type: integer
              description: Output FPS
            uri:
              type: string
              description: URI of the input source
          example:
            match_fps: true
            media_format:
              color_format: 0
              default_format: true
              height: 0
              is_software: false
              name: Same as Source
            media_type: Images
            output_fps: 8
            uri: https://some_uri
      required:
      - InstanceId
    SetConfigRequest:
      type: object
      required:
      - path
      - jsonValue
      properties:
        path:
          type: string
          description: 'The key for which the config value is to be updated. For nested structures, use forward slashes "/"
            as separators.

            Examples: "DisplayName", "Output/handlers/Mqtt", "Detector/conf_threshold"

            '
          example: Output/handlers/Mqtt
        jsonValue:
          type: string
          description: 'A string containing a JSON value or object. Ensure proper escaping for strings or objects.

            - For string values: "\"my string\"" (escaped JSON string)

            - For object values: "{\"key\":\"value\"}" (escaped JSON object)

            '
          example: '{"uri":"mqtt://localhost:1883/events"}'
    SetStateRequest:
      type: object
      required:
      - path
      - jsonValue
      properties:
        path:
          type: string
          description: 'The key for which the state value is to be updated. For nested structures, use forward slashes "/"
            as separators.

            Examples: "runtime/mode", "Output/handlers/Mqtt", "runtime/debug/enabled"

            '
          example: Output/handlers/Mqtt
        jsonValue:
          type: string
          description: 'A string containing a JSON value or object. Ensure proper escaping for strings or objects.

            - For string values: "\"my string\"" (escaped JSON string)

            - For object values: "{\"key\":\"value\"}" (escaped JSON object)

            - For number values: "123" or "45.67"

            - For boolean values: "true" or "false"

            '
          example: '{"enabled":true,"broker":"localhost"}'
    InstanceState:
      type: object
      description: 'Runtime state of an instance. State is different from config - state contains runtime settings that only
        exist when the instance is loaded, while config contains persistent settings.

        State is cleared when instance is unloaded. State does not persist after restart.

        '
      additionalProperties: true
      example:
        runtime:
          mode: production
          debug:
            enabled: false
        metrics:
          interval: 60
        Output:
          handlers:
            Mqtt:
              enabled: true
              broker: localhost
              port: 1883
    ConfigureStreamOutputRequest:
      type: object
      required:
      - enabled
      properties:
        enabled:
          type: boolean
          description: Indicates whether stream/record output is enabled
          example: true
        path:
          type: string
          description: 'The requested path to save output video MP4 files. Required when enabled is true and using record
            output mode.

            The path must be a directory that exists or can be created, and must have write permissions.

            Directory will be created automatically if it doesn''t exist.

            '
          example: /opt/omniapi/record
        uri:
          type: string
          format: uri
          description: 'The requested URI for the stream output. Required when enabled is true and using stream output mode.

            Must start with rtmp://, rtsp://, or hls://

            Either `path` (for record output) or `uri` (for stream output) must be provided when enabled is true.

            '
          example: rtmp://localhost:1935/live/stream
    StreamOutputResponse:
      type: object
      required:
      - enabled
      - uri
      properties:
        enabled:
          type: boolean
          description: Indicates whether stream output is enabled
          example: true
        uri:
          type: string
          format: uri
          description: 'The configured URI for the stream output. Empty string if disabled.

            Can be rtmp://, rtsp://, or hls:// format

            '
          example: rtmp://localhost:1935/live/stream
    SystemInfoResponse:
      type: object
      description: System hardware information
      properties:
        cpu:
          type: object
          properties:
            vendor:
              type: string
              example: GenuineIntel
            model:
              type: string
              example: Intel(R) Core(TM) i7-10700K CPU @ 3.80GHz
            physical_cores:
              type: integer
              example: 8
            logical_cores:
              type: integer
              example: 16
            max_frequency:
              type: integer
              description: Maximum frequency in MHz
              example: 3792
            regular_frequency:
              type: integer
              description: Regular frequency in MHz
              example: 3792
            min_frequency:
              type: integer
              description: Minimum frequency in MHz (-1 if not available)
              example: -1
            current_frequency:
              type: integer
              description: Current frequency in MHz (-1 if not available)
              example: 3792
            cache_size:
              type: integer
              format: int64
              description: Cache size in bytes
              example: 16777216
        ram:
          type: object
          properties:
            vendor:
              type: string
              example: Corsair
            model:
              type: string
              example: CMK32GX4M2Z3600C18
            name:
              type: string
              example: Physical Memory
            serial_number:
              type: string
              example: N/A
            size_mib:
              type: integer
              format: int64
              description: Total size in MiB
              example: 65437
            free_mib:
              type: integer
              format: int64
              description: Free memory in MiB
              example: 54405
            available_mib:
              type: integer
              format: int64
              description: Available memory in MiB
              example: 54405
        gpu:
          type: array
          items:
            type: object
            properties:
              vendor:
                type: string
                example: NVIDIA
              model:
                type: string
                example: NVIDIA GeForce RTX 3070 Ti
              driver_version:
                type: string
                example: 31.0.15.2698
              memory_mib:
                type: integer
                format: int64
                description: Memory size in MiB
                example: 8190
              min_frequency:
                type: integer
                example: -1
              current_frequency:
                type: integer
                description: Current frequency in MHz
                example: 0
              max_frequency:
                type: integer
                example: -1
        disk:
          type: array
          items:
            type: object
            properties:
              vendor:
                type: string
                example: (Standard disk drives)
              model:
                type: string
                example: WD_BLACK SN850 Heatsink 1TB
              serial_number:
                type: string
                example: '***'
              size_bytes:
                type: integer
                format: int64
                description: Total size in bytes
                example: 1000202273280
              free_size_bytes:
                type: integer
                format: int64
                description: Free size in bytes
                example: 500000000000
              volumes:
                type: array
                items:
                  type: string
                description: List of volume/partition names
        mainboard:
          type: object
          properties:
            vendor:
              type: string
              example: ASUSTeK COMPUTER INC.
            name:
              type: string
              example: PRIME Z490-A
            version:
              type: string
              example: Rev 1.xx
            serial_number:
              type: string
              example: N/A
        os:
          type: object
          properties:
            name:
              type: string
              example: Ubuntu 22.04 LTS
            short_name:
              type: string
              example: Linux
            version:
              type: string
              example: '22.04'
            kernel:
              type: string
              example: 5.15.0-72-generic
            architecture:
              type: string
              example: 64 bit
            endianess:
              type: string
              example: little endian
        battery:
          type: array
          description: Battery information (empty array if no batteries)
          items:
            type: object
            properties:
              vendor:
                type: string
              model:
                type: string
              serial_number:
                type: string
              technology:
                type: string
              capacity_mwh:
                type: integer
                format: int64
                description: Capacity in mWh
              charging:
                type: boolean
                description: Whether battery is charging
    SystemStatusResponse:
      type: object
      description: Current system status
      properties:
        cpu:
          type: object
          properties:
            usage_percent:
              type: number
              format: double
              description: CPU usage percentage (0-100)
              example: 25.5
            current_frequency_mhz:
              type: integer
              description: Current CPU frequency in MHz (-1 if not available)
              example: 3792
            temperature_celsius:
              type: number
              format: double
              description: CPU temperature in Celsius (optional, -1 if not available)
              example: 45.5
        ram:
          type: object
          properties:
            total_mib:
              type: integer
              format: int64
              description: Total RAM in MiB
              example: 65437
            used_mib:
              type: integer
              format: int64
              description: Used RAM in MiB
              example: 11032
            free_mib:
              type: integer
              format: int64
              description: Free RAM in MiB
              example: 54405
            available_mib:
              type: integer
              format: int64
              description: Available RAM in MiB
              example: 54405
            usage_percent:
              type: number
              format: double
              description: RAM usage percentage (0-100)
              example: 16.85
            cached_mib:
              type: integer
              format: int64
              description: Cached memory in MiB (optional)
              example: 5000
            buffers_mib:
              type: integer
              format: int64
              description: Buffers memory in MiB (optional)
              example: 1000
        load_average:
          type: object
          properties:
            1min:
              type: number
              format: double
              description: Load average for 1 minute
              example: 0.75
            5min:
              type: number
              format: double
              description: Load average for 5 minutes
              example: 0.82
            15min:
              type: number
              format: double
              description: Load average for 15 minutes
              example: 0.88
        uptime_seconds:
          type: integer
          format: int64
          description: System uptime in seconds
          example: 86400
    SystemConfigResponse:
      type: object
      description: System configuration entities response
      properties:
        systemConfig:
          type: array
          description: Array of system configuration entities
          items:
            type: object
            properties:
              fieldId:
                type: string
                description: Configuration field identifier
                example: voice6
              displayName:
                type: string
                description: Human-readable display name
                example: voice n. 6
              type:
                type: string
                description: Configuration type (options, string, number, boolean)
                example: options
              value:
                type: string
                description: Current configuration value
                example: solutions
              group:
                type: string
                description: Configuration group name
                example: groupBy
              availableValues:
                type: array
                description: Available values for options type
                items:
                  type: object
                  properties:
                    displayName:
                      type: string
                      example: securt 1 version 1.0
                    value:
                      type: string
                      example: securt
    SystemConfigUpdateRequest:
      type: object
      description: System configuration update request
      required:
      - systemConfig
      properties:
        systemConfig:
          type: array
          description: Array of configuration updates
          items:
            type: object
            required:
            - fieldId
            - value
            properties:
              fieldId:
                type: string
                description: Configuration field identifier to update
                example: voice6
              value:
                type: string
                description: New configuration value
                example: securt
    SystemPreferencesResponse:
      type: object
      description: System preferences from rtconfig.json
      additionalProperties:
        oneOf:
        - type: boolean
        - type: string
        - type: number
      example:
        vms.show_area_crossing: true
        vms.show_line_crossing: true
        vms.show_intrusion: true
        vms.show_crowding: true
        vms.show_loitering: true
        vms.show_object_left: true
        vms.show_object_guarding: true
        vms.show_tailgating: true
        vms.show_fallen_person: true
        vms.show_armed_person: true
        vms.show_access_control_plate: true
        vms.show_access_control_face: true
        vms.show_appearance_search: true
        vms.show_identities: true
        vms.show_remote_mode: true
        vms.show_thermal_support: true
        vms.show_active_detection: true
        vms.show_error_reporting: true
        vms.show_trial_licenses: true
        vms.hardware_decoding: true
        global.default_performance_mode: Performance
    SystemDecodersResponse:
      type: object
      description: Available system decoders information
      additionalProperties:
        type: object
        additionalProperties:
          type: integer
          description: Number of available decoders for the codec
      example:
        nvidia:
          hevc: 1
          h264: 1
    CreateInstanceRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: 'Instance name (required, pattern: ^[A-Za-z0-9 -_]+$)'
          example: Face Detection Camera 1
        group:
          type: string
          description: 'Group name (optional, pattern: ^[A-Za-z0-9 -_]+$)'
          example: cameras
        solution:
          type: string
          description: Solution ID (optional, must match existing solution)
          example: face_detection
        persistent:
          type: boolean
          description: Save instance to JSON file
          default: false
        frameRateLimit:
          type: integer
          description: Frame rate limit (FPS)
          default: 0
          minimum: 0
        metadataMode:
          type: boolean
          description: Enable metadata mode
          default: false
        statisticsMode:
          type: boolean
          description: Enable statistics mode
          default: false
        diagnosticsMode:
          type: boolean
          description: Enable diagnostics mode
          default: false
        debugMode:
          type: boolean
          description: Enable debug mode
          default: false
        detectorMode:
          type: string
          description: Detector mode
          enum:
          - SmartDetection
          default: SmartDetection
        detectionSensitivity:
          type: string
          description: Detection sensitivity level
          enum:
          - Low
          - Medium
          - High
          default: Low
        movementSensitivity:
          type: string
          description: Movement sensitivity level
          enum:
          - Low
          - Medium
          - High
          default: Low
        sensorModality:
          type: string
          description: Sensor modality
          enum:
          - RGB
          - Thermal
          default: RGB
        autoStart:
          type: boolean
          description: Automatically start instance when created
          default: false
        autoRestart:
          type: boolean
          description: Automatically restart instance on error
          default: false
        blockingReadaheadQueue:
          type: boolean
          description: Use blocking readahead queue
          default: false
        inputOrientation:
          type: integer
          description: Input orientation (0-3)
          default: 0
          minimum: 0
          maximum: 3
        inputPixelLimit:
          type: integer
          description: Input pixel limit
          default: 0
          minimum: 0
        RTSP_URL:
          type: string
          description: RTSP URL for source (required for face_detection solution)
          example: rtsp://localhost:8554/stream
        MODEL_NAME:
          type: string
          description: 'Model name to use (e.g., "yunet_2023mar", "yunet_2022mar", "yolov8n_face").

            Can specify category with format "category:modelname" (e.g., "face:yunet_2023mar").

            The system will automatically search for matching model files in system directories.

            Takes priority over MODEL_PATH if both are provided.

            '
          example: yunet_2023mar
        MODEL_PATH:
          type: string
          description: 'Direct path to model file (e.g., "./models/yunet.onnx", "/usr/share/cvedix/cvedix_data/models/face/yunet.onnx").

            Used if MODEL_NAME is not provided or not found.

            '
          example: ./models/yunet.onnx
        additionalParams:
          type: object
          description: "Additional solution-specific parameters. Supported keys:\n- RTSP_URL: RTSP stream URL\n- MODEL_NAME:\
            \ Model name (e.g., \"yunet_2023mar\", \"face:yunet_2023mar\")\n- MODEL_PATH: Direct path to model file\n- CrossingLines:\
            \ (ba_crossline only) JSON string array of crossing lines configuration.\n  Format: `[{\"id\":\"uuid\",\"name\"\
            :\"Line Name\",\"coordinates\":[{\"x\":0,\"y\":250},{\"x\":700,\"y\":220}],\"direction\":\"Both\",\"classes\"\
            :[\"Vehicle\"],\"color\":[255,0,0,255]}]`\n  Supports multiple lines. Can be managed via `/v1/core/instance/{instanceId}/lines`\
            \ API endpoints.\n- StopZones: (ba_stop only) JSON string array of stop zone configurations for individual object\
            \ stop detection.\n  Format: `[{\"id\":\"uuid\",\"name\":\"Zone 1\",\"roi\":[{\"x\":0,\"y\":0},{\"x\":100,\"y\"\
            :0},{\"x\":100,\"y\":100}],\"min_stop_seconds\":3,\"check_interval_frames\":20,\"check_min_hit_frames\":50,\"\
            check_max_distance\":5}]`\n  Supports multiple stop zones. Can be managed via `/v1/core/instance/{instanceId}/stops`\
            \ API endpoints.\n- JamZones: (ba_jam only) JSON string array of traffic jam zone configuration.\n  Format: `[{\"\
            id\":\"uuid\",\"name\":\"Jam Zone 1\",\"roi\":[{\"x\":0,\"y\":100},{\"x\":1920,\"y\":100},{\"x\":1920,\"y\":400},{\"\
            x\":0,\"y\":400}],\"check_interval_frames\":20,\"check_min_hit_frames\":50,\"check_max_distance\":8,\"check_min_stops\"\
            :8,\"check_notify_interval\":10}]`\n  Supports multiple zones. Can be managed via `/v1/core/instance/{instanceId}/jams`\
            \ API endpoints.\n"
          additionalProperties:
            type: string
    UpdateInstanceRequest:
      type: object
      description: Request body for updating an instance. All fields are optional - only provided fields will be updated.
      properties:
        name:
          type: string
          description: 'Instance name (pattern: ^[A-Za-z0-9 -_]+$)'
          example: Face Detection Camera 1
        group:
          type: string
          description: 'Group name (pattern: ^[A-Za-z0-9 -_]+$)'
          example: cameras
        persistent:
          type: boolean
          description: Save instance to JSON file
        frameRateLimit:
          type: integer
          description: Frame rate limit (FPS)
          minimum: 0
        metadataMode:
          type: boolean
          description: Enable metadata mode
        statisticsMode:
          type: boolean
          description: Enable statistics mode
        diagnosticsMode:
          type: boolean
          description: Enable diagnostics mode
        debugMode:
          type: boolean
          description: Enable debug mode
        detectorMode:
          type: string
          description: Detector mode
          enum:
          - SmartDetection
        detectionSensitivity:
          type: string
          description: Detection sensitivity level
          enum:
          - Low
          - Medium
          - High
        movementSensitivity:
