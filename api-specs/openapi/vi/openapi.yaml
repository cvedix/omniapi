  /v1/core/instance/{instanceId}/unload:
    post:
      summary: Gỡ instance khỏi bộ nhớ
      description: Gỡ instance khỏi bộ nhớ, xóa state storage và giải phóng tài nguyên. Khác với stop Gỡ nạp xóa instance
        khỏi bộ nhớ và xóa state runtime, còn stop chỉ dừng pipeline. **Hành vi:** Instance phải tồn tại và đã nạp. Nếu đang
        chạy sẽ bị dừng trước. State storage bị xóa (mọi state runtime mất). Tài nguyên được giải phóng. **Lưu ý:** State
        bị xóa khi gỡ nạp. State không tồn tại sau unload. Config (cấu hình lưu trữ) không bị ảnh hưởng.
