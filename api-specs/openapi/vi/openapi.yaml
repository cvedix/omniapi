  /v1/core/instance/{instanceId}/statistics:
    get:
      summary: Lấy thống kê instance
      description: 'Trả về thống kê thời gian thực của instance: frame đã xử lý, framerate, độ trễ, resolution, and queue
        information.


        **Statistics Include:**

        - Frames processed count

        - Source framerate (FPS from source)

        - Current framerate (processing FPS)

        - Average latency (milliseconds)

        - Input queue size

        - Dropped frames count

        - Resolution and format information

        - Source resolution


        **Important Notes:**

        - Statistics are calculated in real-time

        - Statistics reset to 0 when instance is restarted

        - Statistics are not persisted (only calculated when requested)

        - Instance must be running to get statistics

        '
      operationId: getStatistics
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Instance ID (UUID)
        example: '{instanceId}'
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceStatisticsResponse'
              example:
                frames_processed: 1250
                source_framerate: 30.0
                current_framerate: 25.5
                latency: 200.0
                start_time: 1764900520
                input_queue_size: 2
                dropped_frames_count: 5
                resolution: 1280x720
                format: BGR
                source_resolution: 1920x1080
        '404':
          description: Instance not found or not running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: 'Instance not found or not running: a5204fc9-9a59-f80f-fb9f-bf3b42214943'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho lấy thống kê
      operationId: getStatisticsOptions
      tags:
      - Instances
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/instance/{instanceId}/stop:
    post:
      summary: Dừng instance
      description: 'Dừng pipeline của instance, dừng mọi xử lý và giải phóng tài nguyên.


        **Behavior:**

        - If the instance is already stopped, the request will succeed without error

        - The pipeline will be gracefully stopped and all resources will be released

        - Processing will stop immediately

        - Returns the updated instance information with `running: false`


        **Note:** Stopping an instance may take a few seconds as the pipeline is cleaned up.


        The instance configuration is preserved and can be started again using the start endpoint.

        '
      operationId: stopInstance
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Instance ID (UUID)
      responses:
        '200':
          description: Instance stopped successfully
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/InstanceInfo'
                - type: object
                  properties:
                    message:
                      type: string
        '400':
          description: Dừng instance thất bại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/instance/{instanceId}/stops/batch:
    post:
      summary: Cập nhật hàng loạt vùng dừng (stop zones)
      description: 'Cập nhật nhiều vùng dừng (stop zones) cho instance ba_stop trong một yêu cầu.

        This endpoint allows updating multiple stop zones at once, which is more efficient than updating them individually.
        The instance will be restarted automatically to apply the changes if it is currently running. '
      operationId: batchUpdateStops
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Instance ID (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                - id
                - roi
                properties:
                  id:
                    type: string
                    description: Stop zone ID
                  name:
                    type: string
                    description: Stop zone name
                  roi:
                    type: array
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
                    description: Region of interest (polygon with at least 3 points)
                  threshold:
                    type: number
                    description: Detection threshold
                  duration:
                    type: integer
                    description: Minimum stop duration in seconds
              example:
              - id: stop1
                name: Zone 1
                roi:
                - x: 0
                  y: 0
                - x: 100
                  y: 0
                - x: 100
                  y: 100
                - x: 0
                  y: 100
      responses:
        '200':
          description: Stop zones updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                    description: Number of stop zones updated
                    example: 2
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho cập nhật hàng loạt stops
      operationId: batchUpdateStopsOptions
      tags:
      - Instances
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/instance/{instanceId}/unload:
    post:
      summary: Gỡ instance khỏi bộ nhớ
      description: 'Gỡ instance khỏi bộ nhớ, xóa state storage và giải phóng tài nguyên. Khác với stop an instance - unloading
        removes the instance from memory and clears runtime state, while stopping only halts the processing pipeline.


        **Behavior:**

        - Instance must exist and be loaded

        - If instance is running, it will be stopped first

        - State storage is cleared (all runtime state is lost)

        - Resources are released


        **Use Cases:**

        - Free memory when instance is not needed

        - Clear runtime state

        - Release resources


        **Note:** State is cleared when instance is unloaded. State does not persist after unload. Config (persistent configuration)
        is not affected.

        '
      operationId: coreUnloadInstanceV1
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the instance (UUID)
        example: '{instanceId}'
      responses:
        '204':
          description: Instance unloaded successfully
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: 'Instance not found: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '406':
          description: Instance not loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not Acceptable
                message: 'Instance not loaded: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho gỡ instance
      operationId: unloadInstanceOptions
      tags:
      - Instances
      responses:
        '200':
          description: Phản hồi CORS preflight
