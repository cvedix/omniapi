  /v1/core/solution/{solutionId}/instance-body:
    get:
      summary: Lấy body mẫu tạo instance
      description: 'Trả về body yêu cầu mẫu để tạo instance với solution này, kèm schema chi tiết metadata for UI flexibility.

        This includes:

        - **Standard Fields**: Common instance creation fields with default values

        - **Additional Parameters**: Solution-specific parameters with example values based on parameter names

        - **Schema**: Detailed metadata for all fields including types, validation rules, UI hints, descriptions, examples,
        and categories


        The response body can be used directly to create an instance via POST /v1/core/instance.

        The schema field provides rich metadata for UI to dynamically render forms, validate inputs, and provide better user
        experience.


        **Minimal Mode** (`?minimal=true`):

        - Returns only essential fields: `name`, `solution`, `group`, `autoStart`

        - Only includes required additionalParams (parameters without default values)

        - Excludes optional output parameters (MQTT, RTMP, Screen if not set)

        - Simplified schema without flexibleInputOutput

        - Use this mode for simple, user-friendly forms with minimal fields


        **Full Mode** (default):

        - Returns all available fields including advanced options

        - Includes all additionalParams (input and output)

        - Complete schema with flexibleInputOutput options

        - Use this mode for advanced configuration or when user clicks "Advanced Options"

        '
      operationId: getSolutionInstanceBody
      tags:
      - Solutions
      parameters:
      - name: solutionId
        in: path
        required: true
        schema:
          type: string
        description: Solution ID
      - name: minimal
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: 'If true, returns only essential fields for minimal UI form.

          Returns only required parameters and common optional fields (name, solution, group, autoStart).

          Recommended for initial form rendering to avoid overwhelming users with too many fields.

          '
      responses:
        '200':
          description: Example instance creation body
          content:
            application/json:
              schema:
                type: object
                description: Example request body that can be used directly to create an instance, plus detailed schema metadata
                properties:
                  name:
                    type: string
                    description: Instance name
                    example: example_instance
                  group:
                    type: string
                    description: Group name
                    example: default
                  solution:
                    type: string
                    description: Solution ID
                    example: face_detection
                  persistent:
                    type: boolean
                    description: Save instance to JSON file
                    example: false
                  autoStart:
                    type: boolean
                    description: Automatically start instance when created
                    example: false
                  frameRateLimit:
                    type: integer
                    description: Frame rate limit (FPS, 0 = unlimited)
                    example: 0
                  detectionSensitivity:
                    type: string
                    enum:
                    - Low
                    - Medium
                    - High
                    - Normal
                    - Slow
                    description: Detection sensitivity level
                    example: Low
                  detectorMode:
                    type: string
                    enum:
                    - SmartDetection
                    - FullRegionInference
                    - MosaicInference
                    description: Detector mode
                    example: SmartDetection
                  metadataMode:
                    type: boolean
                    description: Enable metadata mode (output detection results as JSON)
                    example: false
                  statisticsMode:
                    type: boolean
                    description: Enable statistics mode
                    example: false
                  diagnosticsMode:
                    type: boolean
                    description: Enable diagnostics mode
                    example: false
                  debugMode:
                    type: boolean
                    description: Enable debug mode
                    example: false
                  additionalParams:
                    type: object
                    description: Solution-specific parameters organized by input/output
                    properties:
                      input:
                        type: object
                        description: Input parameters (e.g., RTSP_URL, FILE_PATH, MODEL_PATH)
                        additionalProperties:
                          type: string
                        example:
                          RTSP_URL: rtsp://example.com/stream
                          MODEL_PATH: ./models/face/yunet.onnx
                      output:
                        type: object
                        description: Output parameters (e.g., MQTT_BROKER_URL, RTMP_URL, ENABLE_SCREEN_DES)
                        additionalProperties:
                          type: string
                        example:
                          MQTT_BROKER_URL: localhost
                          MQTT_PORT: '1883'
                          MQTT_TOPIC: events
                          ENABLE_SCREEN_DES: 'false'
                  schema:
                    type: object
                    description: Detailed schema metadata for UI flexibility
                    properties:
                      standardFields:
                        type: object
                        description: Schema metadata for standard instance creation fields
                        additionalProperties:
                          type: object
                          properties:
                            name:
                              type: string
                            type:
                              type: string
                            required:
                              type: boolean
                            description:
                              type: string
                            default:
                              description: Default value (type varies)
                            pattern:
                              type: string
                            patternDescription:
                              type: string
                            minimum:
                              type: number
                            maximum:
                              type: number
                            enum:
                              type: array
                              items:
                                type: string
                            uiHints:
                              type: object
                              properties:
                                inputType:
                                  type: string
                                widget:
                                  type: string
                            examples:
                              type: array
                              items:
                                type: string
                      additionalParams:
                        type: object
                        description: Schema metadata for additional parameters
                        properties:
                          input:
                            type: object
                            description: Schema for input parameters
                            additionalProperties:
                              type: object
                              properties:
                                name:
                                  type: string
                                type:
                                  type: string
                                required:
                                  type: boolean
                                description:
                                  type: string
                                example:
                                  type: string
                                default:
                                  description: Default value (type varies)
                                uiHints:
                                  type: object
                                validation:
                                  type: object
                                examples:
                                  type: array
                                  items:
                                    type: string
                                category:
                                  type: string
                                usedInNodes:
                                  type: array
                                  items:
                                    type: string
                          output:
                            type: object
                            description: Schema for output parameters
                            additionalProperties:
                              type: object
                              properties:
                                name:
                                  type: string
                                type:
                                  type: string
                                required:
                                  type: boolean
                                description:
                                  type: string
                                example:
                                  type: string
                                default:
                                  description: Default value (type varies)
                                uiHints:
                                  type: object
                                validation:
                                  type: object
                                examples:
                                  type: array
                                  items:
                                    type: string
                                category:
                                  type: string
                                usedInNodes:
                                  type: array
                                  items:
                                    type: string
                      flexibleInputOutput:
                        type: object
                        description: Schema for flexible input/output options that can be added to any instance
                        properties:
                          description:
                            type: string
                          input:
                            type: object
                            properties:
                              description:
                                type: string
                              mutuallyExclusive:
                                type: boolean
                              parameters:
                                type: object
                                additionalProperties:
                                  type: object
                          output:
                            type: object
                            properties:
                              description:
                                type: string
                              mutuallyExclusive:
                                type: boolean
                              parameters:
                                type: object
                                additionalProperties:
                                  type: object
              example:
                name: example_instance
                group: default
                solution: face_detection
                persistent: false
                autoStart: false
                frameRateLimit: 0
                detectionSensitivity: Low
                detectorMode: SmartDetection
                metadataMode: false
                statisticsMode: false
                diagnosticsMode: false
                debugMode: false
                additionalParams:
                  input:
                    RTSP_URL: rtsp://example.com/stream
                    MODEL_PATH: ./models/face/yunet.onnx
                  output:
                    MQTT_BROKER_URL: localhost
                    MQTT_PORT: '1883'
                    MQTT_TOPIC: events
                    ENABLE_SCREEN_DES: 'false'
                schema:
                  standardFields:
                    name:
                      name: name
                      type: string
                      required: true
                      description: 'Instance name (pattern: ^[A-Za-z0-9 -_]+$)'
                      pattern: ^[A-Za-z0-9 -_]+$
                      uiHints:
                        inputType: text
                        widget: input
                      examples:
                      - my_instance
                      - camera_01
                    frameRateLimit:
                      name: frameRateLimit
                      type: integer
                      required: false
                      description: Frame rate limit (FPS, 0 = unlimited)
                      default: 0
                      minimum: 0
                      uiHints:
                        inputType: number
                        widget: input
                      examples:
                      - '0'
                      - '10'
                      - '30'
                  additionalParams:
                    input:
                      RTSP_URL:
                        name: RTSP_URL
                        type: string
                        required: true
                        description: RTSP stream URL (e.g., rtsp://camera-ip:8554/stream)
                        example: rtsp://example.com/stream
                        uiHints:
                          inputType: url
                          widget: url-input
                          placeholder: rtsp://camera-ip:8554/stream
                        validation:
                          pattern: ^(rtsp|rtmp|http|https|file|udp)://.+
                          patternDescription: Must be a valid URL (rtsp://, rtmp://, http://, https://, file://, or udp://)
                        examples:
                        - rtsp://192.168.1.100:8554/stream1
                        - rtsp://admin:password@camera-ip:554/stream
                        category: connection
                        usedInNodes:
                        - rtsp_src
                    output:
                      MQTT_BROKER_URL:
                        name: MQTT_BROKER_URL
                        type: string
                        required: false
                        description: MQTT broker address (hostname or IP). Leave empty to disable MQTT output.
                        example: localhost
                        uiHints:
                          inputType: text
                          widget: input
                          placeholder: localhost
                        examples:
                        - localhost
                        - 192.168.1.100
                        - mqtt.example.com
                        category: output
                  flexibleInputOutput:
                    description: Flexible input/output options that can be added to any instance
                    input:
                      description: Choose ONE input source. Pipeline builder auto-detects input type.
                      mutuallyExclusive: true
                      parameters:
                        FILE_PATH:
                          name: FILE_PATH
                          type: string
                          required: false
                          description: Local video file path or URL (supports file://, rtsp://, rtmp://, http://, https://).
                            Pipeline builder auto-detects input type.
                          example: ./cvedix_data/test_video/example.mp4
                          uiHints:
                            inputType: file
                            widget: file-picker
                            placeholder: /path/to/video.mp4
                          category: connection
                    output:
                      description: Add any combination of outputs. Pipeline builder auto-adds nodes.
                      mutuallyExclusive: false
                      parameters:
                        MQTT_BROKER_URL:
                          name: MQTT_BROKER_URL
                          type: string
                          required: false
                          description: MQTT broker address (enables MQTT output). Leave empty to disable.
                          example: localhost
                          uiHints:
                            inputType: text
                            widget: input
                            placeholder: localhost
                          category: output
        '404':
          description: Solution not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho solution instance body
      operationId: getSolutionInstanceBodyOptions
      tags:
      - Solutions
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/solution/{solutionId}/parameters:
    get:
      summary: Lấy schema tham số solution
      description: 'Trả về schema tham số cần thiết để tạo instance với solution này.

        This includes:

        - **Additional Parameters**: Solution-specific parameters extracted from pipeline nodes (e.g., RTSP_URL, MODEL_PATH,
        FILE_PATH)

        - **Standard Fields**: Common instance creation fields (name, group, persistent, autoStart, etc.)


        Parameters marked as required must be provided in the `additionalParams` object when creating an instance.

        Parameters with default values are optional.

        '
      operationId: getSolutionParameters
      tags:
      - Solutions
      parameters:
      - name: solutionId
        in: path
        required: true
        schema:
          type: string
        description: Solution ID
      responses:
        '200':
          description: Solution parameter schema
          content:
            application/json:
              schema:
                type: object
                properties:
                  solutionId:
                    type: string
                    description: Solution ID
                    example: face_detection
                  solutionName:
                    type: string
                    description: Solution display name
                    example: Face Detection
                  solutionType:
                    type: string
                    description: Solution type
                    example: face_detection
                  pipeline:
                    type: array
                    description: Pipeline nodes with detailed parameter information
                    items:
                      type: object
                      properties:
                        nodeType:
                          type: string
                          description: Node type identifier
                          example: rtsp_src
                        nodeName:
                          type: string
                          description: Node name template
                          example: source_{instanceId}
                        displayName:
                          type: string
                          description: Node display name
                          example: RTSP Source
                        description:
                          type: string
                          description: Node description
                          example: Receive video stream from RTSP URL
                        category:
                          type: string
                          description: Node category
                          enum:
                          - source
                          - detector
                          - processor
                          - destination
                          - broker
                          example: source
                        requiredParameters:
                          type: array
                          description: Required parameters for this node type
                          items:
                            type: string
                          example:
                          - rtsp_url
                        optionalParameters:
                          type: array
                          description: Optional parameters for this node type
                          items:
                            type: string
                          example:
                          - channel
                          - resize_ratio
                        defaultParameters:
                          type: object
                          description: Default parameter values
                          additionalProperties:
                            type: string
                          example:
                            channel: '0'
                            resize_ratio: '1.0'
                        parameters:
                          type: object
                          description: Current parameter values in solution
                          additionalProperties:
                            type: string
                          example:
                            rtsp_url: ${RTSP_URL}
                    example:
                    - nodeType: rtsp_src
                      nodeName: source_{instanceId}
                      displayName: RTSP Source
                      description: Receive video stream from RTSP URL
                      category: source
                      requiredParameters:
                      - rtsp_url
                      optionalParameters:
                      - channel
                      - resize_ratio
                      defaultParameters:
                        channel: '0'
                        resize_ratio: '1.0'
                      parameters:
                        rtsp_url: ${RTSP_URL}
                  additionalParams:
                    type: object
                    description: Solution-specific parameters extracted from pipeline nodes
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Parameter name
                        type:
                          type: string
                          description: Parameter type
                          example: string
                        required:
                          type: boolean
                          description: Whether this parameter is required
                        default:
                          type: string
                          description: Default value if available
                        description:
                          type: string
                          description: Parameter description
                        usedInNodes:
                          type: array
                          description: List of node types that use this parameter
                          items:
                            type: string
                          example:
                          - rtsp_src
                          - rtmp_src
                    example:
                      RTSP_URL:
                        name: RTSP_URL
                        type: string
                        required: true
                        description: URL for rtsp_src node
                      MODEL_PATH:
                        name: MODEL_PATH
                        type: string
                        required: false
                        default: ./models/default.onnx
                        description: File path for yunet_face_detector node
                  requiredAdditionalParams:
                    type: array
                    description: List of required additional parameter names
                    items:
                      type: string
                    example:
                    - RTSP_URL
                  standardFields:
                    type: object
                    description: Standard instance creation fields
                    additionalProperties:
                      type: object
                      properties:
                        type:
                          type: string
                          description: Field type
                        required:
                          type: boolean
                          description: Whether this field is required
                        default:
                          description: Default value
                        description:
                          type: string
                          description: Field description
                        pattern:
                          type: string
                          description: Validation pattern (for strings)
                        enum:
                          type: array
                          description: Allowed values (for enums)
                          items:
                            type: string
                        minimum:
                          type: number
                          description: Minimum value (for numbers)
                    example:
                      name:
                        type: string
                        required: true
                        description: 'Instance name (pattern: ^[A-Za-z0-9 -_]+$)'
                        pattern: ^[A-Za-z0-9 -_]+$
                      group:
                        type: string
                        required: false
                        description: 'Group name (pattern: ^[A-Za-z0-9 -_]+$)'
                        pattern: ^[A-Za-z0-9 -_]+$
                      persistent:
                        type: boolean
                        required: false
                        default: false
                        description: Save instance to JSON file
                      autoStart:
                        type: boolean
                        required: false
                        default: false
                        description: Automatically start instance when created
                  requiredStandardFields:
                    type: array
                    description: List of required standard field names
                    items:
                      type: string
                    example:
                    - name
              example:
                solutionId: face_detection
                solutionName: Face Detection
                solutionType: face_detection
                pipeline:
                - nodeType: rtsp_src
                  nodeName: source_{instanceId}
                  displayName: RTSP Source
                  description: Receive video stream from RTSP URL
                  category: source
                  requiredParameters:
                  - rtsp_url
                  optionalParameters:
                  - channel
                  - resize_ratio
                  defaultParameters:
                    channel: '0'
                    resize_ratio: '1.0'
                  parameters:
                    rtsp_url: ${RTSP_URL}
                - nodeType: yunet_face_detector
                  nodeName: detector_{instanceId}
                  displayName: YuNet Face Detector
                  description: Detect faces using YuNet model
                  category: detector
                  requiredParameters:
                  - model_path
                  optionalParameters:
                  - score_threshold
                  - nms_threshold
                  - top_k
                  defaultParameters:
                    score_threshold: '0.7'
                    nms_threshold: '0.5'
                    top_k: '50'
                  parameters:
                    model_path: ${MODEL_PATH}
                additionalParams:
                  RTSP_URL:
                    name: RTSP_URL
                    type: string
                    required: true
                    description: Required parameter for rtsp_src (rtsp_url)
                    usedInNodes:
                    - rtsp_src
                  MODEL_PATH:
                    name: MODEL_PATH
                    type: string
                    required: true
                    description: Required parameter for yunet_face_detector (model_path)
                    usedInNodes:
                    - yunet_face_detector
                requiredAdditionalParams:
                - RTSP_URL
                standardFields:
                  name:
                    type: string
                    required: true
                    description: 'Instance name (pattern: ^[A-Za-z0-9 -_]+$)'
                    pattern: ^[A-Za-z0-9 -_]+$
                  group:
                    type: string
                    required: false
                    description: 'Group name (pattern: ^[A-Za-z0-9 -_]+$)'
                    pattern: ^[A-Za-z0-9 -_]+$
                  persistent:
                    type: boolean
                    required: false
                    default: false
                    description: Save instance to JSON file
                  autoStart:
                    type: boolean
                    required: false
                    default: false
                    description: Automatically start instance when created
                requiredStandardFields:
                - name
        '404':
          description: Solution not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho tham số solution
      operationId: getSolutionParametersOptions
      tags:
      - Solutions
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/video/list:
    get:
      summary: Liệt kê file video đã tải lên
      description: "Returns a list of video files that have been uploaded to the server.\n- If `directory` parameter is not\
        \ specified: Recursively searches and lists all video files\n  in the entire videos directory tree (including all\
        \ subdirectories).\n- If `directory` parameter is specified: Lists only files in that specific directory\n  (non-recursive,\
        \ does not search subdirectories).\n"
      operationId: listVideos
      tags:
      - Video
      parameters:
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Subdirectory path to list files from (e.g., "projects/myproject/videos", "users/user123").

          If specified, only lists files in that directory (non-recursive).

          If not specified, recursively searches all subdirectories.

          '
        example: projects/myproject/videos
      responses:
        '200':
          description: Danh sách file video
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  videos:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        path:
                          type: string
                        size:
                          type: integer
                        modified:
                          type: string
                  count:
                    type: integer
                  directory:
                    type: string
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/video/upload:
    post:
      summary: Tải lên file video
      description: 'Tải file video (MP4, AVI, MKV, v.v.) lên máy chủ. File được lưu trong thư mục videos. Có thể chỉ định
        thư mục con qua tham số query `directory` (ví dụ: `projects/myproject/videos`). Thư mục sẽ được tạo tự động nếu chưa
        tồn tại. Nếu không chỉ định, file lưu tại thư mục videos gốc.

        '
      operationId: uploadVideo
      tags:
      - Video
      parameters:
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con nơi file video sẽ được lưu.

          Sử dụng dấu gạch chéo để phân tách các cấp thư mục (ví dụ: "projects/myproject/videos", "users/user123", "category1/subcategory").

          Thư mục sẽ được tạo tự động nếu không tồn tại.

          Nếu không được chỉ định, file sẽ được lưu trong thư mục videos gốc.

          '
        example: projects/myproject/videos
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: File video để tải lên. Chọn nhiều file để tải lên cùng lúc (.mp4, .avi, .mkv, .mov, .flv, .wmv,
                    .webm, v.v.)
                file:
                  type: string
                  format: binary
                  description: Một file video để tải lên (thay thế cho mảng files)
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: File video dưới dạng dữ liệu nhị phân
      responses:
        '201':
          description: File video đã được tải lên thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  count:
                    type: integer
  /v1/core/video/{videoName}:
    put:
      summary: Đổi tên file video
      description: 'Đổi tên file video trên máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm
        trong thư mục con.

        '
      operationId: renameVideo
      tags:
      - Video
      parameters:
      - name: videoName
        in: path
        required: true
        schema:
          type: string
        description: Tên hiện tại của file video cần đổi tên
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con chứa file video (ví dụ: "projects/myproject/videos"). Nếu không chỉ định, file
          được coi là ở thư mục videos gốc.

          '
        example: projects/myproject/videos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - newName
              properties:
                newName:
                  type: string
                  description: Tên mới cho file video (phải có phần mở rộng hợp lệ)
                  example: my_video_v2.mp4
      responses:
        '200':
          description: Đã đổi tên file video thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  oldName:
                    type: string
                  newName:
                    type: string
                  path:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy file video
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Tên mới đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa file video
      description: 'Xóa file video khỏi máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm trong
        thư mục con.

        '
      operationId: deleteVideo
      tags:
      - Video
      parameters:
      - name: videoName
        in: path
        required: true
        schema:
          type: string
        description: Tên file video cần xóa
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con chứa file video (ví dụ: "projects/myproject/videos"). Nếu không chỉ định, file
          được coi là ở thư mục videos gốc.

          '
        example: projects/myproject/videos
      responses:
        '200':
          description: Đã xóa file video thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  filename:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy file video
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: integer
          description: Error code
        message:
          type: string
          description: Detailed error message
    HealthResponse:
      type: object
      required:
      - status
      - timestamp
      - uptime
      properties:
        status:
          type: string
          enum:
          - healthy
          - degraded
          - unhealthy
          description: Health status of the service
          example: healthy
        timestamp:
          type: string
          format: date-time
          description: Current timestamp in ISO 8601 format
          example: '2024-01-01T00:00:00.000Z'
        uptime:
          type: integer
          format: int64
          description: Service uptime in seconds
          example: 3600
        service:
          type: string
          description: Service name
          example: edge_ai_api
        version:
          type: string
          description: Service version
          example: 1.0.0
    VersionResponse:
      type: object
      required:
      - version
      - api_version
      - service
      properties:
        version:
          type: string
          description: Application version
          example: 1.0.0
        build_time:
          type: string
          description: Build timestamp
          example: Jan 01 2024 00:00:00
        git_commit:
          type: string
          description: Git commit hash
          example: abc123def456
        api_version:
          type: string
          description: API version
          example: v1
        service:
          type: string
          description: Service name
          example: edge_ai_api
    SystemInfoResponse:
      type: object
      description: System hardware information
      properties:
        cpu:
          type: object
          properties:
            vendor:
              type: string
              example: GenuineIntel
            model:
              type: string
              example: Intel(R) Core(TM) i7-10700K CPU @ 3.80GHz
            physical_cores:
              type: integer
              example: 8
            logical_cores:
              type: integer
              example: 16
            max_frequency:
              type: integer
              description: Maximum frequency in MHz
              example: 3792
            regular_frequency:
              type: integer
              description: Regular frequency in MHz
              example: 3792
            min_frequency:
              type: integer
              description: Minimum frequency in MHz (-1 if not available)
              example: -1
            current_frequency:
              type: integer
              description: Current frequency in MHz (-1 if not available)
              example: 3792
            cache_size:
              type: integer
              format: int64
              description: Cache size in bytes
              example: 16777216
        ram:
          type: object
          properties:
            vendor:
              type: string
              example: Corsair
            model:
              type: string
              example: CMK32GX4M2Z3600C18
            name:
              type: string
              example: Physical Memory
            serial_number:
              type: string
              example: N/A
            size_mib:
              type: integer
              format: int64
              description: Total size in MiB
              example: 65437
            free_mib:
              type: integer
              format: int64
              description: Free memory in MiB
              example: 54405
            available_mib:
              type: integer
              format: int64
              description: Available memory in MiB
              example: 54405
        gpu:
          type: array
          items:
            type: object
            properties:
              vendor:
                type: string
                example: NVIDIA
              model:
                type: string
                example: NVIDIA GeForce RTX 3070 Ti
              driver_version:
                type: string
                example: 31.0.15.2698
              memory_mib:
                type: integer
                format: int64
                description: Memory size in MiB
                example: 8190
              min_frequency:
                type: integer
                example: -1
              current_frequency:
                type: integer
                description: Current frequency in MHz
                example: 0
              max_frequency:
                type: integer
                example: -1
        disk:
          type: array
          items:
            type: object
            properties:
              vendor:
                type: string
                example: (Standard disk drives)
              model:
                type: string
                example: WD_BLACK SN850 Heatsink 1TB
              serial_number:
                type: string
                example: '***'
              size_bytes:
                type: integer
                format: int64
                description: Total size in bytes
                example: 1000202273280
              free_size_bytes:
                type: integer
                format: int64
                description: Free size in bytes
                example: 500000000000
              volumes:
                type: array
                items:
                  type: string
                description: List of volume/partition names
        mainboard:
          type: object
          properties:
            vendor:
              type: string
              example: ASUSTeK COMPUTER INC.
            name:
              type: string
              example: PRIME Z490-A
            version:
              type: string
              example: Rev 1.xx
            serial_number:
              type: string
              example: N/A
        os:
          type: object
          properties:
            name:
              type: string
              example: Ubuntu 22.04 LTS
            short_name:
              type: string
              example: Linux
            version:
              type: string
              example: '22.04'
            kernel:
              type: string
              example: 5.15.0-72-generic
            architecture:
              type: string
              example: 64 bit
            endianess:
              type: string
              example: little endian
        battery:
          type: array
          description: Battery information (empty array if no batteries)
          items:
            type: object
            properties:
              vendor:
                type: string
              model:
                type: string
              serial_number:
                type: string
              technology:
                type: string
              capacity_mwh:
                type: integer
                format: int64
                description: Capacity in mWh
              charging:
                type: boolean
                description: Whether battery is charging
    SystemStatusResponse:
      type: object
      description: Current system status
      properties:
        cpu:
          type: object
          properties:
            usage_percent:
              type: number
              format: double
              description: CPU usage percentage (0-100)
              example: 25.5
            current_frequency_mhz:
              type: integer
              description: Current CPU frequency in MHz (-1 if not available)
              example: 3792
            temperature_celsius:
              type: number
              format: double
              description: CPU temperature in Celsius (optional, -1 if not available)
              example: 45.5
        ram:
          type: object
          properties:
            total_mib:
              type: integer
              format: int64
              description: Total RAM in MiB
              example: 65437
            used_mib:
              type: integer
              format: int64
              description: Used RAM in MiB
              example: 11032
            free_mib:
              type: integer
              format: int64
              description: Free RAM in MiB
              example: 54405
            available_mib:
              type: integer
              format: int64
