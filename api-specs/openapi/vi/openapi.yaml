                    description: Tham số bắt buộc cho rtsp_src (rtsp_url)
                    usedInNodes:
                    - rtsp_src
                  MODEL_PATH:
                    name: MODEL_PATH
                    type: string
                    required: true
                    description: Tham số bắt buộc cho yunet_face_detector (model_path)
                    usedInNodes:
                    - yunet_face_detector
                requiredAdditionalParams:
                - RTSP_URL
                standardFields:
                  name:
                    type: string
                    required: true
                    description: 'Tên instance (pattern: ^[A-Za-z0-9 -_]+$)'
                    pattern: ^[A-Za-z0-9 -_]+$
                  group:
                    type: string
                    required: false
                    description: 'Tên nhóm (pattern: ^[A-Za-z0-9 -_]+$)'
                    pattern: ^[A-Za-z0-9 -_]+$
                  persistent:
                    type: boolean
                    required: false
                    default: false
                    description: Lưu instance ra file JSON
                  autoStart:
                    type: boolean
                    required: false
                    default: false
                    description: Tự động khởi động instance khi tạo
                requiredStandardFields:
                - name
        '404':
          description: Không tìm thấy solution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho tham số solution
      operationId: getSolutionParametersOptions
      tags:
      - Solutions
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/video/list:
    get:
      summary: Liệt kê file video đã tải lên
      description: 'Trả về danh sách các file video đã được tải lên máy chủ.

        - Nếu không chỉ định tham số `directory`: Tìm kiếm đệ quy và liệt kê tất cả file video trong toàn bộ cây thư mục videos
        (bao gồm mọi thư mục con).

        - Nếu chỉ định tham số `directory`: Chỉ liệt kê file trong thư mục đó (không đệ quy, không tìm trong thư mục con).

        '
      operationId: listVideos
      tags:
      - Video
      parameters:
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con để liệt kê file (ví dụ: "projects/myproject/videos", "users/user123"). Nếu chỉ
          định, chỉ liệt kê file trong thư mục đó (không đệ quy). Nếu không chỉ định, tìm kiếm đệ quy tất cả thư mục con.'
        example: projects/myproject/videos
      responses:
        '200':
          description: Danh sách file video
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  videos:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        path:
                          type: string
                        size:
                          type: integer
                        modified:
                          type: string
                  count:
                    type: integer
                  directory:
                    type: string
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/video/upload:
    post:
      summary: Tải lên file video
      description: 'Tải file video (MP4, AVI, MKV, v.v.) lên máy chủ. File được lưu trong thư mục videos. Có thể chỉ định
        thư mục con qua tham số query `directory` (ví dụ: `projects/myproject/videos`). Thư mục sẽ được tạo tự động nếu chưa
        tồn tại. Nếu không chỉ định, file lưu tại thư mục videos gốc.

        '
      operationId: uploadVideo
      tags:
      - Video
      parameters:
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con nơi file video sẽ được lưu.

          Sử dụng dấu gạch chéo để phân tách các cấp thư mục (ví dụ: "projects/myproject/videos", "users/user123", "category1/subcategory").

          Thư mục sẽ được tạo tự động nếu không tồn tại.

          Nếu không được chỉ định, file sẽ được lưu trong thư mục videos gốc.

          '
        example: projects/myproject/videos
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: File video để tải lên. Chọn nhiều file để tải lên cùng lúc (.mp4, .avi, .mkv, .mov, .flv, .wmv,
                    .webm, v.v.)
                file:
                  type: string
                  format: binary
                  description: Một file video để tải lên (thay thế cho mảng files)
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: File video dưới dạng dữ liệu nhị phân
      responses:
        '201':
          description: File video đã được tải lên thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  count:
                    type: integer
  /v1/core/video/{videoName}:
    put:
      summary: Đổi tên file video
      description: 'Đổi tên file video trên máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm
        trong thư mục con.

        '
      operationId: renameVideo
      tags:
      - Video
      parameters:
      - name: videoName
        in: path
        required: true
        schema:
          type: string
        description: Tên hiện tại của file video cần đổi tên
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con chứa file video (ví dụ: "projects/myproject/videos"). Nếu không chỉ định, file
          được coi là ở thư mục videos gốc.

          '
        example: projects/myproject/videos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - newName
              properties:
                newName:
                  type: string
                  description: Tên mới cho file video (phải có phần mở rộng hợp lệ)
                  example: my_video_v2.mp4
      responses:
        '200':
          description: Đã đổi tên file video thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  oldName:
                    type: string
                  newName:
                    type: string
                  path:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy file video
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Tên mới đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa file video
      description: 'Xóa file video khỏi máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm trong
        thư mục con.

        '
      operationId: deleteVideo
      tags:
      - Video
      parameters:
      - name: videoName
        in: path
        required: true
        schema:
          type: string
        description: Tên file video cần xóa
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con chứa file video (ví dụ: "projects/myproject/videos"). Nếu không chỉ định, file
          được coi là ở thư mục videos gốc.

          '
        example: projects/myproject/videos
      responses:
        '200':
          description: Đã xóa file video thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  filename:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy file video
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Thông báo lỗi
        code:
          type: integer
          description: Mã lỗi
        message:
          type: string
          description: Thông báo lỗi chi tiết
    HealthResponse:
      type: object
      required:
      - status
      - timestamp
      - uptime
      properties:
        status:
          type: string
          enum:
          - healthy
          - degraded
          - unhealthy
          description: Trạng thái sức khỏe của dịch vụ
          example: healthy
        timestamp:
          type: string
          format: date-time
          description: Thời điểm hiện tại theo định dạng ISO 8601
          example: '2024-01-01T00:00:00.000Z'
        uptime:
          type: integer
          format: int64
          description: Thời gian hoạt động của dịch vụ (giây)
          example: 3600
        service:
          type: string
          description: Tên dịch vụ
          example: edgeos-api
        version:
          type: string
          description: Phiên bản dịch vụ
          example: 1.0.0
    VersionResponse:
      type: object
      required:
      - version
      - api_version
      - service
      properties:
        version:
          type: string
          description: Phiên bản ứng dụng
          example: 1.0.0
        build_time:
          type: string
          description: Thời điểm build
          example: Jan 01 2024 00:00:00
        git_commit:
          type: string
          description: Mã hash commit Git
          example: abc123def456
        api_version:
          type: string
          description: Phiên bản API
          example: v1
        service:
          type: string
          description: Tên dịch vụ
          example: edgeos-api
    SystemInfoResponse:
      type: object
      description: Thông tin phần cứng hệ thống
      properties:
        cpu:
          type: object
          properties:
            vendor:
              type: string
              example: GenuineIntel
            model:
              type: string
              example: Intel(R) Core(TM) i7-10700K CPU @ 3.80GHz
            physical_cores:
              type: integer
              example: 8
            logical_cores:
              type: integer
              example: 16
            max_frequency:
              type: integer
              description: Tần số tối đa (MHz)
              example: 3792
            regular_frequency:
              type: integer
              description: Tần số thường (MHz)
              example: 3792
            min_frequency:
              type: integer
              description: Tần số tối thiểu (MHz, -1 nếu không có)
              example: -1
            current_frequency:
              type: integer
              description: Tần số hiện tại (MHz, -1 nếu không có)
              example: 3792
            cache_size:
              type: integer
              format: int64
              description: Kích thước cache (byte)
              example: 16777216
        ram:
          type: object
          properties:
            vendor:
              type: string
              example: Corsair
            model:
              type: string
              example: CMK32GX4M2Z3600C18
            name:
              type: string
              example: Physical Memory
            serial_number:
              type: string
              example: N/A
            size_mib:
              type: integer
              format: int64
              description: Tổng dung lượng (MiB)
              example: 65437
            free_mib:
              type: integer
              format: int64
              description: Bộ nhớ trống (MiB)
              example: 54405
            available_mib:
              type: integer
              format: int64
              description: Bộ nhớ khả dụng (MiB)
              example: 54405
        gpu:
          type: array
          items:
            type: object
            properties:
              vendor:
                type: string
                example: NVIDIA
              model:
                type: string
                example: NVIDIA GeForce RTX 3070 Ti
              driver_version:
                type: string
                example: 31.0.15.2698
              memory_mib:
                type: integer
                format: int64
                description: Dung lượng bộ nhớ (MiB)
                example: 8190
              min_frequency:
                type: integer
                example: -1
              current_frequency:
                type: integer
                description: Tần số hiện tại (MHz)
                example: 0
              max_frequency:
                type: integer
                example: -1
        disk:
          type: array
          items:
            type: object
            properties:
              vendor:
                type: string
                example: (Standard disk drives)
              model:
                type: string
                example: WD_BLACK SN850 Heatsink 1TB
              serial_number:
                type: string
                example: '***'
              size_bytes:
                type: integer
                format: int64
                description: Tổng dung lượng (byte)
                example: 1000202273280
              free_size_bytes:
                type: integer
                format: int64
                description: Dung lượng trống (byte)
                example: 500000000000
              volumes:
                type: array
                items:
                  type: string
                description: Danh sách tên volume/phân vùng
        mainboard:
          type: object
          properties:
            vendor:
              type: string
              example: ASUSTeK COMPUTER INC.
            name:
              type: string
              example: PRIME Z490-A
            version:
              type: string
              example: Rev 1.xx
            serial_number:
              type: string
              example: N/A
        os:
          type: object
          properties:
            name:
              type: string
              example: Ubuntu 22.04 LTS
            short_name:
              type: string
              example: Linux
            version:
              type: string
              example: '22.04'
            kernel:
              type: string
              example: 5.15.0-72-generic
            architecture:
              type: string
              example: 64 bit
            endianess:
              type: string
              example: little endian
        battery:
          type: array
          description: Thông tin pin (mảng rỗng nếu không có pin)
          items:
            type: object
            properties:
              vendor:
                type: string
              model:
                type: string
              serial_number:
                type: string
              technology:
                type: string
              capacity_mwh:
                type: integer
                format: int64
                description: Dung lượng (mWh)
              charging:
                type: boolean
                description: Pin đang sạc hay không
    SystemStatusResponse:
      type: object
      description: Trạng thái hệ thống hiện tại
      properties:
        cpu:
          type: object
          properties:
            usage_percent:
              type: number
              format: double
              description: Phần trăm sử dụng CPU (0-100)
              example: 25.5
            current_frequency_mhz:
              type: integer
              description: Tần số CPU hiện tại (MHz, -1 nếu không có)
              example: 3792
            temperature_celsius:
              type: number
              format: double
              description: Nhiệt độ CPU (độ C, tùy chọn, -1 nếu không có)
              example: 45.5
        ram:
          type: object
          properties:
            total_mib:
              type: integer
              format: int64
              description: Tổng RAM (MiB)
              example: 65437
            used_mib:
              type: integer
              format: int64
              description: RAM đã dùng (MiB)
              example: 11032
            free_mib:
              type: integer
              format: int64
              description: RAM trống (MiB)
              example: 54405
            available_mib:
              type: integer
              format: int64
              description: RAM khả dụng (MiB)
              example: 54405
            usage_percent:
              type: number
              format: double
              description: Phần trăm sử dụng RAM (0-100)
              example: 16.85
            cached_mib:
              type: integer
              format: int64
              description: Bộ nhớ cache (MiB, tùy chọn)
              example: 5000
            buffers_mib:
              type: integer
              format: int64
              description: Bộ nhớ buffer (MiB, tùy chọn)
              example: 1000
        load_average:
          type: object
          properties:
            1min:
              type: number
              format: double
              description: Load average 1 phút
              example: 0.75
            5min:
              type: number
              format: double
              description: Load average 5 phút
              example: 0.82
            15min:
              type: number
              format: double
              description: Load average 15 phút
              example: 0.88
        uptime_seconds:
          type: integer
          format: int64
          description: Thời gian hoạt động hệ thống (giây)
          example: 86400
    SystemConfigResponse:
      type: object
      description: Phản hồi các thực thể cấu hình hệ thống
      properties:
        systemConfig:
          type: array
          description: Mảng các thực thể cấu hình hệ thống
          items:
            type: object
            properties:
              fieldId:
                type: string
                description: Định danh trường cấu hình
                example: voice6
              displayName:
                type: string
                description: Tên hiển thị dễ đọc
                example: voice n. 6
              type:
                type: string
                description: Kiểu cấu hình (options, string, number, boolean)
                example: options
              value:
                type: string
                description: Giá trị cấu hình hiện tại
                example: solutions
              group:
                type: string
                description: Tên nhóm cấu hình
                example: groupBy
              availableValues:
                type: array
                description: Các giá trị khả dụng cho kiểu options
                items:
                  type: object
                  properties:
                    displayName:
                      type: string
                      example: securt 1 version 1.0
                    value:
                      type: string
                      example: securt
    SystemConfigUpdateRequest:
      type: object
      description: Yêu cầu cập nhật cấu hình hệ thống
      required:
      - systemConfig
      properties:
        systemConfig:
          type: array
          description: Mảng các cập nhật cấu hình
          items:
            type: object
            required:
            - fieldId
            - value
            properties:
              fieldId:
                type: string
                description: Định danh trường cấu hình to update
                example: voice6
              value:
                type: string
                description: Giá trị cấu hình mới
                example: securt
    SystemPreferencesResponse:
      type: object
      description: Tùy chọn hệ thống từ rtconfig.json
      additionalProperties:
        oneOf:
        - type: boolean
        - type: string
        - type: number
      example:
        vms.show_area_crossing: true
        vms.show_line_crossing: true
        vms.show_intrusion: true
        vms.show_crowding: true
        vms.show_loitering: true
        vms.show_object_left: true
        vms.show_object_guarding: true
        vms.show_tailgating: true
        vms.show_fallen_person: true
        vms.show_armed_person: true
        vms.show_access_control_plate: true
        vms.show_access_control_face: true
        vms.show_appearance_search: true
        vms.show_identities: true
        vms.show_remote_mode: true
        vms.show_thermal_support: true
        vms.show_active_detection: true
        vms.show_error_reporting: true
        vms.show_trial_licenses: true
        vms.hardware_decoding: true
        global.default_performance_mode: Performance
    SystemDecodersResponse:
      type: object
      description: Thông tin bộ giải mã hệ thống khả dụng
      additionalProperties:
        type: object
        additionalProperties:
          type: integer
          description: Số bộ giải mã khả dụng cho codec
      example:
        nvidia:
          hevc: 1
          h264: 1
    LogFilesResponse:
      type: object
      required:
      - categories
      properties:
        categories:
          type: object
          description: Các file log được nhóm theo danh mục
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/LogFileInfo'
          example:
            api:
            - date: '2024-01-01'
              size: 1024
              path: /var/log/edgeos-api/api_2024-01-01.log
            instance:
            - date: '2024-01-01'
              size: 2048
              path: /var/log/edgeos-api/instance_2024-01-01.log
    LogsResponse:
      type: object
      required:
      - category
      - category_dir
      - files_count
      - total_lines
      - filtered_lines
      - logs
      properties:
        category:
          type: string
          description: Danh mục log
          example: api
        category_dir:
          type: string
          description: Đường dẫn thư mục cho danh mục này
          example: /var/log/edgeos-api/api
        files_count:
          type: integer
          description: Số file log trong danh mục này
          example: 1
        total_lines:
          type: integer
          description: Tổng số dòng log trước khi lọc
          example: 1000
        filtered_lines:
          type: integer
          description: Số dòng log sau khi lọc
          example: 500
        logs:
          type: array
          description: Mảng các bản ghi log
          items:
            $ref: '#/components/schemas/LogEntry'
    LogsByDateResponse:
      type: object
      required:
      - category
      - date
      - total_lines
      - filtered_lines
      - logs
      properties:
        category:
          type: string
          description: Danh mục log
          example: api
        date:
          type: string
          format: date
          description: Ngày của file log (YYYY-MM-DD)
          example: '2024-01-01'
        total_lines:
          type: integer
          description: Tổng số dòng log trước khi lọc
          example: 1000
        filtered_lines:
          type: integer
          description: Số dòng log sau khi lọc
          example: 500
        logs:
          type: array
          description: Mảng các bản ghi log
          items:
            $ref: '#/components/schemas/LogEntry'
    ONVIFCamera:
      type: object
      description: Thông tin camera ONVIF
      properties:
        ip:
          type: string
          format: ipv4
          description: Địa chỉ IP camera
          example: '{ip_address}'
        uuid:
          type: string
          description: UUID camera (định danh duy nhất)
          example: 00000000-0000-0000-0000-000000000000
        manufacturer:
          type: string
          description: Tên hãng sản xuất camera
          example: Hikvision
        model:
          type: string
          description: Tên model camera
          example: DS-2CD2347G1-LU
        serialNumber:
          type: string
          description: Số serial camera
          example: ABC123456
    ONVIFStream:
      type: object
      description: Thông tin stream video ONVIF
      properties:
        token:
          type: string
          description: Token profile stream
          example: Profile_1
        width:
          type: integer
          description: Chiều rộng stream (pixel)
          example: 1920
        height:
          type: integer
          description: Chiều cao stream (pixel)
          example: 1080
        fps:
          type: integer
          description: Frame rate (khung hình/giây)
          example: 30
          uri:
            type: string
            format: uri
            description: URI stream RTSP
            example: rtsp://{ip_address}:554/Streaming/Channels/101
    ONVIFCredentialsRequest:
      type: object
      required:
      - username
      - password
      description: Thông tin đăng nhập camera ONVIF
      properties:
        username:
          type: string
          description: Tên đăng nhập camera
          example: admin
        password:
          type: string
          format: password
          description: Mật khẩu camera
          example: password123
    StatusResponse:
      type: object
      required:
      - total
      - configured
      - running
      - stopped
      - timestamp
      properties:
        total:
          type: integer
          description: Tổng số instance đã cấu hình
          example: 5
        configured:
          type: integer
          description: Số instance đã cấu hình (bằng tổng số)
          example: 5
        running:
          type: integer
          description: Số instance đang chạy
          example: 3
        stopped:
          type: integer
          description: Số instance đã dừng
          example: 2
        timestamp:
          type: string
          format: date-time
          description: Thời điểm hiện tại theo định dạng ISO 8601
          example: '2024-01-01T00:00:00.000Z'
    LogFileInfo:
      type: object
      required:
      - date
      - size
      - path
      properties:
        date:
          type: string
          format: date
          description: Ngày của file log (YYYY-MM-DD)
          example: '2024-01-01'
        size:
          type: integer
          format: int64
          description: Kích thước file log (byte)
          example: 1024
        path:
          type: string
          description: Đường dẫn đầy đủ tới file log
          example: /var/log/edgeos-api/api_2024-01-01.log
    LogEntry:
      type: object
      required:
      - timestamp
      - level
      - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: Thời điểm log theo định dạng ISO 8601
          example: '2024-01-01T12:00:00.000Z'
        level:
          type: string
          description: Mức log (INFO, ERROR, WARNING, DEBUG, v.v.)
          example: INFO
        message:
          type: string
          description: Nội dung log
          example: API request received
    SetInputRequest:
      type: object
      required:
      - type
      - uri
      properties:
        type:
          type: string
          description: Loại nguồn đầu vào (File = đường dẫn file video)
          enum:
          - File
          - RTSP
          - HLS
          - Manual
          example: File
        uri:
          type: string
          description: URI hoặc đường dẫn (với type File dùng path local, vd. ./video.mp4)
          example: ./test_video.mp4
    InstanceConfig:
      type: object
      description: Cấu hình instance (định dạng config, không phải trạng thái runtime)
      properties:
        InstanceId:
          type: string
          description: Định danh duy nhất của instance (UUID)
          example: '{instanceId}'
        DisplayName:
          type: string
          description: Tên hiển thị của instance
          example: Test Instance
        AutoStart:
          type: boolean
          description: Instance có tự khởi động khi hệ thống boot hay không
          example: false
        AutoRestart:
          type: boolean
          description: Instance có tự khởi động lại khi lỗi hay không
          example: false
        Detector:
          type: object
          description: Cấu hình detector
          properties:
            preset_values:
              type: object
              description: Giá trị mặc định cho các chế độ detector
              additionalProperties:
                type: object
          example:
            preset_values:
              MosaicInference:
                Detector/conf_threshold: 0.7
        DetectorRegions:
          type: object
          description: Cấu hình vùng detector
          additionalProperties: true
        Input:
          type: object
          description: Cấu hình nguồn đầu vào
          properties:
            match_fps:
              type: boolean
              description: Có khớp FPS hay không
            media_format:
              type: object
              properties:
                color_format:
                  type: integer
                default_format:
                  type: boolean
                height:
                  type: integer
                is_software:
                  type: boolean
                name:
                  type: string
            media_type:
              type: string
              description: Loại đầu vào media (vd. "Images", "IP Camera", "File")
            output_fps:
              type: integer
              description: FPS đầu ra
            uri:
              type: string
              description: URI nguồn đầu vào
          example:
            match_fps: true
            media_format:
              color_format: 0
              default_format: true
              height: 0
              is_software: false
              name: Giống nguồn
            media_type: Images
            output_fps: 8
            uri: https://some_uri
      required:
      - InstanceId
    SetConfigRequest:
      type: object
      required:
      - path
      - jsonValue
      properties:
        path:
          type: string
          description: 'Khóa cần cập nhật giá trị cấu hình. Với cấu trúc lồng nhau, dùng dấu "/" làm phân cách.

            Ví dụ: "DisplayName", "Output/handlers/Mqtt", "Detector/conf_threshold"

            '
          example: Output/handlers/Mqtt
        jsonValue:
          type: string
          description: 'Chuỗi chứa giá trị hoặc đối tượng JSON. Đảm bảo escape đúng cho chuỗi/đối tượng.

            - Giá trị chuỗi: "\"my string\"" (chuỗi JSON đã escape)

            - Đối tượng: "{\"key\":\"value\"}" (đối tượng JSON đã escape)

            '
          example: '{"uri":"mqtt://localhost:1883/events"}'
    SetStateRequest:
      type: object
      required:
      - path
      - jsonValue
      properties:
        path:
          type: string
          description: 'Khóa cần cập nhật giá trị state. Với cấu trúc lồng nhau, dùng dấu "/" làm phân cách.

            Ví dụ: "runtime/mode", "Output/handlers/Mqtt", "runtime/debug/enabled"

            '
          example: Output/handlers/Mqtt
        jsonValue:
          type: string
          description: 'Chuỗi chứa giá trị hoặc đối tượng JSON. Đảm bảo escape đúng.

            - Chuỗi: "\"my string\"" (chuỗi JSON đã escape)

            - Đối tượng: "{\"key\":\"value\"}" (đối tượng JSON đã escape)

            - Số: "123" hoặc "45.67"

            - Boolean: "true" hoặc "false"

            '
          example: '{"enabled":true,"broker":"localhost"}'
    InstanceState:
      type: object
      description: 'Trạng thái runtime của instance. State khác config - state chứa cài đặt runtime chỉ tồn tại khi instance
        đã load, còn config chứa cài đặt lưu trữ.

        State bị xóa khi instance unload. State không tồn tại sau khi khởi động lại.

        '
      additionalProperties: true
      example:
        runtime:
          mode: production
          debug:
            enabled: false
        metrics:
          interval: 60
        Output:
          handlers:
            Mqtt:
              enabled: true
              broker: localhost
              port: 1883
    ConfigureStreamOutputRequest:
      type: object
      required:
      - enabled
      properties:
        enabled:
          type: boolean
          description: Có bật đầu ra stream/ghi hay không
          example: true
        path:
          type: string
          description: 'Đường dẫn lưu file video MP4 đầu ra. Bắt buộc khi enabled=true và dùng chế độ ghi.

            Đường dẫn phải là thư mục tồn tại hoặc có thể tạo, và có quyền ghi.

            Thư mục sẽ được tạo tự động nếu chưa tồn tại.

            '
          example: /opt/edgeos-api/record
        uri:
          type: string
          format: uri
          description: 'URI đầu ra stream. Bắt buộc khi enabled=true và dùng chế độ stream.

            Phải bắt đầu bằng rtmp://, rtsp:// hoặc hls://

            Khi enabled=true phải cung cấp `path` (ghi file) hoặc `uri` (stream).

            '
          example: rtmp://localhost:1935/live/stream
    StreamOutputResponse:
      type: object
      required:
      - enabled
      - uri
      properties:
        enabled:
          type: boolean
          description: Có bật đầu ra stream hay không
          example: true
        uri:
          type: string
          format: uri
          description: 'URI đã cấu hình cho đầu ra stream. Chuỗi rỗng nếu tắt.

            Có thể là định dạng rtmp://, rtsp:// hoặc hls://

            '
          example: rtmp://localhost:1935/live/stream
    CreateInstanceRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: 'Tên instance (bắt buộc, pattern: ^[A-Za-z0-9 -_]+$)'
          example: Face Detection Camera 1
        group:
          type: string
          description: 'Tên nhóm (tùy chọn, pattern: ^[A-Za-z0-9 -_]+$)'
          example: cameras
        solution:
          type: string
          description: ID giải pháp (tùy chọn, phải khớp giải pháp tồn tại)
          example: face_detection
        persistent:
          type: boolean
          description: Lưu instance vào file JSON
          default: false
        frameRateLimit:
          type: integer
          description: Giới hạn frame rate (FPS)
          default: 0
          minimum: 0
        metadataMode:
          type: boolean
          description: Bật chế độ metadata
          default: false
        statisticsMode:
          type: boolean
          description: Bật chế độ thống kê
          default: false
        diagnosticsMode:
          type: boolean
          description: Bật chế độ chẩn đoán
          default: false
        debugMode:
          type: boolean
          description: Bật chế độ debug
          default: false
        detectorMode:
          type: string
          description: Chế độ detector
          enum:
          - SmartDetection
          default: SmartDetection
        detectionSensitivity:
          type: string
          description: Mức độ nhạy phát hiện
          enum:
          - Low
          - Medium
          - High
          default: Low
        movementSensitivity:
          type: string
          description: Mức độ nhạy chuyển động
          enum:
          - Low
          - Medium
          - High
          default: Low
        sensorModality:
          type: string
          description: Loại cảm biến
          enum:
          - RGB
          - Thermal
          default: RGB
        autoStart:
          type: boolean
          description: Tự khởi động instance khi tạo
          default: false
        autoRestart:
          type: boolean
          description: Tự khởi động lại instance khi lỗi
          default: false
        blockingReadaheadQueue:
          type: boolean
          description: Dùng hàng đợi readahead chặn
          default: false
        inputOrientation:
          type: integer
          description: Hướng đầu vào (0-3)
          default: 0
          minimum: 0
          maximum: 3
        inputPixelLimit:
          type: integer
          description: Giới hạn pixel đầu vào
          default: 0
          minimum: 0
        RTSP_URL:
          type: string
          description: URL RTSP nguồn (bắt buộc cho giải pháp face_detection)
          example: rtsp://localhost:8554/stream
        MODEL_NAME:
          type: string
          description: 'Tên model dùng (vd. "yunet_2023mar", "yunet_2022mar", "yolov8n_face").

            Có thể chỉ định category dạng "category:modelname" (vd. "face:yunet_2023mar").

            Hệ thống tự tìm file model trong thư mục hệ thống.

            Ưu tiên hơn MODEL_PATH nếu cung cấp cả hai.

            '
          example: yunet_2023mar
        MODEL_PATH:
          type: string
          description: 'Đường dẫn trực tiếp tới file model (vd. "./models/yunet.onnx", "/usr/share/cvedix/cvedix_data/models/face/yunet.onnx").

            Dùng khi không cung cấp hoặc không tìm thấy MODEL_NAME.

            '
          example: ./models/yunet.onnx
        additionalParams:
          type: object
          description: 'Tham số bổ sung theo giải pháp. Các khóa hỗ trợ:

            - RTSP_URL: URL stream RTSP

            - MODEL_NAME: Tên model (vd. "yunet_2023mar", "face:yunet_2023mar")

            - MODEL_PATH: Đường dẫn trực tiếp tới file model

            - CrossingLines: (chỉ ba_crossline) Mảng chuỗi JSON cấu hình đường cắt. Định dạng: `[{"id":"uuid","name":"Line
            Name","coordinates":[{"x":0,"y":250},{"x":700,"y":220}],"direction":"Both","classes":["Vehicle"],"color":[255,0,0,255]}]`.
            Hỗ trợ nhiều đường. Quản lý qua API `/v1/core/instance/{instanceId}/lines`.

            - StopZones: (chỉ ba_stop) Mảng chuỗi JSON cấu hình vùng dừng. Quản lý qua API `/v1/core/instance/{instanceId}/stops`.

            - JamZones: (chỉ ba_jam) Mảng chuỗi JSON cấu hình vùng ùn tắc. Quản lý qua API `/v1/core/instance/{instanceId}/jams`.

            '
          additionalProperties:
            type: string
    UpdateInstanceRequest:
      type: object
      description: Body yêu cầu cập nhật instance. Mọi trường đều tùy chọn - chỉ các trường được gửi mới được cập nhật.
      properties:
        name:
