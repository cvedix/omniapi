        Endpoint này cho phép cập nhật nhiều vùng cùng lúc, hiệu quả hơn so với cập nhật từng vùng. Instance sẽ được khởi
        động lại tự động để áp dụng thay đổi nếu đang chạy. '
      operationId: batchUpdateJams
