  /v1/core/font/{fontName}:
    put:
      summary: Đổi tên file font
      description: 'Đổi tên file font trên máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm
        trong thư mục con.

        '
      operationId: renameFont
      tags:
      - Fonts
      parameters:
      - name: fontName
        in: path
        required: true
        schema:
          type: string
        description: Tên hiện tại của file font cần đổi tên
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Subdirectory path where the font file is located (e.g., "projects/myproject/fonts", "themes/custom").

          If not specified, the file is assumed to be in the base fonts directory.

          '
        example: projects/myproject/fonts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - newName
              properties:
                newName:
                  type: string
                  description: New name for the font file (must have valid font file extension)
                  example: string.otf
      responses:
        '200':
          description: Đã đổi tên file font thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  oldName:
                    type: string
                  newName:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
