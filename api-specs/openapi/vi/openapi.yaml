        example: rtsp_src_template
      responses:
        '200':
          description: Template details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho template
      operationId: getTemplateOptions
      tags:
      - Node
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/onvif/camera/{cameraid}/credentials:
    post:
      summary: Thiết lập credentials cho một camera ONVIF
      description: 'Thiết lập thông tin xác thực cho một camera ONVIF cụ thể.

        **Camera ID:** - Có thể là địa chỉ IP của camera (ví dụ: "192.168.1.100") hoặc UUID - Định dạng địa chỉ IP: 0-255.0-255.0-255.0-255

        **Credentials:** - Username và password là bắt buộc - Credentials được lưu trữ an toàn và được sử dụng cho các thao
        tác ONVIF tiếp theo - Nếu camera không được tìm thấy, có thể được đề xuất nếu phát hiện IP tương tự

        **Cách sử dụng:** 1. Khám phá camera bằng POST /v1/onvif/discover 2. Lấy danh sách camera bằng GET /v1/onvif/cameras
        3. Thiết lập credentials bằng endpoint này 4. Lấy streams bằng GET /v1/onvif/streams/{cameraid} '
      operationId: setONVIFCredentials
      tags:
      - ONVIF
      parameters:
      - name: cameraid
        in: path
        required: true
        schema:
          type: string
        description: Định danh camera (địa chỉ IP hoặc UUID)
        example: 192.168.1.100
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ONVIFCredentialsRequest'
            example:
              username: admin
              password: password123
      responses:
        '204':
          description: Credentials đã được thiết lập thành công
        '400':
          description: Yêu cầu không hợp lệ (thiếu username hoặc password, JSON không hợp lệ)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy camera
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho credentials ONVIF
      operationId: setONVIFCredentialsOptions
      tags:
      - ONVIF
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/onvif/cameras:
    get:
      summary: Lấy danh sách tất cả camera ONVIF đã khám phá
      description: 'Lấy danh sách tất cả các camera ONVIF đã được khám phá trên mạng.

        **Thông tin Camera:** - Mỗi camera bao gồm địa chỉ IP, UUID, nhà sản xuất, model và số serial - Camera được lọc dựa
        trên whitelist hỗ trợ (nếu được cấu hình) - Chỉ các camera vượt qua kiểm tra whitelist mới được trả về

        **Cách sử dụng:** 1. Đầu tiên gọi POST /v1/onvif/discover để khám phá camera 2. Sau đó gọi endpoint này để lấy danh
        sách camera đã khám phá 3. Sử dụng camera ID (IP hoặc UUID) để lấy streams hoặc thiết lập credentials '
      operationId: getONVIFCameras
      tags:
      - ONVIF
      responses:
        '200':
          description: Danh sách camera ONVIF đã khám phá
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ONVIFCamera'
              example:
              - ip: 192.168.1.100
                uuid: 00000000-0000-0000-0000-000000000000
                manufacturer: Hikvision
                model: DS-2CD2347G1-LU
                serialNumber: ABC123456
              - ip: 192.168.1.101
                uuid: 11111111-1111-1111-1111-111111111111
                manufacturer: Axis
                model: P3245-LVE
                serialNumber: DEF789012
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho camera ONVIF
      operationId: getONVIFCamerasOptions
      tags:
      - ONVIF
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/onvif/discover:
    post:
      summary: Khám phá camera ONVIF
      description: 'Khám phá các camera ONVIF trên mạng bằng giao thức WS-Discovery.

        Endpoint này khởi động quá trình khám phá bất đồng bộ để tìm kiếm các camera tuân thủ ONVIF trên mạng cục bộ.

        **Tham số Timeout:** - Tham số truy vấn tùy chọn `timeout` (1-30 giây, mặc định: 5) - Điều khiển thời gian chờ phản
        hồi từ camera trong quá trình khám phá

        **Phản hồi:** - Trả về 204 No Content khi quá trình khám phá được khởi động - Sử dụng GET /v1/onvif/cameras để lấy
        danh sách camera đã khám phá sau khi hoàn tất '
      operationId: discoverONVIFCameras
      tags:
      - ONVIF
      parameters:
      - name: timeout
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 30
          default: 5
        description: 'Thời gian chờ khám phá tính bằng giây (1-30, mặc định: 5)'
        example: 5
      responses:
        '204':
          description: Quá trình khám phá đã được khởi động thành công
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho khám phá ONVIF
      operationId: discoverONVIFCamerasOptions
      tags:
      - ONVIF
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/onvif/streams/{cameraid}:
    get:
      summary: Lấy streams cho một camera ONVIF
      description: 'Lấy các video streams có sẵn cho một camera ONVIF cụ thể.

        **Camera ID:** - Có thể là địa chỉ IP của camera (ví dụ: "192.168.1.100") hoặc UUID - Định dạng địa chỉ IP: 0-255.0-255.0-255.0-255

        **Thông tin Stream:** - Mỗi stream bao gồm profile token, độ phân giải (width/height), frame rate (fps) và RTSP URI
        - Streams được lấy bằng dịch vụ ONVIF Media - Credentials của camera phải được thiết lập trước khi lấy streams (nếu
        yêu cầu xác thực)

        **Cách sử dụng:** 1. Khám phá camera bằng POST /v1/onvif/discover 2. Lấy danh sách camera bằng GET /v1/onvif/cameras
        3. Thiết lập credentials bằng POST /v1/onvif/camera/{cameraid}/credentials (nếu cần) 4. Lấy streams bằng endpoint
        này '
      operationId: getONVIFStreams
      tags:
      - ONVIF
      parameters:
      - name: cameraid
        in: path
        required: true
        schema:
          type: string
        description: Định danh camera (địa chỉ IP hoặc UUID)
        example: 192.168.1.100
      responses:
        '200':
          description: Danh sách streams có sẵn cho camera
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ONVIFStream'
              example:
              - token: Profile_1
                width: 1920
                height: 1080
                fps: 30
                uri: rtsp://192.168.1.100:554/Streaming/Channels/101
              - token: Profile_2
                width: 640
                height: 480
                fps: 15
                uri: rtsp://192.168.1.100:554/Streaming/Channels/102
        '400':
          description: Yêu cầu không hợp lệ (thiếu hoặc không hợp lệ camera ID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy camera
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho streams ONVIF
      operationId: getONVIFStreamsOptions
      tags:
      - ONVIF
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/recognition/face-database/connection:
    post:
      summary: Cấu hình kết nối face database
      description: "Configures the face database connection for MySQL or PostgreSQL. This endpoint allows you to configure\n\
        a database connection to store face recognition data instead of using the default `face_database.txt` file.\n\n**Database\
        \ Support:**\n- MySQL (default port: 3306)\n- PostgreSQL (default port: 5432)\n\n**Database Schema:**\nThe system\
        \ expects two tables in the database:\n\n1. **face_libraries** table:\n   - `id` (primary key, auto-increment)\n \
        \  - `image_id` (varchar 36) - Unique identifier for each face image\n   - `subject` (varchar 255) - Subject/name\
        \ of the person\n   - `base64_image` (longtext) - Base64-encoded face image\n   - `embedding` (text) - Face embedding\
        \ vector (comma-separated floats)\n   - `created_at` (timestamp) - Creation timestamp\n   - `machine_id` (varchar\
        \ 255) - Machine identifier\n   - `mac_address` (varchar 255) - MAC address\n\n2. **face_log** table:\n   - `id` (primary\
        \ key, auto-increment)\n   - `request_type` (varchar 50) - Type of request (recognize, register, etc.)\n   - `timestamp`\
        \ (datetime) - Request timestamp\n   - `client_ip` (varchar 45) - Client IP address\n   - `request_body` (longtext)\
        \ - Request body JSON\n   - `response_body` (longtext) - Response body JSON\n   - `response_code` (int) - HTTP response\
        \ code\n   - `notes` (text) - Additional notes\n   - `mac_address` (varchar 255) - MAC address\n   - `machine_id`\
        \ (varchar 255) - Machine identifier\n\n**Behavior:**\n- If database connection is configured and enabled, the system\
        \ will use the database instead of `face_database.txt`\n- If `enabled: false` is sent, the database connection is\
        \ disabled and the system falls back to `face_database.txt`\n- Configuration is persisted in `config.json` under the\
        \ `face_database` section\n- The configuration takes effect immediately after being saved\n\n**Note:** The database\
        \ tables must be created manually before using this endpoint. The endpoint only configures\nthe connection parameters,\
        \ it does not create the database schema.\n"
      operationId: configureFaceDatabaseConnection
      tags:
      - Recognition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/FaceDatabaseConnectionConfig'
              - type: object
                required:
                - enabled
                properties:
                  enabled:
                    type: boolean
                    description: Set to false to disable database connection and use default face_database.txt file
                    example: false
            examples:
              mysql:
                summary: MySQL configuration example
                value:
                  type: mysql
                  host: localhost
                  port: 3306
                  database: face_db
                  username: face_user
                  password: secure_password
                  charset: utf8mb4
              postgresql:
                summary: PostgreSQL configuration example
                value:
                  type: postgresql
                  host: localhost
                  port: 5432
                  database: face_db
                  username: face_user
                  password: secure_password
              disable:
                summary: Disable database connection
                value:
                  enabled: false
      responses:
        '200':
          description: Database connection configured successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Success message
                    example: Face database connection configured successfully
                  config:
                    $ref: '#/components/schemas/FaceDatabaseConnectionConfig'
                  note:
                    type: string
                    description: Additional information
                    example: Database connection will be used instead of face_database.txt file
              examples:
                success:
                  summary: Configuration successful
                  value:
                    message: Face database connection configured successfully
                    config:
                      type: mysql
                      host: localhost
                      port: 3306
                      database: face_db
                      username: face_user
                      charset: utf8mb4
                    note: Database connection will be used instead of face_database.txt file
                disabled:
                  summary: Database disabled
                  value:
                    message: Database connection disabled. Using default face_database.txt file
                    enabled: false
                    default_file: /opt/edge_ai_api/data/face_database.txt
        '400':
          description: Bad request (missing required fields, invalid database type, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingType:
                  summary: Missing type field
                  value:
                    error: Bad request
                    message: Field 'type' (mysql/postgresql) is required
                invalidType:
                  summary: Invalid database type
                  value:
                    error: Bad request
                    message: Field 'type' must be either 'mysql' or 'postgresql'
                missingHost:
                  summary: Missing host field
                  value:
                    error: Bad request
                    message: Field 'host' is required
        '500':
          description: Server error (failed to save configuration, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Lấy cấu hình kết nối face database
      description: Lấy cấu hình kết nối face database hiện tại. Nếu chưa cấu hình hoặc đã tắt, trả về thông tin file mặc định
        face_database.txt. Khi đã cấu hình trả về chi tiết kết nối; khi chưa cấu hình trả về enabled=false và đường dẫn file
        mặc định.
      operationId: getFaceDatabaseConnection
      tags:
      - Recognition
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: Whether database connection is enabled
                    example: true
                  config:
                    $ref: '#/components/schemas/FaceDatabaseConnectionConfig'
                    description: Database connection configuration (only present if enabled is true)
                  message:
                    type: string
                    description: Status message
                    example: Database connection is configured and enabled
                  default_file:
                    type: string
                    description: Path to default face_database.txt file (only present if enabled is false)
                    example: /opt/edge_ai_api/data/face_database.txt
              examples:
                enabled:
                  summary: Database enabled
                  value:
                    enabled: true
                    config:
                      type: mysql
                      host: localhost
                      port: 3306
                      database: face_db
                      username: face_user
                      charset: utf8mb4
                    message: Database connection is configured and enabled
                disabled:
                  summary: Database disabled
                  value:
                    enabled: false
                    message: No database connection configured. Using default face_database.txt file
                    default_file: /opt/edge_ai_api/data/face_database.txt
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa cấu hình kết nối face database
      description: 'Xóa cấu hình kết nối face database. Sau khi xóa, hệ thống dùng lại file mặc định face_database.txt. Hành
        vi: gỡ cấu hình khỏi config.json; đặt enabled=false; hệ thống chuyển sang dùng face_database.txt; nếu chưa có cấu
        hình thì trả về success báo không có cấu hình. Lưu ý: Thao tác này không xóa dữ liệu trong database, chỉ gỡ cấu hình
        kết nối. Để xóa dữ liệu trong database, dùng các endpoint xóa face.'
      operationId: deleteFaceDatabaseConnection
      tags:
      - Recognition
      responses:
        '200':
          description: Database connection configuration deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Success message
                    example: Database connection configuration deleted successfully. System will now use default face_database.txt
                      file
                  enabled:
                    type: boolean
                    description: Whether database connection is enabled (always false after deletion)
                    example: false
                  default_file:
                    type: string
                    description: Path to default face_database.txt file
                    example: /opt/edge_ai_api/data/face_database.txt
              examples:
                deleted:
                  summary: Configuration deleted successfully
                  value:
                    message: Database connection configuration deleted successfully. System will now use default face_database.txt
                      file
                    enabled: false
                    default_file: /opt/edge_ai_api/data/face_database.txt
                notFound:
                  summary: No configuration to delete
                  value:
                    message: No database connection configured to delete
                    enabled: false
                    default_file: /opt/edge_ai_api/data/face_database.txt
        '500':
          description: Server error (failed to update configuration, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho face database connection
      operationId: faceDatabaseConnectionOptions
      tags:
      - Recognition
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/recognition/faces:
    get:
      summary: Liệt kê face subject
      description: 'Lấy danh sách tất cả face subject đã lưu, có hỗ trợ phân trang.

        You can filter by subject name or retrieve all subjects.


        This endpoint returns paginated results with face information including image_id and subject name.

        '
      operationId: listFaceSubjects
      tags:
      - Recognition
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
        description: Page number of examples to return. Used for pagination. Default value is 0.
        example: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Number of faces per page (page size). Used for pagination. Default value is 20.
        example: 20
      - name: subject
        in: query
        required: false
        schema:
          type: string
        description: Specifies the subject examples to return. If empty, returns examples for all subjects.
        example: subject1
      responses:
        '200':
          description: Đã lấy danh sách face subject thành công
          content:
            application/json:
              schema:
                type: object
                required:
                - faces
                - page_number
                - page_size
                - total_pages
                - total_elements
                properties:
                  faces:
                    type: array
                    description: Danh sách face subject
                    items:
                      type: object
                      required:
                      - image_id
                      - subject
                      properties:
                        image_id:
                          type: string
                          format: uuid
                          description: Unique identifier of the face
                          example: '{Edge}'
                        subject:
                          type: string
                          description: Subject (person) associated with the saved image
                          example: subject1
                  page_number:
                    type: integer
                    description: Current page number
                    example: 0
                  page_size:
                    type: integer
                    description: Requested page size
                    example: 20
                  total_pages:
                    type: integer
                    description: Total number of pages available
                    example: 2
                  total_elements:
                    type: integer
                    description: Total number of faces available
                    example: 12
              example:
                faces:
                - image_id: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                  subject: subject1
                - image_id: 7c246g6c-b476-5633-c2g2-5d0bd3ee1839
                  subject: subject1
                page_number: 0
                page_size: 20
                total_pages: 2
                total_elements: 12
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Đăng ký face subject
      description: 'Đăng ký face subject bằng cách lưu ảnh. Có thể thêm nhiều ảnh để huấn luyện hệ thống.

        Images should contain only a single face.


        **Face Detection Validation**: Before registration, the system performs mandatory face detection.

        If no face is detected in the uploaded image, the registration will be rejected with a 400 error.

        The user must upload a different image that contains a clear, detectable face.


        This endpoint accepts image data in two formats:

        1. **Multipart/form-data**: Upload file directly (recommended for file uploads)

        2. **Application/json**: Send base64-encoded image string


        Supported image formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP

        Maximum file size: 5MB


        The system will detect the face in the image and store the face features for recognition.

        '
      operationId: registerFaceSubject
      tags:
      - Recognition
      parameters:
      - name: subject
        in: query
        required: true
        schema:
          type: string
        description: Subject name to register (e.g., "subject1")
        example: subject1
      - name: det_prob_threshold
        in: query
        required: false
        schema:
          type: number
          format: float
          default: 0.5
        description: Detection probability threshold (0.0 to 1.0)
        example: 0.5
      requestBody:
        required: true
        description: 'Image data can be sent in two formats:

          1. Multipart/form-data: Upload file directly (recommended for file uploads)

          2. Application/json: Send base64-encoded image string


          Supported image formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP

          Maximum file size: 5MB

          '
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 'Image file to upload. Supported formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP. Max size:
                    5MB'
          application/json:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  description: 'Base64-encoded image data. Supported formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP. Max
                    size: 5MB'
                  example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
            example:
              file: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
      responses:
        '200':
          description: Face subject registered successfully
          content:
            application/json:
              schema:
                type: object
                required:
                - image_id
                - subject
                properties:
                  image_id:
                    type: string
                    format: uuid
                    description: Unique identifier for the registered image
                    example: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                  subject:
                    type: string
                    description: Subject name that was registered
                    example: subject1
              example:
                image_id: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                subject: subject1
        '400':
          description: 'Invalid request. Possible reasons:

            - Missing required query parameter: subject

            - Invalid image format or corrupted image data

            - No face detected in the uploaded image (registration will be rejected)

            - Face detected but confidence below threshold

            '
