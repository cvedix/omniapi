        Phản hồi gồm tổng số instance, số đang chạy, số đã dừng, và thông tin tóm tắt từng instance (ID, tên hiển thị, trạng
        thái, solution). Dùng để xem tổng quan mà không cần lấy chi tiết từng instance.

        '
      operationId: listInstances
      tags:
      - Instances
      responses:
