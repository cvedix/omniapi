        - Để bật khởi động lại tự động, đặt `auto_restart=true` làm tham số truy vấn hoặc trong body JSON

        - Khi `auto_restart=true`, máy chủ sẽ khởi động lại sau 3 giây nếu cấu hình web server thay đổi

