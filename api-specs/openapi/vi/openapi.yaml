      description: 'Đăng ký face subject bằng cách lưu ảnh. Có thể thêm nhiều ảnh để huấn luyện hệ thống.

        Ảnh nên chỉ chứa một khuôn mặt. **Xác thực phát hiện khuôn mặt:** Trước khi đăng ký, hệ thống thực hiện phát hiện
        khuôn mặt bắt buộc. Nếu không phát hiện khuôn mặt trong ảnh tải lên, đăng ký sẽ bị từ chối với lỗi 400. Người dùng
        cần tải lên ảnh khác có khuôn mặt rõ, có thể phát hiện. Endpoint này chấp nhận dữ liệu ảnh theo hai định dạng: 1)
        **Multipart/form-data**: Tải file trực tiếp (khuyến nghị); 2) **Application/json**: Gửi chuỗi ảnh mã hóa Base64. Định
        dạng ảnh hỗ trợ: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP. Kích thước file tối đa: 5MB. Hệ thống sẽ phát hiện khuôn
        mặt trong ảnh và lưu đặc trưng khuôn mặt để nhận diện.'
