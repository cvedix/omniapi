                    CrossingLines: '[{"id":"line1","name":"Entry Line","coordinates":[{"x":0,"y":250},{"x":700,"y":220}],"direction":"Up","classes":["Vehicle","Person"],"color":[255,0,0,255]},{"id":"line2","name":"Exit
                      Line","coordinates":[{"x":100,"y":400},{"x":800,"y":380}],"direction":"Down","classes":["Vehicle"],"color":[0,255,0,255]},{"id":"line3","name":"Center
                      Line","coordinates":[{"x":200,"y":300},{"x":900,"y":280}],"direction":"Both","classes":["Vehicle","Person"],"color":[0,0,255,255]}]'
