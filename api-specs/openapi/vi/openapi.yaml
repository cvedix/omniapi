    NodeResponse:
      type: object
      required:
      - nodeId
      - templateId
      - inUse
      - parameters
      - createdAt
      - input
      - output
      properties:
        nodeId:
          type: string
          description: Unique node identifier
          example: node_a1b2c3d4
        templateId:
          type: string
          description: Template ID used to create this node
          example: rtsp_src_template
        displayName:
          type: string
          description: Human-readable display name from template
          example: RTSP Source
        nodeType:
          type: string
          description: Node type from template
          example: rtsp_src
        category:
          type: string
          description: Node category from template
          enum:
          - source
          - detector
          - processor
          - destination
          - broker
          example: source
        description:
          type: string
          description: Node description from template
          example: Receive video stream from RTSP URL
        inUse:
          type: boolean
          description: Whether node is currently in use
          example: false
        parameters:
          type: object
          description: Node configuration parameters
          additionalProperties:
            type: string
          example:
            rtsp_url: rtsp://localhost:8554/stream1
            channel: '0'
            resize_ratio: '1.0'
        requiredParameters:
          type: array
          description: List of required parameter names (from template)
          items:
            type: string
          example:
          - rtsp_url
        optionalParameters:
          type: array
          description: List of optional parameter names (from template)
          items:
            type: string
          example:
          - channel
          - resize_ratio
        templateDetailUrl:
          type: string
          description: URL to get detailed template information
          example: /v1/core/node/template/rtsp_src_template
        parameterSchema:
          type: object
          description: 'Detailed schema for all parameters, providing UI-friendly metadata including:

            - Type information (string, number, integer, boolean)

            - Validation rules (min, max, pattern, enum)

            - UI hints (input type, widget type, placeholder)

            - Descriptions and examples

            - Categories for grouping

            '
          additionalProperties:
            type: object
            properties:
              name:
                type: string
                description: Parameter name
              type:
                type: string
                description: Parameter data type
                enum:
                - string
                - number
                - integer
                - boolean
              required:
                type: boolean
                description: Whether this parameter is required
              currentValue:
                type: string
                description: Current value of the parameter
              default:
                type: string
                description: Default value
              description:
                type: string
                description: Detailed description of the parameter
              category:
                type: string
                description: Parameter category for UI grouping
                enum:
                - connection
                - performance
                - model
                - output
                - display
                - general
              uiHints:
                type: object
                properties:
                  inputType:
                    type: string
                    description: HTML input type
                    enum:
                    - text
                    - number
                    - url
                    - file
                    - checkbox
                  widget:
                    type: string
                    description: Recommended UI widget type
                    enum:
                    - input
                    - slider
                    - switch
                    - url-input
                    - file-picker
                  placeholder:
                    type: string
                    description: Placeholder text for input field
              validation:
                type: object
                properties:
                  min:
                    type: number
                    description: Minimum value (for numbers)
                  max:
                    type: number
                    description: Maximum value (for numbers)
                  step:
                    type: number
                    description: Step value (for sliders)
                  pattern:
                    type: string
                    description: Regex pattern (for strings)
                  patternDescription:
                    type: string
                    description: Human-readable pattern description
                  enum:
                    type: array
                    description: Allowed values (for enums)
                    items:
                      type: string
              examples:
                type: array
                description: Example values
                items:
                  type: string
          example:
            rtsp_url:
              name: rtsp_url
              type: string
              required: true
              description: RTSP stream URL (e.g., rtsp://camera-ip:8554/stream)
              category: connection
              uiHints:
                inputType: url
                widget: url-input
                placeholder: rtsp://camera-ip:8554/stream
              validation:
                pattern: ^(rtsp|rtmp|http|https|file|udp)://.+
                patternDescription: Must be a valid URL (rtsp://, rtmp://, http://, https://, file://, or udp://)
              examples:
              - rtsp://192.168.1.100:8554/stream1
              - rtsp://admin:password@camera-ip:554/stream
            channel:
              name: channel
              type: integer
              required: false
              default: '0'
              currentValue: '0'
              description: Channel number for multi-channel processing (0-15)
              category: connection
              uiHints:
                inputType: number
                widget: input
                placeholder: '0'
              validation:
                min: 0
                max: 15
        input:
          type: array
          description: 'What this node requires as input from the pipeline. Each item describes the input type with details.

            - source nodes: external_source - receives input from external source (RTSP, file, etc.)

            - detector nodes: video_frames - requires video frames from previous node

            - processor nodes: video_frames, metadata - requires video frames and metadata

            - destination nodes: video_frames, metadata - requires video frames and metadata

            - broker nodes: metadata, detection_results - requires metadata and detection results

            '
          items:
            type: object
            properties:
              type:
                type: string
                description: Input type identifier
                example: video_frames
              description:
                type: string
                description: Detailed description of the input
                example: Video frames from previous node
              format:
                type: string
                description: Data format (if applicable)
                example: BGR/RGB image frames
              multiple:
                type: boolean
                description: Whether this input/output supports multiple connections
                example: false
              optional:
                type: boolean
                description: Whether this input is optional
                example: false
              minInputs:
                type: integer
                description: Minimum number of inputs required (for multiple inputs)
                example: 2
              maxInputs:
                type: integer
                description: Maximum number of inputs allowed (-1 for unlimited)
                example: -1
              maxOutputs:
                type: integer
                description: Maximum number of outputs (-1 for unlimited, only for outputs)
                example: -1
          example:
          - type: external_source
            description: Receives input from external source (file, RTSP, RTMP, etc.)
          - type: video_frames
            description: Video frames from multiple channels/nodes (supports multiple inputs)
            format: BGR/RGB image frames
            multiple: true
            minInputs: 2
            maxInputs: -1
        output:
          type: array
          description: 'What this node produces as output for the pipeline. Each item describes the output type with details
            including how to access it.

            - source nodes: video_frames - outputs video frames

            - detector nodes: video_frames, detection_results - outputs video frames and detection results

            - processor nodes: video_frames, metadata - outputs processed video frames and metadata

            - destination nodes: specific output type (rtsp_stream, rtmp_stream, video_file, etc.) - outputs to external destination

            - broker nodes: specific output type (mqtt_messages, kafka_messages, socket_messages, etc.) - outputs to external
            broker

            '
          items:
            type: object
            properties:
              type:
                type: string
                description: Output type identifier
                example: rtsp_stream
              description:
                type: string
                description: Detailed description of the output
                example: RTSP video stream
              protocol:
                type: string
                description: Protocol used (if applicable)
                example: RTSP
              format:
                type: string
                description: Data format (if applicable)
                example: MP4 video file
              accessInfo:
                type: string
                description: Information on how to access/use the output
                example: 'Access via RTSP URL: rtsp://<host>:8000/stream (default: rtsp://localhost:8000/stream)'
              example:
                type: string
                description: Example of how to access the output
                example: rtsp://localhost:8000/stream
              configurableParameters:
                type: array
                description: Parameters that can be configured to affect the output
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Parameter name
                      example: port
                    description:
                      type: string
                      description: Parameter description
                      example: RTSP server port
                    default:
                      type: string
                      description: Default value
                      example: '8000'
                    affects:
                      type: string
                      description: What part of the output this parameter affects
                      example: RTSP URL port
              multiple:
                type: boolean
                description: Whether this output supports multiple connections
                example: false
              maxOutputs:
                type: integer
                description: Maximum number of outputs (-1 for unlimited)
                example: -1
          example:
          - type: rtsp_stream
            description: RTSP video stream
            protocol: RTSP
            accessInfo: 'Access via RTSP URL: rtsp://<host>:8000/stream (default: rtsp://localhost:8000/stream)'
            example: rtsp://localhost:8000/stream
            configurableParameters:
            - name: port
              description: RTSP server port
              default: '8000'
              affects: RTSP URL port
            - name: stream_name
              description: RTSP stream name/path
              default: stream
              affects: RTSP URL path
        createdAt:
          type: string
          format: date-time
          description: Node creation timestamp (ISO 8601 format)
          example: '2025-01-15T10:30:00Z'
        message:
          type: string
          description: Success message (for create/update operations)
          example: Node created successfully
        oldNodeId:
          type: string
          description: Previous node ID (for update operations)
          example: node_old123
        newNodeId:
          type: string
          description: New node ID (for update operations)
          example: node_new456
