          description: Đã lấy thực thể analytics thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  crossingAreas:
                    type: array
                    description: Vùng vượt (crossing areas)
                    items:
                      type: object
                  intrusionAreas:
                    type: array
                    description: Vùng xâm nhập (intrusion areas)
                    items:
                      type: object
                  loiteringAreas:
                    type: array
                    description: Vùng lượn vòng (loitering areas)
                    items:
                      type: object
                  crowdingAreas:
                    type: array
                    description: Vùng tụ tập (crowding areas)
                    items:
                      type: object
                  occupancyAreas:
                    type: array
                    description: Vùng chiếm dụng (occupancy areas)
                    items:
                      type: object
                  crowdEstimationAreas:
                    type: array
                    description: Vùng ước lượng đám đông (crowd estimation areas)
                    items:
                      type: object
                  dwellingAreas:
                    type: array
                    description: Vùng trú ngụ (dwelling areas)
                    items:
                      type: object
                  armedPersonAreas:
                    type: array
                    description: Vùng người mang vũ khí (armed person areas)
                    items:
                      type: object
                  objectLeftAreas:
                    type: array
                    description: Vùng vật bỏ quên (object left areas)
                    items:
                      type: object
                  objectRemovedAreas:
                    type: array
                    description: Vùng vật bị dời (object removed areas)
                    items:
                      type: object
                  fallenPersonAreas:
                    type: array
                    description: Vùng người ngã (fallen person areas)
                    items:
                      type: object
                  crossingLines:
                    type: array
                    description: Đường vượt (crossing lines)
                    items:
                      type: object
                  countingLines:
                    type: array
                    description: Đường đếm (counting lines)
                    items:
                      type: object
                  tailgatingLines:
                    type: array
                    description: Đường bám đuôi (tailgating lines)
                    items:
                      type: object
              example:
                crossingAreas: []
                intrusionAreas: []
                loiteringAreas: []
                crowdingAreas: []
                occupancyAreas: []
                crowdEstimationAreas: []
                dwellingAreas: []
                armedPersonAreas: []
                objectLeftAreas: []
                objectRemovedAreas: []
                fallenPersonAreas: []
                crossingLines: []
                countingLines: []
                tailgatingLines: []
        '400':
