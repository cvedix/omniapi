        output:
          type: object
          description: Thông tin đầu ra
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - FILE
              - RTMP_STREAM
              description: Loại đầu ra
              example: FILE
            rtmpUrl:
              type: string
              description: URL RTMP (nếu type là RTMP_STREAM)
              example: rtmp://localhost:1935/live/face_stream
            rtspUrl:
              type: string
              description: URL RTSP để xem (nếu type là RTMP_STREAM và có sẵn)
              example: rtsp://localhost:8554/live/face_stream_0
            files:
              type: object
              description: Thông tin đầu ra file (nếu type là FILE)
              properties:
                exists:
                  type: boolean
                  description: Thư mục đầu ra có tồn tại hay không
                  example: true
                directory:
                  type: string
                  description: Đường dẫn thư mục đầu ra
                  example: ./output/abc-123-def
                fileCount:
                  type: integer
                  description: Tổng số file đầu ra
                  example: 15
                totalSizeBytes:
                  type: integer
                  format: int64
                  description: Tổng kích thước tất cả file đầu ra (byte)
                  example: 15728640
                totalSize:
                  type: string
                  description: Tổng kích thước định dạng chuỗi dễ đọc
                  example: 15 MB
                latestFile:
                  type: string
                  description: Tên file được tạo gần nhất
                  example: face_detection_20250115_143025.mp4
                latestFileTime:
                  type: string
                  description: Thời gian sửa đổi của file mới nhất
                  example: '2025-01-15 14:30:25'
                recentFileCount:
                  type: integer
                  description: Số file được tạo trong phút qua
                  example: 3
                isActive:
                  type: boolean
                  description: Instance có đang tạo file mới (file tạo trong phút qua) hay không
                  example: true
                expectedPaths:
                  type: array
                  items:
                    type: string
                  description: Các đường dẫn thư mục đầu ra dự kiến (nếu thư mục chưa tồn tại)
                  example:
                  - ./output/abc-123-def
                  - ./build/output/abc-123-def
                error:
                  type: string
                  description: Thông báo lỗi khi đọc thư mục thất bại
                  example: 'Error reading directory: Permission denied'
        detection:
          type: object
          description: Cài đặt phát hiện
          properties:
            sensitivity:
              type: string
              description: Mức độ nhạy phát hiện
              example: Low
            mode:
              type: string
              description: Chế độ detector
              example: SmartDetection
            movementSensitivity:
              type: string
              description: Mức độ nhạy chuyển động
              example: Low
            sensorModality:
              type: string
              description: Loại cảm biến
              example: RGB
        modes:
          type: object
          description: Các chế độ xử lý
          properties:
            statisticsMode:
              type: boolean
              description: Đã bật chế độ thống kê
              example: true
            metadataMode:
              type: boolean
              description: Đã bật chế độ metadata
              example: false
            debugMode:
              type: boolean
              description: Đã bật chế độ debug
              example: true
            diagnosticsMode:
              type: boolean
              description: Đã bật chế độ chẩn đoán
              example: false
        status:
          type: object
          description: Tóm tắt trạng thái
          required:
          - running
          - processing
          - message
          properties:
            running:
              type: boolean
              description: Instance có đang chạy hay không
              example: true
            processing:
              type: boolean
              description: Instance có đang xử lý khung hình (running && fps > 0) hay không
              example: true
            message:
              type: string
              description: Thông báo trạng thái dễ đọc
              example: Instance is running and processing frames
    LastFrameResponse:
      type: object
      description: Khung hình cuối từ instance đang chạy
      required:
      - frame
      - running
      properties:
        frame:
          type: string
          description: 'Khung JPEG mã hóa Base64. Chuỗi rỗng nếu không có khung.

            Khung được chụp từ pipeline sau xử lý (gồm OSD/overlay phát hiện).

            Khung được cache tự động khi pipeline xử lý khung mới.

            '
          example: 
        running:
          type: boolean
          description: Instance hiện có đang chạy hay không
          example: true
    InstanceStatisticsResponse:
      type: object
      description: Thống kê thời gian thực của instance
      required:
      - frames_processed
