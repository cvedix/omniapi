  /v1/recognition/recognize:
    post:
      summary: Nhận diện khuôn mặt từ ảnh tải lên
      description: 'Nhận diện khuôn mặt từ ảnh tải lên. Ảnh có thể gửi dạng base64

        in a multipart/form-data request. Returns face detection results including bounding boxes,

        landmarks, recognized subjects, and execution times.

        '
      operationId: recognizeFaces
      tags:
      - Recognition
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 0
        description: Maximum number of faces to recognize (0 = no limit). Recognizes the largest faces first.
      - name: prediction_count
        in: query
        required: false
        schema:
          type: integer
          default: 1
        description: Number of predictions to return per face
      - name: det_prob_threshold
        in: query
        required: false
        schema:
          type: number
          format: float
          default: 0.5
        description: Detection probability threshold (0.0 to 1.0)
      - name: threshold
        in: query
        required: false
        schema:
          type: number
          format: float
        description: Optional similarity threshold (0.0 to 1.0). If provided, subjects with similarity below this threshold
          will be filtered out. If omitted, returns top-N similarities without filtering.
      - name: face_plugins
        in: query
        required: false
        schema:
          type: string
        description: Face plugins to enable (comma-separated)
      - name: status
        in: query
        required: false
        schema:
          type: string
        description: Status filter
      - name: detect_faces
        in: query
        required: false
        schema:
          type: boolean
          default: true
        description: Whether to detect faces (true) or only recognize existing faces (false)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file as base64-encoded data or binary data
      responses:
        '200':
          description: Face recognition results
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/FaceRecognitionResult'
              example:
                result:
                - box:
                    probability: 1.0
                    x_max: 1420
                    y_max: 1368
                    x_min: 548
                    y_min: 295
                  landmarks:
                  - - 814
                    - 713
                  - - 1104
                    - 829
                  - - 832
                    - 937
                  - - 704
                    - 1030
                  - - 1017
                    - 1133
                  subjects:
                  - similarity: 0.97858
                    subject: subject1
                  execution_time:
                    age: 28.0
                    gender: 26.0
                    detector: 117.0
                    calculator: 45.0
                    mask: 36.0
        '400':
          description: Yêu cầu không hợp lệ (thiếu file, định dạng ảnh không hợp lệ, v.v.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho face recognition
      operationId: recognizeFacesOptions
      tags:
      - Recognition
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/recognition/search:
    post:
      summary: Tìm kiếm appearance subject
      description: 'Tìm khuôn mặt tương tự trong database từ ảnh khuôn mặt đầu vào.

        Returns a list of matching faces sorted by similarity (highest first) above the specified threshold.


        **How it works:**

        1. Detects faces in the uploaded image

        2. Extracts face embeddings from the first detected face

        3. Compares with all faces in the database

        4. Returns matches with similarity >= threshold, sorted from highest to lowest


        **Response fields:**

        - `image_id`: Unique identifier of the matched face

        - `subject`: Name of the matched subject

        - `similarity`: Cosine similarity score (0.0 - 1.0)

        - `face_image`: Base64 encoded face image (reserved for future use)

        '
      operationId: searchAppearanceSubject
      tags:
      - Recognition
      parameters:
      - name: threshold
        in: query
        required: false
        schema:
          type: number
          format: float
          default: 0.5
          minimum: 0.0
          maximum: 1.0
        description: Minimum similarity threshold for matches (0.0 - 1.0)
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
        description: Maximum number of results to return (0 = no limit)
      - name: det_prob_threshold
        in: query
        required: false
        schema:
          type: number
          format: float
          default: 0.5
          minimum: 0.0
          maximum: 1.0
        description: Face detection probability threshold
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file containing a face to search
              required:
              - file
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: base64
                  description: Base64 encoded image data
              required:
              - file
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        image_id:
                          type: string
                          description: Unique identifier of the matched face
                        subject:
                          type: string
                          description: Name of the matched subject
                        similarity:
                          type: number
                          format: float
                          description: Cosine similarity score (0.0 - 1.0)
                        face_image:
                          type: string
                          description: Base64 encoded face image (reserved for future use)
                  faces_found:
                    type: integer
                    description: Number of matching faces found
                  threshold:
                    type: number
                    format: float
                    description: Threshold used for search
              example:
                result:
                - image_id: abc123-def456-ghi789
                  subject: John Doe
                  similarity: 0.95
                  face_image: ''
                - image_id: xyz789-uvw456-rst123
                  subject: Jane Smith
                  similarity: 0.82
                  face_image: ''
                faces_found: 2
                threshold: 0.5
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho tìm kiếm appearance subject
      operationId: searchAppearanceSubjectOptions
      tags:
      - Recognition
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/recognition/subjects/{subject}:
    put:
      summary: Đổi tên face subject
      description: "Renames an existing face subject. This endpoint searches for the face subject name in the face database\n\
        and allows you to select and rename that subject.\n\n**How it works:**\n1. The endpoint searches for the subject name\
        \ specified in the URL path (`{subject}`) in the face database.\n2. If found, it renames the subject to the new name\
        \ provided in the request body.\n3. All face registrations associated with the old subject name are updated to use\
        \ the new name.\n\n**Behavior:**\n- If the new subject name does not exist, all faces from the old subject are moved\
        \ to the new name.\n- If the new subject name already exists, the subjects are merged. The embeddings are averaged\
        \ and\n  all faces from the old subject are reassigned to the subject with the new name, and the old subject is removed.\n\
        - All image_id mappings are automatically updated to reflect the new subject name.\n- The face database file is updated\
        \ to persist the changes.\n\n**Note:** The subject name in the URL path must match exactly with a subject name in\
        \ the database.\nUse GET /v1/recognition/faces to list all available subjects.\n\nThis endpoint is available since\
        \ version 0.6.\n"
      operationId: renameSubject
      tags:
      - Recognition
      parameters:
      - name: subject
        in: path
        required: true
        schema:
          type: string
        description: 'The current subject name to rename. This must match exactly with a subject name in the face database.

          Use GET /v1/recognition/faces to see all available subjects.

          '
        example: subject1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameSubjectRequest'
            example:
              subject: testing_face
      responses:
        '200':
          description: Subject renamed successfully
          content:
            application/json:
              schema:
                type: object
                required:
                - updated
                - old_subject
                - new_subject
                - message
                properties:
                  updated:
                    type: string
                    enum:
                    - 'true'
                    description: Indicates the operation was successful
                  old_subject:
                    type: string
                    description: The original subject name
                    example: subject1
                  new_subject:
                    type: string
                    description: The new subject name
                    example: testing_face
                  message:
                    type: string
                    description: Success message
                    example: Subject renamed successfully
              example:
                updated: 'true'
                old_subject: subject1
                new_subject: testing_face
                message: Subject renamed successfully
        '400':
          description: Bad request (subject not found, missing subject, invalid JSON, etc.)
          content:
            application/json:
              schema:
                type: object
                required:
                - updated
                - error
                - old_subject
                properties:
                  updated:
                    type: string
                    enum:
                    - 'false'
                    description: Indicates the operation failed
                  error:
                    type: string
                    description: Error message explaining why the rename failed
                    example: Subject 'subject1' not found in face database
                  old_subject:
                    type: string
                    description: The subject name that was attempted to be renamed
                    example: subject1
              example:
                updated: 'false'
                error: Subject 'subject1' not found in face database
                old_subject: subject1
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho đổi tên subject
      operationId: renameSubjectOptions
      tags:
      - Recognition
      responses:
        '200':
          description: Phản hồi CORS preflight
