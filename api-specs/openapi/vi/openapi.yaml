  /v1/core/instance/{instanceId}:
    get:
      summary: Lấy thông tin chi tiết instance
      description: 'Trả về thông tin chi tiết của một instance: cấu hình đầy đủ, trạng thái, runtime information.


        The response includes:

        - Instance configuration (display name, group, solution, etc.)

        - Runtime status (running, loaded, FPS, etc.)

        - Configuration settings (detector mode, sensitivity, frame rate limits, etc.)

        - Input/Output configuration

        - Originator information


        The instance must exist. If the instance is not found, a 404 error will be returned.

        '
      operationId: getInstance
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Instance ID (UUID)
      responses:
        '200':
          description: Instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceInfo'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Cập nhật thông tin instance
      description: 'Cập nhật cấu hình instance. Chỉ các trường gửi lên được cập nhật. Hỗ trợ hai kiểu update formats:


        **Update Format 1: Field-by-field (camelCase)**

        - Update individual fields like `name`, `group`, `autoStart`, `frameRateLimit`, etc.

        - Use `additionalParams` to update solution-specific parameters (RTSP_URL, MODEL_PATH, etc.)


        **Update Format 2: Direct Config (PascalCase)**

        - Update using PascalCase format matching instance config file

        - Can update `Input`, `Output`, `Detector`, `Zone`, etc. directly


        **Behavior:**

        - If the instance is currently running, it will be automatically restarted to apply the changes

        - If the instance is not running, changes will take effect when the instance is started

        - The instance must exist and not be read-only

        - Only provided fields will be updated; other fields remain unchanged

        '
      operationId: updateInstance
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Instance ID (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInstanceRequest'
      responses:
        '200':
          description: Instance updated successfully
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/InstanceInfo'
                - type: object
                  properties:
                    message:
                      type: string
                      example: Instance updated successfully
        '400':
          description: Yêu cầu không hợp lệ hoặc validation thất bại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Cập nhật instance với dữ liệu một phần (patch)
      description: 'Cập nhật instance với dữ liệu một phần (tương tự PUT nhưng dành cho partial updates) where only specific
        fields need to be changed.


        **Difference from PUT:**

        - **PATCH**: Explicitly designed for partial updates, only update provided fields

        - **PUT**: Can be used for full or partial updates


        **Behavior:**

        - Only provided fields will be updated; other fields remain unchanged

        - Supports both camelCase (field-by-field) and PascalCase (direct config) formats

        - If the instance is currently running, it will be automatically restarted to apply the changes

        - The instance must exist and not be read-only


        **Use Cases:**

        - Update a single field (e.g., just the name)

        - Update a few related fields

        - Partial configuration updates


        **Example:**

        Update only the instance name:

        ```json

        {

        "name": "Updated Instance Name"

        }

        ```


        Update name and frame rate limit:

        ```json

        {

        "name": "Updated Instance Name",

        "frameRateLimit": 30

        }

        ```

        '
      operationId: corePatchInstanceV1
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Instance ID (UUID)
        example: '{threshold}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInstanceRequest'
            examples:
              updateName:
                summary: Chỉ cập nhật tên instance
                value:
                  name: Updated Instance Name
              updateMultiple:
                summary: Cập nhật nhiều trường
                value:
                  name: Updated Instance Name
                  frameRateLimit: 30
                  autoStart: true
      responses:
        '204':
          description: Instance updated successfully
        '400':
          description: Bad request (parsing error or invalid arguments)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Bad request
                message: Invalid request body or validation failed
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: 'Instance not found: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Internal Server Error
                message: Failed to update instance
    options:
      summary: CORS preflight cho cập nhật instance
      operationId: updateInstanceOptions
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Instance ID (UUID)
      responses:
        '200':
          description: Phản hồi CORS preflight
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: '*'
            Access-Control-Allow-Methods:
              schema:
                type: string
                example: GET, PUT, PATCH, DELETE, OPTIONS
            Access-Control-Allow-Headers:
              schema:
                type: string
                example: Content-Type, Authorization
    delete:
      summary: Xóa một instance
      description: 'Xóa instance và dừng pipeline nếu đang chạy. Thao tác xóa vĩnh viễn instance khỏi the system.


        **Behavior:**

        - If the instance is currently running, it will be stopped first

        - The instance configuration will be removed from memory

        - If the instance is persistent, its configuration file will be deleted from storage

        - All resources associated with the instance will be released


        **Prerequisites:**

        - Instance must exist

        - Instance must not be read-only (system instances cannot be deleted)


        **Note:** This operation cannot be undone. Once deleted, the instance must be recreated using the create instance
        endpoint.

        '
      operationId: deleteInstance
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Instance ID (UUID)
      responses:
        '200':
          description: Instance deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  instanceId:
                    type: string
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/instance/{instanceId}/classes:
