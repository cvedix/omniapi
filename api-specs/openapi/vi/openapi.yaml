  /v1/core/instance/{instanceId}/load:
    post:
      summary: Nạp instance vào bộ nhớ
      description: 'Nạp instance vào bộ nhớ và khởi tạo state storage. Khác với start instance - loading prepares the instance
        and enables state management, while starting begins the processing pipeline.


        **Behavior:**

        - Instance must exist

        - If instance is already loaded, returns 406 Not Acceptable

        - Initializes state storage for the instance

        - Instance can be loaded without being started (running)


        **Use Cases:**

        - Prepare instance for state management

        - Load instance into memory before setting runtime state

        - Manage memory and resources


        **Note:** State can only be set/get when instance is loaded. State is cleared when instance is unloaded.

        '
      operationId: coreLoadInstanceV1
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the instance (UUID)
        example: '{instanceId}'
      responses:
        '204':
          description: Instance loaded successfully
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: 'Instance not found: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '406':
          description: Cannot load instance (already loaded or invalid state)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not Acceptable
                message: 'Cannot load instance: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho nạp instance
      operationId: loadInstanceOptions
      tags:
      - Instances
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/instance/{instanceId}/output:
