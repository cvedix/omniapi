              schema:
                oneOf:
                - type: object
                  required:
                  - image_id
                  - subject
                  properties:
                    image_id:
                      type: string
                      description: UUID of the deleted face subject
                      example: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                    subject:
                      type: string
                      description: Name of the person associated with the deleted face
                      example: subject1
                - type: object
                  required:
                  - subject
                  - deleted_count
                  - image_ids
                  properties:
                    subject:
                      type: string
                      description: Name of the subject that was deleted
                      example: subject1
                    deleted_count:
