  /v1/recognition/search:
    post:
      summary: Tìm kiếm appearance subject
      description: 'Tìm khuôn mặt tương tự trong database từ ảnh khuôn mặt đầu vào.

        Trả về danh sách khuôn mặt khớp, sắp xếp theo độ tương đồng (cao nhất trước) trên ngưỡng chỉ định.


        **Cách hoạt động:** 1. Phát hiện khuôn mặt trong ảnh tải lên. 2. Trích embedding từ khuôn mặt đầu tiên. 3. So sánh
        với mọi khuôn mặt trong database. 4. Trả về các kết quả có similarity >= ngưỡng, sắp xếp từ cao đến thấp.


        **Trường phản hồi:** `image_id` - định danh khuôn mặt khớp; `subject` - tên subject; `similarity` - điểm tương đồng
        cosine (0.0 - 1.0); `face_image` - ảnh khuôn mặt Base64 (dự phòng).'
      operationId: searchAppearanceSubject
      tags:
      - Recognition
      parameters:
      - name: threshold
        in: query
        required: false
        schema:
          type: number
          format: float
          default: 0.5
          minimum: 0.0
          maximum: 1.0
        description: Ngưỡng độ tương đồng tối thiểu cho kết quả khớp (0.0 - 1.0)
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
        description: Số kết quả tối đa trả về (0 = không giới hạn)
      - name: det_prob_threshold
        in: query
        required: false
        schema:
          type: number
          format: float
          default: 0.5
          minimum: 0.0
          maximum: 1.0
        description: Ngưỡng xác suất phát hiện khuôn mặt
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File ảnh chứa khuôn mặt cần tìm
              required:
              - file
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: base64
                  description: Dữ liệu ảnh mã hóa Base64
              required:
              - file
      responses:
        '200':
          description: Kết quả tìm kiếm
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        image_id:
                          type: string
                          description: Định danh duy nhất của khuôn mặt khớp
                        subject:
                          type: string
                          description: Tên subject khớp
                        similarity:
                          type: number
                          format: float
                          description: Điểm độ tương đồng cosine (0.0 - 1.0)
                        face_image:
                          type: string
                          description: Ảnh khuôn mặt mã hóa Base64 (dự phòng cho tương lai)
                  faces_found:
                    type: integer
                    description: Số khuôn mặt khớp tìm được
                  threshold:
                    type: number
                    format: float
                    description: Ngưỡng dùng cho tìm kiếm
              example:
                result:
                - image_id: abc123-def456-ghi789
                  subject: John Doe
                  similarity: 0.95
                  face_image: ''
                - image_id: xyz789-uvw456-rst123
                  subject: Jane Smith
                  similarity: 0.82
                  face_image: ''
                faces_found: 2
                threshold: 0.5
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho tìm kiếm appearance subject
      operationId: searchAppearanceSubjectOptions
      tags:
      - Recognition
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/recognition/subjects/{subject}:
    put:
      summary: Đổi tên face subject
      description: 'Đổi tên một face subject có sẵn. Endpoint tìm tên subject trong face database và cho phép đổi tên.


        **Cách hoạt động:** 1. Endpoint tìm tên subject trong đường dẫn URL (`{subject}`) trong face database. 2. Nếu tìm
        thấy, đổi tên subject sang tên mới trong body. 3. Mọi đăng ký face gắn với tên cũ được cập nhật sang tên mới.


        **Hành vi:** Nếu tên subject mới chưa tồn tại, mọi khuôn mặt từ subject cũ được chuyển sang tên mới. Nếu tên mới đã
        tồn tại, các subject được gộp (embedding trung bình, mọi face của subject cũ gán sang subject tên mới, subject cũ
        bị xóa). Mọi ánh xạ image_id được cập nhật tự động. File face database được cập nhật để lưu thay đổi.


        **Lưu ý:** Tên subject trong đường dẫn URL phải khớp chính xác với một tên trong database. Dùng GET /v1/recognition/faces
        để liệt kê tất cả subject. Endpoint có từ phiên bản 0.6.'
      operationId: renameSubject
      tags:
      - Recognition
      parameters:
      - name: subject
        in: path
        required: true
        schema:
          type: string
        description: Tên subject hiện tại cần đổi. Phải khớp chính xác với một tên trong face database. Dùng GET /v1/recognition/faces
          để xem tất cả subject.
        example: subject1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameSubjectRequest'
            example:
              subject: testing_face
      responses:
        '200':
          description: Đã đổi tên subject thành công
          content:
            application/json:
              schema:
                type: object
                required:
                - updated
                - old_subject
                - new_subject
                - message
                properties:
                  updated:
                    type: string
                    enum:
                    - 'true'
                    description: Cho biết thao tác thành công
                  old_subject:
                    type: string
                    description: Tên subject gốc
                    example: subject1
                  new_subject:
                    type: string
                    description: Tên subject mới
                    example: testing_face
                  message:
                    type: string
                    description: Thông báo thành công
                    example: Đã đổi tên subject thành công
              example:
                updated: 'true'
                old_subject: subject1
                new_subject: testing_face
                message: Đã đổi tên subject thành công
        '400':
          description: Yêu cầu không hợp lệ (không tìm thấy subject, thiếu subject, JSON không hợp lệ, v.v.)
          content:
            application/json:
              schema:
                type: object
                required:
                - updated
                - error
                - old_subject
                properties:
                  updated:
                    type: string
                    enum:
                    - 'false'
                    description: Cho biết thao tác thất bại
                  error:
                    type: string
                    description: Thông báo lỗi giải thích vì sao đổi tên thất bại
                    example: Không tìm thấy subject 'subject1' trong face database
                  old_subject:
                    type: string
                    description: Tên subject đã thử đổi
                    example: subject1
              example:
                updated: 'false'
                error: Không tìm thấy subject 'subject1' trong face database
                old_subject: subject1
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho đổi tên subject
      operationId: renameSubjectOptions
      tags:
      - Recognition
      responses:
        '200':
          description: Phản hồi CORS preflight
