    post:
      summary: Khởi động lại nhiều instance đồng thời
      description: Khởi động lại nhiều instance đồng thời bằng cách dừng rồi khởi động. Mọi thao tác chạy song song để tối
        ưu hiệu năng.
      operationId: batchRestartInstances
      tags:
      - Instances
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - instanceIds
              properties:
                instanceIds:
                  type: array
                  items:
                    type: string
                  description: Mảng định danh instance cần khởi động lại
                  example:
                  - instance-1
                  - instance-2
                  - instance-3
      responses:
        '200':
          description: Đã hoàn thành thao tác khởi động lại hàng loạt
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        instanceId:
                          type: string
                        success:
                          type: boolean
                        status:
                          type: string
                        running:
                          type: boolean
                        error:
                          type: string
                  total:
                    type: integer
                  success:
                    type: integer
                  failed:
                    type: integer
                  message:
                    type: string
              example:
                results:
                - instanceId: instance-1
                  success: true
