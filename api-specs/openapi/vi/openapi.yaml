          description: Frame rate xử lý hiện tại (FPS đang xử lý)
          example: 25.5
        latency:
          type: number
          format: double
          description: Độ trễ xử lý trung bình mỗi khung (miligiây)
          example: 200.0
        start_time:
          type: integer
          format: int64
          description: Unix timestamp khi instance khởi động (giây)
          example: 1764900520
        input_queue_size:
          type: integer
          format: int64
          description: Kích thước hiện tại của hàng đợi đầu vào
          example: 2
        dropped_frames_count:
          type: integer
          format: int64
          description: Tổng số khung hình bị bỏ qua
          example: 5
        resolution:
          type: string
          description: Độ phân giải xử lý hiện tại (định dạng WIDTHxHEIGHT)
          example: 1280x720
        format:
          type: string
          description: Định dạng khung (thường là BGR cho CVEDIX SDK)
          example: BGR
        source_resolution:
          type: string
          description: Độ phân giải gốc từ nguồn (định dạng WIDTHxHEIGHT)
          example: 1920x1080
    SolutionSummary:
      type: object
