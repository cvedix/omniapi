                message: 'Không tìm thấy instance: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '406':
          description: Không thể nạp instance (đã nạp hoặc trạng thái không hợp lệ)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Không chấp nhận
                message: 'Không thể nạp instance: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '500':
