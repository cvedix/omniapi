        **Hành vi:** Nếu instance đã dừng thì yêu cầu vẫn thành công. Pipeline được dừng đúng cách và mọi tài nguyên được
        giải phóng. Xử lý dừng ngay. Trả về thông tin instance với `running: false`. **Lưu ý:** Dừng instance có thể mất vài
        giây khi pipeline được dọn dẹp. Cấu hình instance được giữ và có thể start lại bằng endpoint start.'
