              schema:
                type: object
                properties:
                  solutionId:
                    type: string
                    description: Định danh solution
                    example: face_detection
                  solutionName:
                    type: string
                    description: Tên hiển thị solution
                    example: Face Detection
                  solutionType:
                    type: string
                    description: Loại solution
                    example: face_detection
