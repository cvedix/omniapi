                      CONFIG_PATH: /home/cvedix/project/edgeos-api/cvedix_data/models/det_cls/yolov3-tiny-2022-0721.cfg
                      LABELS_PATH: /home/cvedix/project/edgeos-api/cvedix_data/models/det_cls/yolov3_tiny_5classes.txt
                      RESIZE_RATIO: '1.0'
                    output:
