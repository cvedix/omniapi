  /v1/core/instance/{instanceId}/state:
    get:
      summary: Lấy trạng thái runtime của instance
      description: 'Trả về trạng thái runtime của instance. State khác config — state chứa thiết lập runtime that only exist
        when the instance is loaded, while config contains persistent settings that are stored in files.


        **State vs Config:**

        - **State**: Runtime settings, in-memory only, cleared when instance is unloaded

        - **Config**: Persistent settings, stored in files, persists after restart


        **Behavior:**

        - Instance must exist and be loaded (or running)

        - Returns empty object `{}` if no state has been set

        - State is cleared when instance is unloaded


        **Use Cases:**

        - Get runtime settings and flags

        - Check runtime state values

        - Monitor runtime configuration


        **Note:** State does not persist after unload or restart. For persistent configuration, use the config endpoint.

        '
      operationId: coreGetInstanceStateV1
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the instance (UUID)
        example: '{instanceId}'
      responses:
        '200':
          description: Instance state retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceState'
              examples:
                emptyState:
                  summary: Empty state (no state set)
                  value: {}
                withState:
                  summary: State with values
                  value:
                    runtime:
                      mode: production
                      debug:
                        enabled: false
                    metrics:
                      interval: 60
                    Output:
                      handlers:
                        Mqtt:
                          enabled: true
                          broker: localhost
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: 'Instance not found: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '406':
          description: Instance not loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not Acceptable
                message: 'Instance not loaded: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Đặt giá trị trạng thái runtime tại đường dẫn cụ thể
      description: 'Đặt giá trị runtime state tại đường dẫn chỉ định. State khác config — state chứa thiết lập runtime settings
        that only exist when the instance is loaded, while config contains persistent settings.


        **State vs Config:**

        - **State**: Runtime settings, in-memory only, cleared when instance is unloaded

        - **Config**: Persistent settings, stored in files, persists after restart


        **Behavior:**

        - Instance must exist and be loaded (or running)

        - If instance is running but not loaded, state storage will be initialized

        - Path uses forward slashes "/" for nested structures

        - State is cleared when instance is unloaded


        **Path Examples:**

        - Simple path: `"testValue"` - Sets top-level testValue

        - Nested path: `"Output/handlers/Mqtt"` - Sets Mqtt handler in Output.handlers

        - Deep nested: `"runtime/debug/enabled"` - Sets enabled flag in runtime.debug


        **jsonValue Format:**

        - For string values: `"\"my string\""` (escaped JSON string)

        - For object values: `"{\"key\":\"value\"}"` (escaped JSON object)

        - For number values: `"123"` or `"45.67"`

        - For boolean values: `"true"` or `"false"`


        **Use Cases:**

        - Set runtime flags and settings

        - Configure runtime behavior

        - Update temporary runtime values


        **Note:** State does not persist after unload or restart. For persistent configuration, use the config endpoint.

        '
      operationId: corePostInstanceStateV1
      tags:
      - Instances
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the instance (UUID)
        example: '{instanceId}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetStateRequest'
            examples:
              stringValue:
                summary: Set string value
                value:
                  path: runtime/mode
                  jsonValue: '"production"'
              objectValue:
                summary: Set object value
                value:
                  path: Output/handlers/Mqtt
                  jsonValue: '{"enabled":true,"broker":"localhost","port":1883}'
              nestedPath:
                summary: Set nested path value
                value:
                  path: runtime/debug/enabled
                  jsonValue: 'true'
      responses:
        '204':
          description: State value set successfully
        '400':
          description: Bad request (invalid input, missing required fields, or invalid JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Bad request
                message: Field 'jsonValue' must contain valid JSON
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: 'Instance not found: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '406':
          description: Instance not loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not Acceptable
                message: 'Instance not loaded: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
