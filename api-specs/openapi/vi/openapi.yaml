  /v1/securt/instance/{instanceId}/areas:
    get:
      summary: Lấy tất cả vùng phân tích (analytics areas) của instance SecuRT
      description: Trả về tất cả vùng phân tích đã cấu hình cho instance SecuRT, gồm vùng vượt (crossing), xâm nhập (intrusion),
        lượn (loitering), tụ tập (crowding), chiếm dụng (occupancy), ước lượng đám đông (crowd estimation), cư trú (dwelling),
        người mang vũ khí (armed person), vật bỏ quên (object left), vật bị dời (object removed), người ngã (fallen person),
        bảo vệ xe (vehicle guard - thử nghiệm), che mặt (face covered - thử nghiệm).
      operationId: getSecuRTAreas
      tags:
      - Area SecuRT
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh instance
      responses:
        '200':
          description: Đã lấy vùng phân tích thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  crossing:
                    type: array
                    description: Vùng vượt (crossing)
                    items:
                      $ref: '#/components/schemas/CrossingAreaRead'
                  intrusion:
                    type: array
                    description: Vùng xâm nhập (intrusion)
                    items:
                      $ref: '#/components/schemas/IntrusionAreaRead'
                  loitering:
                    type: array
                    description: Vùng lượn (loitering)
                    items:
                      $ref: '#/components/schemas/LoiteringAreaRead'
                  crowding:
                    type: array
                    description: Vùng tụ tập (crowding)
                    items:
                      $ref: '#/components/schemas/CrowdingAreaRead'
                  occupancy:
                    type: array
                    description: Vùng chiếm dụng (occupancy)
                    items:
                      $ref: '#/components/schemas/OccupancyAreaRead'
                  crowdEstimation:
                    type: array
                    description: Vùng ước lượng đám đông (crowd estimation)
                    items:
                      $ref: '#/components/schemas/CrowdEstimationAreaRead'
                  dwelling:
                    type: array
                    description: Vùng cư trú (dwelling)
                    items:
                      $ref: '#/components/schemas/DwellingAreaRead'
                  armedPerson:
                    type: array
                    description: Vùng người mang vũ khí (armed person)
                    items:
                      $ref: '#/components/schemas/ArmedPersonAreaRead'
                  objectLeft:
                    type: array
                    description: Vùng vật bỏ quên (object left)
                    items:
                      $ref: '#/components/schemas/ObjectLeftAreaRead'
                  objectRemoved:
                    type: array
                    description: Vùng vật bị dời (object removed)
                    items:
                      $ref: '#/components/schemas/ObjectRemovedAreaRead'
                  fallenPerson:
                    type: array
                    description: Vùng người ngã (fallen person)
                    items:
                      $ref: '#/components/schemas/FallenPersonAreaRead'
                  vehicleGuard:
                    type: array
                    description: Vùng bảo vệ xe (vehicle guard - thử nghiệm)
                    items:
                      $ref: '#/components/schemas/VehicleGuardAreaRead'
                  faceCovered:
                    type: array
                    description: Vùng che mặt (face covered - thử nghiệm)
                    items:
                      $ref: '#/components/schemas/FaceCoveredAreaRead'
              example:
                crossing: []
                intrusion: []
                loitering: []
                crowding: []
                occupancy: []
                crowdEstimation: []
                dwelling: []
                armedPerson: []
                objectLeft: []
                objectRemoved: []
                fallenPerson: []
                vehicleGuard: []
                faceCovered: []
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho areas
      operationId: getSecuRTAreasOptions
      tags:
      - Area SecuRT
      responses:
        '200':
          description: Phản hồi CORS preflight
    delete:
