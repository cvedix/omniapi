openapi: 3.0.3
info:
  title: API Edge AI
  description: 'REST API cho các thao tác và quản lý Edge AI.


    ## Tính năng Ghi log


    Máy chủ hỗ trợ các tính năng ghi log chi tiết có thể được bật qua các tham số dòng lệnh:


    - **Ghi log API** (`--log-api` hoặc `--debug-api`): Ghi lại tất cả các yêu cầu và phản hồi API cùng với thời gian phản
    hồi

    - **Ghi log Thực thi Instance** (`--log-instance` hoặc `--debug-instance`): Ghi lại các sự kiện vòng đời instance (start/stop/status)

    - **Ghi log Đầu ra SDK** (`--log-sdk-output` hoặc `--debug-sdk-output`): Ghi lại đầu ra SDK khi các instance xử lý dữ
    liệu


    Ví dụ sử dụng:

    ```bash

    ./edgeos-api --log-api --log-instance --log-sdk-output

    ```


    Để biết thêm chi tiết, xem [Tài liệu Ghi log](../docs/LOGGING.md).


    ## Swagger UI


    API này cung cấp Swagger UI để kiểm thử và khám phá tương tác:

    - Truy cập Swagger UI tại `/swagger` hoặc `/v1/swagger`

    - Đặc tả OpenAPI có sẵn tại `/openapi.yaml` hoặc `/v1/openapi.yaml`

    - URL máy chủ được cập nhật tự động dựa trên các biến môi trường (`API_HOST` và `API_PORT`)


    ## Bind server và khởi động lại


    - **Chế độ bind:** Cấu hình ai được kết nối: `127.0.0.1` hoặc `bind_mode: "local"` = chỉ máy local; `0.0.0.0` hoặc `bind_mode:
    "public"` = chấp nhận từ mọi mạng. Đặt trong config (vd. `system.web_server`) hoặc qua `API_HOST`.

    - **Áp dụng thay đổi:** Thay đổi host/port cần restart server. Khi cập nhật config qua **POST/PUT/PATCH** `/v1/core/config`,
    đặt `auto_restart=true` (query hoặc body) để server tự khởi động lại sau 3 giây.

    '
  version: 1.0.0
  contact:
    name: Hỗ trợ edgeos-api
servers:
- url: http://localhost:8080
  description: Máy chủ phát triển cục bộ
- url: http://0.0.0.0:8080
  description: Máy chủ mặc định
paths:
  /v1/core/ai/batch:
    post:
      summary: Xử lý hàng loạt hình ảnh/khung hình
      description: 'Xử lý nhiều hình ảnh/khung hình trong một lô qua pipeline xử lý AI.

        Hiện tại trả về 501 Not Implemented.

        '
      operationId: processBatch
      tags:
      - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                images:
                  type: array
                  description: Mảng các hình ảnh được mã hóa Base64
                  items:
                    type: string
                config:
                  type: string
                  description: Cấu hình xử lý (chuỗi JSON)
      responses:
        '200':
          description: Công việc xử lý hàng loạt đã được gửi thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_ids:
                    type: array
                    items:
                      type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Chưa triển khai
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/ai/metrics:
    get:
      summary: Lấy số liệu xử lý AI
      description: 'Trả về số liệu chi tiết về xử lý AI bao gồm thống kê hiệu suất,

        thống kê cache và thông tin giới hạn tốc độ.

        '
      operationId: getAIMetrics
      tags:
      - AI
      responses:
        '200':
          description: Số liệu xử lý AI
          content:
            application/json:
              schema:
                type: object
                properties:
                  cache:
                    type: object
                    properties:
                      size:
                        type: integer
                        format: int64
                        description: Kích thước cache hiện tại
                      max_size:
                        type: integer
                        format: int64
                        description: Dung lượng cache tối đa
                      hit_rate:
                        type: number
                        format: float
                        description: Tỷ lệ cache hit (0.0 đến 1.0)
                  rate_limiter:
                    type: object
                    properties:
                      total_keys:
                        type: integer
                        format: int64
                        description: Tổng số khóa giới hạn tốc độ
                      active_keys:
                        type: integer
                        format: int64
                        description: Số lượng khóa giới hạn tốc độ đang hoạt động
  /v1/core/ai/process:
    post:
      summary: Xử lý một hình ảnh/khung hình
      description: 'Xử lý một hình ảnh/khung hình qua pipeline xử lý AI.

        Hỗ trợ hàng đợi dựa trên độ ưu tiên và giới hạn tốc độ.

        '
      operationId: processImage
      tags:
      - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - image
              properties:
                image:
                  type: string
                  description: Dữ liệu hình ảnh được mã hóa Base64
                  example: /9j/4AAQSkZJRg...
                config:
                  type: string
                  description: Cấu hình xử lý (chuỗi JSON)
                  example: '{"model": "yolo", "threshold": 0.5}'
                priority:
                  type: string
                  enum:
                  - low
                  - medium
                  - high
                  default: medium
                  description: Độ ưu tiên yêu cầu
      responses:
        '200':
          description: Công việc xử lý đã được gửi thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    description: Định danh công việc duy nhất
                    example: job_1234567890
                  status:
                    type: string
                    example: queued
        '400':
          description: Yêu cầu không hợp lệ (JSON không hợp lệ hoặc thiếu trường bắt buộc)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Vượt giới hạn tốc độ (rate limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Chưa triển khai
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/ai/status:
    get:
      summary: Lấy trạng thái xử lý AI
      description: 'Trả về trạng thái hiện tại của hệ thống xử lý AI bao gồm kích thước hàng đợi,

        dung lượng tối đa hàng đợi, khả năng sử dụng GPU và thông tin tài nguyên khác.

        '
      operationId: getAIStatus
      tags:
      - AI
      responses:
        '200':
          description: Trạng thái xử lý AI
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue_size:
                    type: integer
                    format: int64
                    description: Số lượng mục hiện tại trong hàng đợi xử lý
                    example: 5
                  queue_max:
                    type: integer
                    format: int64
                    description: Dung lượng hàng đợi tối đa
                    example: 100
                  gpu_total:
                    type: integer
                    format: int64
                    description: Tổng số GPU có sẵn
                    example: 2
                  gpu_available:
                    type: integer
                    format: int64
                    description: Số lượng GPU có sẵn
                    example: 1
  /v1/core/instance/{instanceId}/jams:
    get:
      summary: Lấy tất cả vùng kẹt xe (jam zones)
      description: 'Trả về tất cả các vùng kẹt xe (jam zones) đã cấu hình cho instance ba_jam. Jam zones định nghĩa các ROI
        nơi thực hiện phát hiện ùn tắc giao thông.

        '
      operationId: getAllJams
      tags:
      - Area Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của instance
        example: '{instanceId}'
      responses:
        '200':
          description: Danh sách vùng kẹt xe (jam zones)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JamsResponse'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Tạo một hoặc nhiều vùng kẹt xe (jam zones)
      description: 'Tạo một hoặc nhiều vùng kẹt xe (jam zones) cho instance ba_jam. Jam zones dùng để phát hiện ùn tắc giao
        thông trong một ROI chỉ định.


        **Định dạng yêu cầu:**

        - Một vùng: Gửi một object (CreateJamRequest)

        - Nhiều vùng: Gửi mảng các object [CreateJamRequest, ...]


        **Cập nhật thời gian thực:** Các vùng được áp dụng cho instance đang chạy khi có thể; nếu không sẽ khởi động lại instance.

        '
      operationId: createJam
      tags:
      - Area Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của instance
        example: '{instanceId}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/CreateJamRequest'
              - type: array
                items:
                  $ref: '#/components/schemas/CreateJamRequest'
            examples:
              singleJam:
                summary: Một vùng kẹt xe (object)
                value:
                  name: Downtown Jam Zone
                  roi:
                  - x: 0
                    y: 100
                  - x: 1920
                    y: 100
                  - x: 1920
                    y: 400
                  - x: 0
                    y: 400
                  check_interval_frames: 20
                  check_min_hit_frames: 50
                  check_max_distance: 8
                  check_min_stops: 8
                  check_notify_interval: 10
              multipleJams:
                summary: Nhiều vùng kẹt xe (mảng)
                value:
                - name: Downtown Jam Zone
                  roi:
                  - x: 0
                    y: 100
                  - x: 1920
                    y: 100
                  - x: 1920
                    y: 400
                  - x: 0
                    y: 400
                  check_interval_frames: 20
                  check_min_hit_frames: 50
                  check_max_distance: 8
                  check_min_stops: 8
                  check_notify_interval: 10
                - name: Uptown Jam Zone
                  roi:
                  - x: 100
                    y: 200
                  - x: 500
                    y: 200
                  - x: 500
                    y: 400
                  - x: 100
                    y: 400
                  check_interval_frames: 20
                  check_min_hit_frames: 50
                  check_max_distance: 8
                  check_min_stops: 8
                  check_notify_interval: 10
      responses:
        '201':
          description: Tạo vùng thành công. Trả về một object vùng với yêu cầu đơn, hoặc object kèm metadata với yêu cầu mảng.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/JamZone'
                - $ref: '#/components/schemas/CreateJamsResponse'
        '400':
          description: Yêu cầu không hợp lệ (ROI hoặc tham số sai)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa tất cả vùng kẹt xe (jam zones)
      description: 'Xóa tất cả vùng kẹt xe (jam zones) của instance ba_jam.


        **Cập nhật thời gian thực:** Các vùng được gỡ khỏi instance đang chạy khi có thể; nếu không sẽ khởi động lại instance.

        '
      operationId: deleteAllJams
      tags:
      - Area Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của instance
        example: '{Downtown}'
      responses:
        '200':
          description: Đã xóa tất cả vùng kẹt xe thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Đã xóa tất cả vùng kẹt xe (jam zones) thành công
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho các endpoint jams
      operationId: jamsOptions
      tags:
      - Area Core
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/instance/{instanceId}/jams/{jamId}:
    get:
      summary: Lấy một vùng kẹt xe (jam zone) theo ID
      description: 'Trả về một vùng kẹt xe (jam zone) theo ID cho instance ba_jam.

        '
      operationId: getJam
      tags:
      - Area Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của instance
        example: '{instanceId}'
      - name: jamId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của vùng kẹt xe cần lấy
        example: '{jamId}'
      responses:
        '200':
          description: Đã lấy vùng kẹt xe thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JamZone'
        '404':
          description: Không tìm thấy instance hoặc vùng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Cập nhật một vùng kẹt xe (jam zone) theo ID
      description: 'Cập nhật vùng kẹt xe (jam zone) theo ID. Hỗ trợ cập nhật một phần.

        '
      operationId: updateJam
      tags:
      - Area Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của instance
        example: '{instanceId}'
      - name: jamId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của vùng kẹt xe cần cập nhật
        example: '{jamId}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJamRequest'
      responses:
        '200':
          description: Đã cập nhật vùng kẹt xe thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Đã cập nhật vùng thành công
        '400':
          description: Yêu cầu không hợp lệ (ROI hoặc tham số sai)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy instance hoặc vùng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa một vùng kẹt xe (jam zone) theo ID
      description: 'Xóa một vùng kẹt xe (jam zone) theo ID.

        '
      operationId: deleteJam
      tags:
      - Area Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của instance
        example: '{instanceId}'
      - name: jamId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của vùng kẹt xe cần xóa
        example: '{jamId}'
      responses:
        '200':
          description: Đã xóa vùng kẹt xe thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Đã xóa vùng thành công
        '404':
          description: Không tìm thấy instance hoặc vùng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/instance/{instanceId}/stops:
    get:
      summary: Lấy tất cả vùng dừng (stop zones)
      description: 'Trả về tất cả vùng dừng (stop zones) đã cấu hình cho instance ba_stop. Vùng dừng dùng để phát hiện đối
        tượng dừng trong ROI xác định trên luồng video.

        '
      operationId: getAllStops
      tags:
      - Area Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của instance
        example: '{instanceId}'
      responses:
        '200':
          description: Danh sách vùng dừng (stop zones)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopsResponse'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Tạo một hoặc nhiều vùng dừng (stop zones)
      description: 'Tạo một hoặc nhiều vùng dừng (stop zones) cho instance ba_stop.


        **Định dạng yêu cầu:**

        - Một vùng: Gửi một object (CreateStopRequest)

        - Nhiều vùng: Gửi mảng các object [CreateStopRequest, ...]


        **Cập nhật thời gian thực:** Thay đổi vùng dừng yêu cầu khởi động lại instance.

        '
      operationId: createStop
      tags:
      - Area Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh duy nhất của instance
        example: '{instanceId}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/CreateStopRequest'
              - type: array
                items:
                  $ref: '#/components/schemas/CreateStopRequest'
            examples:
              singleZone:
                summary: Một vùng dừng (object)
                value:
                  name: Stop Zone 1
                  roi:
                  - x: 100.0
                    y: 100.0
                  - x: 200.0
                    y: 100.0
                  - x: 200.0
                    y: 200.0
                  min_stop_seconds: 3
                  check_interval_frames: 20
                  check_min_hit_frames: 50
                  check_max_distance: 5
              multipleZones:
                summary: Nhiều vùng dừng (mảng)
                value:
                - name: Stop Zone A
                  roi:
                  - x: 0
                    y: 0
                  - x: 100
                    y: 0
                  - x: 100
                    y: 100
                  min_stop_seconds: 3
                  check_interval_frames: 20
                  check_min_hit_frames: 50
                  check_max_distance: 5
                - name: Stop Zone B
                  roi:
                  - x: 50
                    y: 50
                  - x: 150
                    y: 50
                  - x: 150
                    y: 150
                  min_stop_seconds: 3
                  check_interval_frames: 20
                  check_min_hit_frames: 50
                  check_max_distance: 5
      responses:
        '201':
          description: Tạo vùng thành công. Trả về một object vùng với yêu cầu đơn, hoặc object kèm metadata với yêu cầu mảng.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/StopZone'
                - type: object
                  properties:
                    message:
                      type: string
                      example: Đã tạo vùng dừng thành công
                    count:
                      type: integer
                      example: 2
                    stops:
                      type: array
                      items:
                        $ref: '#/components/schemas/StopZone'
        '400':
          description: Yêu cầu không hợp lệ (tọa độ hoặc tham số sai)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa tất cả vùng dừng (stop zones)
      description: 'Xóa tất cả vùng dừng (stop zones) của instance ba_stop. Thay đổi yêu cầu khởi động lại instance.

        '
      operationId: deleteAllStops
