    SolutionConfig:
      type: object
      required:
      - solutionId
      - solutionName
      - solutionType
      - pipeline
      properties:
        solutionId:
          type: string
          description: Định danh giải pháp duy nhất
          example: face_detection
        solutionName:
          type: string
          description: Tên hiển thị của giải pháp
          example: Face Detection
        solutionType:
          type: string
          description: Loại giải pháp
          example: face_detection
        isDefault:
          type: boolean
          description: Đây có phải giải pháp mặc định hay không
          example: false
        pipeline:
          type: array
          description: Cấu hình các node pipeline
          items:
            type: object
            required:
            - nodeType
            - nodeName
            properties:
              nodeType:
                type: string
                description: 'Loại node. Các loại có sẵn:


                  **Source:** rtsp_src, file_src, app_src, image_src, rtmp_src, udp_src


                  **Detector:** yunet_face_detector, yolo_detector, yolov11_detector, mask_rcnn_detector, openpose_detector,
                  enet_seg,

                  trt_yolov8_detector, trt_yolov8_seg_detector, trt_yolov8_pose_detector, trt_yolov8_classifier,

                  trt_vehicle_detector, trt_vehicle_plate_detector, trt_vehicle_plate_detector_v2, trt_insight_face_recognition,

                  rknn_yolov8_detector, rknn_yolov11_detector, rknn_face_detector, ppocr_text_detector,

                  face_swap, insight_face_recognition, mllm_analyser


                  **Processor:** sface_feature_encoder, sort_track, face_osd_v2, ba_crossline, ba_crossline_osd,

                  ba_jam, ba_jam_osd, classifier,

                  lane_detector, restoration, trt_vehicle_feature_encoder, trt_vehicle_color_classifier,

                  trt_vehicle_type_classifier, trt_vehicle_scanner


                  **Destination:** file_des, rtmp_des, screen_des


                  **Broker:** json_console_broker, json_enhanced_console_broker, json_mqtt_broker, json_kafka_broker,

                  xml_file_broker, xml_socket_broker, msg_broker, ba_socket_broker, embeddings_socket_broker,

                  embeddings_properties_socket_broker, plate_socket_broker, expr_socket_broker


                  Xem GET /v1/core/node/template để có danh sách đầy đủ kèm mô tả.

                  '
                example: rtsp_src
              nodeName:
                type: string
                description: Mẫu tên node (có thể chứa placeholder {instanceId})
                example: source_{instanceId}
              parameters:
                type: object
                description: Tham số riêng của node
                additionalProperties:
                  type: string
                example:
                  url: rtsp://localhost/stream
        defaults:
          type: object
          description: Giá trị tham số mặc định
          additionalProperties:
            type: string
          example:
            RTSP_URL: rtsp://localhost/stream
