    post:
      summary: Tạo instance AI mới
      description: 'Tạo và đăng ký instance AI mới với cấu hình chỉ định. Trả về instance ID (UUID) dùng để điều khiển instance.
        **Build pipeline bất đồng bộ (khi có solution):** API trả 201 ngay khi instance được đăng ký; pipeline được build
        nền (có thể 30+ giây). Response có **building**, **status**, **message**: building=true, status="building" — đang
        build, chưa gọi Start; building=false, status="ready" — đã sẵn sàng, có thể Start. - To know when the instance is
        ready, poll **GET /v1/core/instance/{instanceId}** until **status** is **"ready"** (or **building** is false), or
        wait for the build to complete before calling Start. If Start is called while **building** is true, the API returns
        an error: "Pipeline is still being built in background".


        **Configuration Options:**

        - **Basic Settings:** name, group, solution, persistent mode

        - **Performance:** frame rate limits, input pixel limits, input orientation

        - **Detection:** detector mode, sensitivity levels, sensor modality

        - **Processing Modes:** metadata mode, statistics mode, diagnostics mode, debug mode

        - **Auto Management:** auto-start, auto-restart, blocking readahead queue

        - **Solution Parameters:** RTSP_URL, MODEL_PATH, FILE_PATH, RTMP_URL, etc. (via additionalParams)


        **Solution Types:**

        - `face_detection`: Face detection with RTSP input

        - `face_detection_file`: Face detection with file input

        - `object_detection`: Object detection (YOLO)

        - `face_detection_rtmp`: Face detection with RTMP streaming

        - Custom solutions registered via solution management endpoints


        **Persistence:**

        - If `persistent: true`, the instance will be saved to a JSON file in the instances directory

        - Persistent instances are automatically loaded when the server restarts

        - Instance configuration files are stored in `/var/lib/edgeos-api/instances` (configurable via `INSTANCES_DIR` environment
        variable)


        **Auto Start:** Nếu autoStart=true, instance sẽ tự khởi động sau khi build pipeline xong (chạy nền). **Returns:**
        Thông tin instance đã tạo (UUID); khi có solution, response có building, status, message để client biết instance đã
        sẵn sàng Start chưa.

        '
      operationId: createInstance
      tags:
      - Instances
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstanceRequest'
            examples:
              ba_crossline___yolo___ba_crossline_file_mqtt:
                summary: Ba Crossline - Yolo - Ba Crossline File Mqtt
