      description: 'Bật hoặc tắt HLS (HTTP Live Streaming) output cho instance. Khi bật, trả về URI của HLS stream.

        **HLS Output:** - HLS stream có thể truy cập qua HTTP - File playlist (.m3u8) được tạo tự động - Video segments (.ts
