  /v1/onvif/camera/{cameraid}/credentials:
    post:
      summary: Thiết lập credentials cho một camera ONVIF
      description: 'Thiết lập thông tin xác thực cho một camera ONVIF cụ thể.

        **Camera ID:** - Có thể là địa chỉ IP của camera (ví dụ: "192.168.1.100") hoặc UUID - Định dạng địa chỉ IP: 0-255.0-255.0-255.0-255

        **Credentials:** - Username và password là bắt buộc - Credentials được lưu trữ an toàn và được sử dụng cho các thao
        tác ONVIF tiếp theo - Nếu camera không được tìm thấy, có thể được đề xuất nếu phát hiện IP tương tự

        **Cách sử dụng:** 1. Khám phá camera bằng POST /v1/onvif/discover 2. Lấy danh sách camera bằng GET /v1/onvif/cameras
        3. Thiết lập credentials bằng endpoint này 4. Lấy streams bằng GET /v1/onvif/streams/{cameraid} '
      operationId: setONVIFCredentials
      tags:
      - ONVIF
      parameters:
      - name: cameraid
        in: path
        required: true
        schema:
          type: string
        description: Định danh camera (địa chỉ IP hoặc UUID)
        example: 192.168.1.100
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ONVIFCredentialsRequest'
            example:
              username: admin
              password: password123
      responses:
        '204':
          description: Credentials đã được thiết lập thành công
        '400':
          description: Yêu cầu không hợp lệ (thiếu username hoặc password, JSON không hợp lệ)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy camera
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho credentials ONVIF
      operationId: setONVIFCredentialsOptions
      tags:
      - ONVIF
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/onvif/cameras:
    get:
      summary: Lấy danh sách tất cả camera ONVIF đã khám phá
      description: 'Lấy danh sách tất cả các camera ONVIF đã được khám phá trên mạng.

        **Thông tin Camera:** - Mỗi camera bao gồm địa chỉ IP, UUID, nhà sản xuất, model và số serial - Camera được lọc dựa
        trên whitelist hỗ trợ (nếu được cấu hình) - Chỉ các camera vượt qua kiểm tra whitelist mới được trả về

        **Cách sử dụng:** 1. Đầu tiên gọi POST /v1/onvif/discover để khám phá camera 2. Sau đó gọi endpoint này để lấy danh
        sách camera đã khám phá 3. Sử dụng camera ID (IP hoặc UUID) để lấy streams hoặc thiết lập credentials '
      operationId: getONVIFCameras
      tags:
      - ONVIF
      responses:
        '200':
          description: Danh sách camera ONVIF đã khám phá
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ONVIFCamera'
              example:
              - ip: 192.168.1.100
                uuid: 00000000-0000-0000-0000-000000000000
                manufacturer: Hikvision
                model: DS-2CD2347G1-LU
                serialNumber: ABC123456
              - ip: 192.168.1.101
                uuid: 11111111-1111-1111-1111-111111111111
                manufacturer: Axis
                model: P3245-LVE
                serialNumber: DEF789012
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho camera ONVIF
      operationId: getONVIFCamerasOptions
      tags:
      - ONVIF
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/onvif/discover:
    post:
      summary: Khám phá camera ONVIF
      description: 'Khám phá các camera ONVIF trên mạng bằng giao thức WS-Discovery.

        Endpoint này khởi động quá trình khám phá bất đồng bộ để tìm kiếm các camera tuân thủ ONVIF trên mạng cục bộ.

        **Tham số Timeout:** - Tham số truy vấn tùy chọn `timeout` (1-30 giây, mặc định: 5) - Điều khiển thời gian chờ phản
        hồi từ camera trong quá trình khám phá

        **Phản hồi:** - Trả về 204 No Content khi quá trình khám phá được khởi động - Sử dụng GET /v1/onvif/cameras để lấy
        danh sách camera đã khám phá sau khi hoàn tất '
      operationId: discoverONVIFCameras
      tags:
      - ONVIF
      parameters:
      - name: timeout
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 30
          default: 5
        description: 'Thời gian chờ khám phá tính bằng giây (1-30, mặc định: 5)'
        example: 5
      responses:
        '204':
          description: Quá trình khám phá đã được khởi động thành công
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho khám phá ONVIF
      operationId: discoverONVIFCamerasOptions
      tags:
      - ONVIF
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/onvif/streams/{cameraid}:
    get:
      summary: Lấy streams cho một camera ONVIF
      description: 'Lấy các video streams có sẵn cho một camera ONVIF cụ thể.

        **Camera ID:** - Có thể là địa chỉ IP của camera (ví dụ: "192.168.1.100") hoặc UUID - Định dạng địa chỉ IP: 0-255.0-255.0-255.0-255

        **Thông tin Stream:** - Mỗi stream bao gồm profile token, độ phân giải (width/height), frame rate (fps) và RTSP URI
        - Streams được lấy bằng dịch vụ ONVIF Media - Credentials của camera phải được thiết lập trước khi lấy streams (nếu
        yêu cầu xác thực)

        **Cách sử dụng:** 1. Khám phá camera bằng POST /v1/onvif/discover 2. Lấy danh sách camera bằng GET /v1/onvif/cameras
        3. Thiết lập credentials bằng POST /v1/onvif/camera/{cameraid}/credentials (nếu cần) 4. Lấy streams bằng endpoint
        này '
      operationId: getONVIFStreams
      tags:
      - ONVIF
      parameters:
      - name: cameraid
        in: path
        required: true
        schema:
          type: string
        description: Định danh camera (địa chỉ IP hoặc UUID)
        example: 192.168.1.100
      responses:
        '200':
          description: Danh sách streams có sẵn cho camera
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ONVIFStream'
              example:
              - token: Profile_1
                width: 1920
                height: 1080
                fps: 30
                uri: rtsp://192.168.1.100:554/Streaming/Channels/101
              - token: Profile_2
                width: 640
                height: 480
                fps: 15
                uri: rtsp://192.168.1.100:554/Streaming/Channels/102
        '400':
          description: Yêu cầu không hợp lệ (thiếu hoặc không hợp lệ camera ID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy camera
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho streams ONVIF
      operationId: getONVIFStreamsOptions
      tags:
      - ONVIF
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/recognition/face-database/connection:
    post:
      summary: Cấu hình kết nối face database
      description: 'Cấu hình kết nối face database cho MySQL hoặc PostgreSQL. Endpoint này cho phép cấu hình kết nối database
        để lưu dữ liệu nhận diện khuôn mặt thay cho file mặc định `face_database.txt`.


        **Hỗ trợ database:**

        - MySQL (cổng mặc định: 3306)

        - PostgreSQL (cổng mặc định: 5432)


        **Schema database:** Hệ thống yêu cầu hai bảng:


        1. Bảng **face_libraries:** id (khóa chính, tự tăng), image_id (varchar 36) - định danh mỗi ảnh khuôn mặt, subject
        (varchar 255) - tên người, base64_image (longtext) - ảnh khuôn mặt Base64, embedding (text) - vector embedding (số
        thực cách nhau dấu phẩy), created_at (timestamp), machine_id (varchar 255), mac_address (varchar 255).


        2. Bảng **face_log:** id (khóa chính, tự tăng), request_type (varchar 50) - loại yêu cầu (recognize, register, ...),
        timestamp (datetime), client_ip (varchar 45), request_body (longtext), response_body (longtext), response_code (int),
        notes (text), mac_address, machine_id.


        **Hành vi:** Khi kết nối database được cấu hình và bật, hệ thống dùng database thay cho `face_database.txt`. Nếu gửi
        `enabled: false`, kết nối bị tắt và hệ thống dùng lại `face_database.txt`. Cấu hình lưu trong `config.json` mục `face_database`.
        Cấu hình có hiệu lực ngay sau khi lưu.


        **Lưu ý:** Các bảng database phải được tạo thủ công trước khi dùng endpoint này. Endpoint chỉ cấu hình tham số kết
        nối, không tạo schema database.'
      operationId: configureFaceDatabaseConnection
      tags:
      - Recognition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/FaceDatabaseConnectionConfig'
              - type: object
                required:
                - enabled
                properties:
                  enabled:
                    type: boolean
                    description: Đặt false để tắt kết nối database và dùng file face_database.txt mặc định
                    example: false
            examples:
              mysql:
                summary: Ví dụ cấu hình MySQL
                value:
                  type: mysql
                  host: localhost
                  port: 3306
                  database: face_db
                  username: face_user
                  password: secure_password
                  charset: utf8mb4
              postgresql:
                summary: Ví dụ cấu hình PostgreSQL
                value:
                  type: postgresql
                  host: localhost
                  port: 5432
                  database: face_db
                  username: face_user
                  password: secure_password
              disable:
                summary: Tắt kết nối database
                value:
                  enabled: false
      responses:
        '200':
          description: Đã cấu hình kết nối database thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Thông báo thành công
                    example: Đã cấu hình kết nối face database thành công
                  config:
                    $ref: '#/components/schemas/FaceDatabaseConnectionConfig'
                  note:
                    type: string
                    description: Thông tin bổ sung
                    example: Kết nối database sẽ được dùng thay cho file face_database.txt
              examples:
                success:
                  summary: Cấu hình thành công
                  value:
                    message: Face database connection configured successfully
                    config:
                      type: mysql
                      host: localhost
                      port: 3306
                      database: face_db
                      username: face_user
                      charset: utf8mb4
                    note: Database connection will be used instead of face_database.txt file
                disabled:
                  summary: Đã tắt database
                  value:
                    message: Đã tắt kết nối database. Đang dùng file face_database.txt mặc định
                    enabled: false
                    default_file: /opt/edgeos-api/data/face_database.txt
        '400':
          description: Yêu cầu không hợp lệ (thiếu trường bắt buộc, loại database không hợp lệ, v.v.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingType:
                  summary: Thiếu trường type
                  value:
                    error: Yêu cầu không hợp lệ
                    message: Trường 'type' (mysql/postgresql) là bắt buộc
                invalidType:
                  summary: Loại database không hợp lệ
                  value:
                    error: Yêu cầu không hợp lệ
                    message: Trường 'type' phải là 'mysql' hoặc 'postgresql'
                missingHost:
                  summary: Thiếu trường host
                  value:
                    error: Yêu cầu không hợp lệ
                    message: Trường 'host' là bắt buộc
        '500':
          description: Lỗi máy chủ (không lưu được cấu hình, v.v.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Lấy cấu hình kết nối face database
      description: Lấy cấu hình kết nối face database hiện tại. Nếu chưa cấu hình hoặc đã tắt, trả về thông tin file mặc định
        face_database.txt. Khi đã cấu hình trả về chi tiết kết nối; khi chưa cấu hình trả về enabled=false và đường dẫn file
        mặc định.
      operationId: getFaceDatabaseConnection
      tags:
      - Recognition
      responses:
        '200':
          description: Đã lấy cấu hình thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: Kết nối database có được bật hay không
                    example: true
                  config:
                    $ref: '#/components/schemas/FaceDatabaseConnectionConfig'
                    description: Cấu hình kết nối database (chỉ có khi enabled là true)
                  message:
                    type: string
                    description: Thông báo trạng thái
                    example: Kết nối database đã được cấu hình và bật
                  default_file:
                    type: string
                    description: Đường dẫn file face_database.txt mặc định (chỉ có khi enabled là false)
                    example: /opt/edgeos-api/data/face_database.txt
              examples:
                enabled:
                  summary: Đã bật database
                  value:
                    enabled: true
                    config:
                      type: mysql
                      host: localhost
                      port: 3306
                      database: face_db
                      username: face_user
                      charset: utf8mb4
                    message: Database connection is configured and enabled
                disabled:
                  summary: Đã tắt database
                  value:
                    enabled: false
                    message: Chưa cấu hình kết nối database. Đang dùng file face_database.txt mặc định
                    default_file: /opt/edgeos-api/data/face_database.txt
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa cấu hình kết nối face database
      description: 'Xóa cấu hình kết nối face database. Sau khi xóa, hệ thống dùng lại file mặc định face_database.txt. Hành
        vi: gỡ cấu hình khỏi config.json; đặt enabled=false; hệ thống chuyển sang dùng face_database.txt; nếu chưa có cấu
        hình thì trả về success báo không có cấu hình. Lưu ý: Thao tác này không xóa dữ liệu trong database, chỉ gỡ cấu hình
        kết nối. Để xóa dữ liệu trong database, dùng các endpoint xóa face.'
      operationId: deleteFaceDatabaseConnection
      tags:
      - Recognition
      responses:
        '200':
          description: Đã xóa cấu hình kết nối database thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Thông báo thành công
                    example: Đã xóa cấu hình kết nối database. Hệ thống sẽ dùng file face_database.txt mặc định
                  enabled:
                    type: boolean
                    description: Kết nối database có được bật hay không (luôn false sau khi xóa)
                    example: false
                  default_file:
                    type: string
                    description: Đường dẫn file face_database.txt mặc định
                    example: /opt/edgeos-api/data/face_database.txt
              examples:
                deleted:
                  summary: Đã xóa cấu hình thành công
                  value:
                    message: Đã xóa cấu hình kết nối database. Hệ thống sẽ dùng file face_database.txt mặc định
                    enabled: false
                    default_file: /opt/edgeos-api/data/face_database.txt
                notFound:
                  summary: Không có cấu hình để xóa
                  value:
                    message: Không có cấu hình kết nối database để xóa
                    enabled: false
                    default_file: /opt/edgeos-api/data/face_database.txt
        '500':
          description: Lỗi máy chủ (không cập nhật được cấu hình, v.v.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho face database connection
      operationId: faceDatabaseConnectionOptions
      tags:
      - Recognition
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/recognition/faces:
    get:
      summary: Liệt kê face subject
      description: 'Lấy danh sách tất cả face subject đã lưu, có hỗ trợ phân trang.

        Có thể lọc theo tên subject hoặc lấy tất cả subject. Endpoint này trả về kết quả phân trang gồm image_id và tên subject.'
      operationId: listFaceSubjects
      tags:
      - Recognition
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
        description: Số trang mẫu cần trả về. Dùng cho phân trang. Giá trị mặc định 0.
        example: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Số khuôn mặt mỗi trang (kích thước trang). Dùng cho phân trang. Giá trị mặc định 20.
        example: 20
      - name: subject
        in: query
        required: false
        schema:
          type: string
        description: Chỉ định subject mẫu cần trả về. Để trống thì trả về mẫu của mọi subject.
        example: subject1
      responses:
        '200':
          description: Đã lấy danh sách face subject thành công
          content:
            application/json:
              schema:
                type: object
                required:
                - faces
                - page_number
                - page_size
                - total_pages
                - total_elements
                properties:
                  faces:
                    type: array
                    description: Danh sách face subject
                    items:
                      type: object
                      required:
                      - image_id
                      - subject
                      properties:
                        image_id:
                          type: string
                          format: uuid
                          description: Định danh duy nhất của khuôn mặt
                          example: '{Edge}'
                        subject:
                          type: string
                          description: Subject (người) gắn với ảnh đã lưu
                          example: subject1
                  page_number:
