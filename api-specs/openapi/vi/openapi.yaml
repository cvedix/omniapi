                      CONFIG_PATH: /opt/edgeos-api/models/det_cls/yolov3-tiny-2022-0721.cfg
                      LABELS_PATH: /opt/edgeos-api/models/det_cls/yolov3_tiny_5classes.txt
                      RESIZE_RATIO: '0.5'
                    output:
                      ENABLE_SCREEN_DES: 'false'
                      BROKE_FOR: NORMAL
                      MQTT_BROKER_URL: mqtt.goads.com.vn
                      MQTT_PORT: '1883'
                      MQTT_TOPIC: ba_crossline/events
                      MQTT_USERNAME: ''
                      MQTT_PASSWORD: ''
                    CrossingLines: '[{"id":"line1","name":"Main Road","coordinates":[{"x":0,"y":250},{"x":700,"y":220}],"direction":"Both","classes":["Vehicle"],"color":[255,0,0,255]},{"id":"line2","name":"Secondary
                      Road","coordinates":[{"x":100,"y":400},{"x":800,"y":380}],"direction":"Both","classes":["Vehicle"],"color":[0,255,0,255]}]'
              ba_crossline___yolo___ba_crossline_file_mqtt_with_crossing_l:
                summary: Ba Crossline - Yolo - Ba Crossline File Mqtt With Crossing Lines
                value:
                  name: ba_crossline_mqtt_with_lines_demo
