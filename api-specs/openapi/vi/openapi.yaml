          minimum: 0
        metadataMode:
          type: boolean
          description: Bật chế độ metadata
        statisticsMode:
          type: boolean
          description: Bật chế độ thống kê
        diagnosticsMode:
          type: boolean
          description: Bật chế độ chẩn đoán
        debugMode:
          type: boolean
          description: Bật chế độ debug
        detectorMode:
          type: string
          description: Chế độ detector
          enum:
          - SmartDetection
        detectionSensitivity:
          type: string
          description: Mức độ nhạy phát hiện
          enum:
          - Low
          - Medium
          - High
        movementSensitivity:
          type: string
          description: Mức độ nhạy chuyển động
          enum:
          - Low
          - Medium
          - High
        sensorModality:
          type: string
          description: Loại cảm biến
          enum:
          - RGB
          - Thermal
        autoStart:
          type: boolean
          description: Tự khởi động instance khi tạo
        autoRestart:
          type: boolean
          description: Tự khởi động lại instance khi lỗi
        inputOrientation:
          type: integer
          description: Hướng đầu vào (0-3)
          minimum: 0
          maximum: 3
        inputPixelLimit:
          type: integer
          description: Giới hạn pixel đầu vào
          minimum: 0
        RTSP_URL:
          type: string
          description: URL RTSP nguồn
          example: rtsp://localhost:8554/stream
        MODEL_NAME:
          type: string
          description: Tên model sử dụng
          example: yunet_2023mar
        MODEL_PATH:
          type: string
          description: Đường dẫn trực tiếp tới file model
          example: ./models/yunet.onnx
        FILE_PATH:
          type: string
          description: Đường dẫn file cho nguồn file
          example: /path/to/video.mp4
        RTMP_URL:
          type: string
          description: URL RTMP đích streaming
          example: rtmp://localhost:1935/live/stream
        SFACE_MODEL_PATH:
          type: string
          description: Đường dẫn tới model encoder SFace
        SFACE_MODEL_NAME:
          type: string
          description: Tên model encoder SFace
        additionalParams:
          type: object
          description: Tham số bổ sung theo giải pháp
          additionalProperties:
            type: string
    InstanceSummary:
