          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                  event:
                    type: string
                    example: manual
                  report_count:
                    type: integer
                  last_report:
                    type: string
                  last_status:
                    type: string
                additionalProperties: true
  /hls/{instanceId}/segment_{segmentId}.ts:
    get:
      summary: Lấy segment HLS
      description: 'Lấy file segment video HLS (.ts) cho một instance. Endpoint phục vụ từng file segment được tham chiếu
        trong playlist HLS. Segment được tạo tự động khi bật đầu ra HLS cho instance.

        '
      operationId: getHlsSegment
      tags:
      - Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh instance
      - name: segmentId
        in: path
        required: true
        schema:
          type: string
        description: 'ID segment (ví dụ: "0", "1", "2")'
      responses:
        '200':
          description: File segment video HLS
          content:
            video/mp2t:
              schema:
                type: string
                format: binary
        '404':
          description: Không tìm thấy instance, HLS chưa bật, hoặc không tìm thấy segment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /hls/{instanceId}/stream.m3u8:
    get:
      summary: Lấy playlist HLS
      description: 'Lấy file playlist HLS (HTTP Live Streaming) (.m3u8) cho một instance. Endpoint phục vụ file playlist HLS
        mà client dùng để phát video từ instance. Playlist chứa tham chiếu tới các segment video (.ts) được tạo tự động.

        '
      operationId: getHlsPlaylist
      tags:
      - Core
      parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
        description: Định danh instance
      responses:
        '200':
          description: File playlist HLS
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
                example: '#EXTM3U

                  #EXT-X-VERSION:3

                  #EXT-X-TARGETDURATION:10

                  #EXTINF:10.0,

                  segment_0.ts

                  #EXTINF:10.0,

                  segment_1.ts

                  '
        '404':
          description: Không tìm thấy instance hoặc HLS chưa bật
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/font/{fontName}:
    put:
      summary: Đổi tên file font
      description: 'Đổi tên file font trên máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm
        trong thư mục con.

        '
      operationId: renameFont
      tags:
      - Fonts
      parameters:
      - name: fontName
        in: path
        required: true
        schema:
          type: string
        description: Tên hiện tại của file font cần đổi tên
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con chứa file font (ví dụ: "projects/myproject/fonts", "themes/custom"). Nếu không
          chỉ định, coi như file nằm ở thư mục fonts gốc.'
        example: projects/myproject/fonts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - newName
              properties:
                newName:
                  type: string
                  description: Tên mới cho file font (phải có phần mở rộng font hợp lệ)
                  example: string.otf
      responses:
        '200':
          description: Đã đổi tên file font thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  oldName:
                    type: string
                  newName:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy file font
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Tên mới đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa file font
      description: 'Xóa file font khỏi máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm trong
        thư mục con.

        '
      operationId: deleteFont
      tags:
      - Fonts
      parameters:
      - name: fontName
        in: path
        required: true
        schema:
          type: string
        description: Tên file font cần xóa
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con chứa file font (ví dụ: "projects/myproject/fonts", "themes/custom"). Nếu không
          chỉ định, coi như file nằm ở thư mục fonts gốc.'
        example: projects/myproject/fonts
      responses:
        '200':
          description: Đã xóa file font thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  filename:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy file font
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho thao tác font
      operationId: fontOptionsHandler
      tags:
      - Fonts
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/font/list:
    get:
      summary: Liệt kê file font đã tải lên
      description: 'Trả về danh sách các file font đã được tải lên máy chủ.

        - Nếu không chỉ định tham số `directory`: Tìm kiếm đệ quy và liệt kê tất cả file font trong toàn bộ cây thư mục fonts
        (bao gồm mọi thư mục con).

        - Nếu chỉ định tham số `directory`: Chỉ liệt kê file trong thư mục đó (không đệ quy, không tìm trong thư mục con).

        '
      operationId: listFonts
      tags:
      - Fonts
      parameters:
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con để liệt kê file (ví dụ: "projects/myproject/fonts", "themes/custom"). Nếu chỉ
          định, chỉ liệt kê file trong thư mục đó (không đệ quy). Nếu không chỉ định, tìm kiếm đệ quy tất cả thư mục con.'
        example: projects/myproject/fonts
      responses:
        '200':
          description: Danh sách file font
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  fonts:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        path:
                          type: string
                        size:
                          type: integer
                        modified:
                          type: string
                  count:
                    type: integer
                  directory:
                    type: string
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/font/upload:
    post:
      summary: Tải lên file font
      description: 'Tải file font (TTF, OTF, WOFF, WOFF2, v.v.) lên máy chủ. File lưu trong thư mục fonts. Có thể chỉ định
        thư mục con qua tham số query `directory`. Thư mục được tạo tự động nếu chưa tồn tại. Nếu không chỉ định, file lưu
        tại thư mục fonts gốc.

        '
      operationId: uploadFont
      tags:
      - Fonts
      parameters:
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Đường dẫn thư mục con để lưu file font. Dùng dấu gạch chéo để phân tách cấp thư mục (ví dụ: "projects/myproject/fonts",
          "themes/custom", "languages/vietnamese"). Thư mục sẽ được tạo tự động nếu chưa tồn tại. Nếu không chỉ định, file
          sẽ được lưu tại thư mục fonts gốc.'
        example: projects/myproject/fonts
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: File font cần tải lên. Có thể chọn nhiều file (.ttf, .otf, .woff, .woff2, .eot, .ttc)
                file:
                  type: string
                  format: binary
                  description: Một file font tải lên (thay thế cho mảng files)
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: File font dạng dữ liệu nhị phân
      responses:
        '201':
          description: Đã tải font lên thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  count:
                    type: integer
                    description: Số file đã tải lên thành công
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        originalFilename:
                          type: string
                        path:
                          type: string
                        size:
                          type: integer
                        url:
                          type: string
        '400':
          description: Yêu cầu không hợp lệ (thiếu file, định dạng không hợp lệ, v.v.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực (thiếu hoặc API key không hợp lệ)
        '409':
          description: File đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho tải font
      operationId: uploadFontOptions
      tags:
      - Fonts
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/groups:
    get:
      summary: Liệt kê tất cả nhóm
      description: 'Trả về danh sách tất cả nhóm kèm thông tin tóm tắt (tên, mô tả, số instance, metadata). Phản hồi gồm:
        tổng số nhóm, số nhóm mặc định, số nhóm tùy chỉnh, thông tin tóm tắt từng nhóm (ID, tên, mô tả, số instance). Dùng
        để xem tổng quan mà không cần lấy chi tiết từng nhóm.

        '
      operationId: listGroups
      tags:
      - Groups
      responses:
        '200':
          description: Danh sách nhóm
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupInfo'
                  total:
                    type: integer
                    description: Tổng số nhóm
                  default:
                    type: integer
                    description: Số nhóm mặc định
                  custom:
                    type: integer
                    description: Số nhóm tùy chỉnh
              example:
                total: 2
                default: 0
                custom: 2
                groups:
                - groupId: cameras
                  groupName: Security Cameras
                  description: Nhóm cho instance camera an ninh
                  instanceCount: 3
                  isDefault: false
                  readOnly: false
                - groupId: test
                  groupName: Test Group
                  description: Nhóm cho mục đích thử nghiệm
                  instanceCount: 1
                  isDefault: false
                  readOnly: false
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
