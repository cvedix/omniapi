        thư mục con.

        '
      operationId: deleteFont
      tags:
      - Fonts
      parameters:
      - name: fontName
        in: path
        required: true
        schema:
          type: string
        description: Name of the font file to delete
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Subdirectory path where the font file is located (e.g., "projects/myproject/fonts", "themes/custom").

          If not specified, the file is assumed to be in the base fonts directory.

          '
        example: projects/myproject/fonts
      responses:
        '200':
          description: Font file deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  filename:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy file font
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight for font operations
      operationId: fontOptionsHandler
      tags:
      - Fonts
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/font/list:
    get:
      summary: Liệt kê file font đã tải lên
      description: "Returns a list of font files that have been uploaded to the server.\n- If `directory` parameter is not\
        \ specified: Recursively searches and lists all font files\n  in the entire fonts directory tree (including all subdirectories).\n\
        - If `directory` parameter is specified: Lists only files in that specific directory\n  (non-recursive, does not search\
        \ subdirectories).\n"
      operationId: listFonts
      tags:
      - Fonts
      parameters:
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Subdirectory path to list files from (e.g., "projects/myproject/fonts", "themes/custom").

          If specified, only lists files in that directory (non-recursive).

          If not specified, recursively searches all subdirectories.

          '
        example: projects/myproject/fonts
      responses:
        '200':
          description: Danh sách file font
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  fonts:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        path:
                          type: string
                        size:
                          type: integer
                        modified:
                          type: string
                  count:
                    type: integer
                  directory:
                    type: string
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/core/font/upload:
    post:
      summary: Tải lên file font
      description: 'Tải file font (TTF, OTF, WOFF, WOFF2, v.v.) lên máy chủ. File lưu trong thư mục fonts. Có thể chỉ định
        thư mục con qua tham số query `directory`. Thư mục được tạo tự động nếu chưa tồn tại. Nếu không chỉ định, file lưu
        tại thư mục fonts gốc.

        '
      operationId: uploadFont
      tags:
      - Fonts
      parameters:
      - name: directory
        in: query
        required: false
        schema:
          type: string
        description: 'Subdirectory path where the font file should be saved.

          Use forward slashes to separate directory levels (e.g., "projects/myproject/fonts", "themes/custom", "languages/vietnamese").

          The directory will be created automatically if it doesn''t exist.

          If not specified, files will be saved in the base fonts directory.

          '
        example: projects/myproject/fonts
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Font file(s) to upload. Select multiple files to upload at once (.ttf, .otf, .woff, .woff2,
                    .eot, .ttc)
                file:
                  type: string
                  format: binary
                  description: Single font file to upload (alternative to files array)
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: Font file as binary data
      responses:
        '201':
          description: Font file(s) uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  count:
                    type: integer
                    description: Number of files uploaded successfully
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        originalFilename:
                          type: string
                        path:
                          type: string
                        size:
                          type: integer
                        url:
                          type: string
        '400':
          description: Invalid request (missing file, invalid format, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (missing or invalid API key)
        '409':
          description: File already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight for font upload
      operationId: uploadFontOptions
      tags:
      - Fonts
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/groups:
    get:
      summary: Liệt kê tất cả nhóm
      description: 'Trả về danh sách tất cả nhóm kèm thông tin tóm tắt (tên, mô tả, số instance, metadata). Phản hồi gồm:
        tổng số nhóm, số nhóm mặc định, số nhóm tùy chỉnh, thông tin tóm tắt từng nhóm (ID, tên, mô tả, số instance). Dùng
        để xem tổng quan mà không cần lấy chi tiết từng nhóm.

        '
      operationId: listGroups
      tags:
      - Groups
      responses:
        '200':
          description: Danh sách nhóm
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupInfo'
                  total:
                    type: integer
                    description: Tổng số nhóm
                  default:
                    type: integer
                    description: Số nhóm mặc định
                  custom:
                    type: integer
                    description: Số nhóm tùy chỉnh
              example:
                total: 2
                default: 0
                custom: 2
                groups:
                - groupId: cameras
                  groupName: Security Cameras
                  description: Group for security camera instances
                  instanceCount: 3
                  isDefault: false
                  readOnly: false
                - groupId: test
                  groupName: Test Group
                  description: Group for testing
                  instanceCount: 1
                  isDefault: false
                  readOnly: false
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Tạo nhóm mới
      description: 'Tạo nhóm mới để tổ chức instance. Thuộc tính: **groupId** (bắt buộc) định danh duy nhất; **groupName**
        (tùy chọn) tên hiển thị; **description** (tùy chọn) mô tả. Group ID phải duy nhất

        - Group ID must match pattern: `^[A-Za-z0-9_-]+$`

        - Group name must match pattern: `^[A-Za-z0-9 -_]+$`


        **Persistence:**

        - Groups are automatically saved to storage

        - Group files are stored in `/var/lib/edge_ai_api/groups` (configurable via `GROUPS_DIR` environment variable)


        **Returns:** The created group information including timestamps.

        '
      operationId: createGroup
      tags:
      - Groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
            example:
              groupId: cameras
              groupName: Security Cameras
              description: Group for security camera instances
      responses:
        '201':
          description: Đã tạo nhóm thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupInfo'
        '400':
          description: Yêu cầu không hợp lệ (validation thất bại hoặc nhóm đã tồn tại)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho groups
      operationId: listGroupsOptions
      tags:
      - Groups
      responses:
        '200':
          description: Phản hồi CORS preflight
  /v1/core/groups/{groupId}:
    get:
      summary: Lấy chi tiết nhóm
      description: 'Trả về thông tin chi tiết của một nhóm: cấu hình (ID, tên, mô tả), metadata (isDefault, readOnly, timestamps),
        số instance, danh sách instance IDs trong nhóm. Nhóm phải tồn tại; nếu không tìm thấy trả về 404.

        '
      operationId: getGroup
      tags:
      - Groups
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
        description: Định danh nhóm (groupId)
      responses:
        '200':
          description: Chi tiết nhóm
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/GroupInfo'
                - type: object
                  properties:
                    instanceIds:
                      type: array
                      items:
                        type: string
                      description: Danh sách instance IDs trong nhóm này
        '404':
          description: Không tìm thấy nhóm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Cập nhật nhóm
      description: 'Cập nhật thông tin nhóm. Chỉ các trường gửi lên được cập nhật (groupName, description). Nhóm phải tồn
        tại, không read-only; group ID không đổi. Timestamp cập nhật tự động.

        '
      operationId: updateGroup
      tags:
      - Groups
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
        description: Định danh nhóm (groupId)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
            example:
              groupName: Updated Group Name
              description: Updated description
      responses:
        '200':
          description: Đã cập nhật nhóm thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupInfo'
        '400':
          description: Yêu cầu không hợp lệ (validation thất bại hoặc nhóm read-only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy nhóm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa nhóm
      description: 'Xóa nhóm khỏi hệ thống (vĩnh viễn). Điều kiện: nhóm tồn tại, không phải nhóm mặc định, không read-only,
        không còn instance nào (cần chuyển hoặc xóa instance trước)


        **Behavior:**

        - Group configuration will be removed from memory

        - Group file will be deleted from storage

        - All resources associated with the group will be released


        **Note:** This operation cannot be undone. Once deleted, the group must be recreated using the create group endpoint.

        '
      operationId: deleteGroup
      tags:
      - Groups
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
        description: Định danh nhóm (groupId)
      responses:
        '200':
          description: Group deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  groupId:
                    type: string
        '400':
          description: Xóa thất bại (nhóm còn instance, là nhóm mặc định, hoặc read-only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy nhóm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      summary: CORS preflight cho group
      operationId: getGroupOptions
      tags:
      - Groups
      responses:
        '200':
          description: Phản hồi CORS preflight
