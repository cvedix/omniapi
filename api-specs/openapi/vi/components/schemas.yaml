                additionalProperties:
                  type: string
        defaults:
          type: object
          description: Giá trị tham số mặc định
          additionalProperties:
            type: string
    UpdateSolutionRequest:
      type: object
      description: Body yêu cầu cập nhật giải pháp. Mọi trường trừ solutionId đều tùy chọn.
      properties:
        solutionName:
          type: string
          description: Tên hiển thị của giải pháp
          example: Updated Solution Name
        solutionType:
          type: string
          description: Loại giải pháp
          example: face_detection
        pipeline:
          type: array
          description: Cấu hình các node pipeline
          items:
            type: object
            required:
            - nodeType
            - nodeName
            properties:
              nodeType:
                type: string
                description: Loại node
              nodeName:
                type: string
                description: Mẫu tên node
              parameters:
                type: object
                description: Tham số riêng của node
                additionalProperties:
                  type: string
        defaults:
          type: object
          description: Giá trị tham số mặc định
          additionalProperties:
            type: string
    GroupInfo:
      type: object
      required:
      - groupId
      - groupName
      properties:
        groupId:
          type: string
          description: Định danh nhóm duy nhất
          pattern: ^[A-Za-z0-9_-]+$
          example: cameras
        groupName:
          type: string
          description: Tên hiển thị của nhóm
          pattern: ^[A-Za-z0-9 -_]+$
          example: Security Cameras
        description:
          type: string
          description: Mô tả nhóm
          example: Group for security camera instances
        isDefault:
          type: boolean
          description: Đây có phải nhóm mặc định (không thể xóa) hay không
          example: false
        readOnly:
          type: boolean
          description: Nhóm này có chỉ đọc (không thể sửa) hay không
          example: false
        instanceCount:
          type: integer
          description: Số instance trong nhóm này
          example: 3
        createdAt:
          type: string
          format: date-time
          description: Thời điểm tạo
          example: '2024-01-01T00:00:00.000Z'
        updatedAt:
          type: string
          format: date-time
          description: Thời điểm cập nhật cuối
          example: '2024-01-01T00:00:00.000Z'
    CreateGroupRequest:
      type: object
      required:
      - groupId
      properties:
        groupId:
          type: string
          description: Định danh nhóm duy nhất (alphanumeric, underscore, hyphen only)
          pattern: ^[A-Za-z0-9_-]+$
          example: cameras
        groupName:
          type: string
          description: Tên hiển thị của nhóm (tùy chọn, mặc định là groupId)
          pattern: ^[A-Za-z0-9 -_]+$
          example: Security Cameras
        description:
          type: string
          description: Mô tả nhóm
          example: Group for security camera instances
    UpdateGroupRequest:
      type: object
      description: Body yêu cầu cập nhật nhóm. Mọi trường đều tùy chọn.
      properties:
        groupName:
          type: string
          description: Tên hiển thị của nhóm
          pattern: ^[A-Za-z0-9 -_]+$
          example: Updated Group Name
        description:
          type: string
          description: Mô tả nhóm
          example: Updated description
    NodeResponse:
      type: object
      required:
      - nodeId
      - templateId
      - inUse
      - parameters
      - createdAt
      - input
      - output
      properties:
        nodeId:
          type: string
          description: Định danh node duy nhất
          example: node_a1b2c3d4
        templateId:
          type: string
          description: ID template dùng để tạo node này
          example: rtsp_src_template
        displayName:
          type: string
          description: Tên hiển thị dễ đọc từ template
          example: RTSP Source
        nodeType:
          type: string
          description: Loại node từ template
          example: rtsp_src
        category:
          type: string
          description: Danh mục node từ template
          enum:
          - source
          - detector
          - processor
          - destination
          - broker
          example: source
        description:
          type: string
          description: Mô tả node từ template
          example: Receive video stream from RTSP URL
        inUse:
          type: boolean
          description: Node hiện có đang được dùng hay không
          example: false
        parameters:
          type: object
          description: Tham số cấu hình node
          additionalProperties:
            type: string
          example:
            rtsp_url: rtsp://localhost:8554/stream1
            channel: '0'
            resize_ratio: '1.0'
        requiredParameters:
          type: array
          description: Danh sách tên tham số bắt buộc (từ template)
          items:
            type: string
          example:
          - rtsp_url
        optionalParameters:
          type: array
          description: Danh sách tên tham số tùy chọn (từ template)
          items:
            type: string
          example:
          - channel
          - resize_ratio
        templateDetailUrl:
          type: string
          description: URL lấy thông tin chi tiết template
          example: /v1/core/node/template/rtsp_src_template
        parameterSchema:
          type: object
          description: 'Schema chi tiết cho mọi tham số, cung cấp metadata thân thiện UI gồm:

            - Thông tin kiểu (string, number, integer, boolean)

            - Quy tắc kiểm tra (min, max, pattern, enum)

            - Gợi ý UI (kiểu input, kiểu widget, placeholder)

            - Mô tả và ví dụ

            - Danh mục để nhóm

            '
          additionalProperties:
            type: object
            properties:
              name:
                type: string
                description: Tên tham số
              type:
                type: string
                description: Kiểu dữ liệu tham số
                enum:
                - string
                - number
                - integer
                - boolean
              required:
                type: boolean
                description: Tham số này có bắt buộc hay không
              currentValue:
                type: string
                description: Giá trị hiện tại của tham số
              default:
                type: string
                description: Giá trị mặc định
              description:
                type: string
                description: Mô tả chi tiết tham số
              category:
                type: string
                description: Danh mục tham số để nhóm trên UI
                enum:
                - connection
                - performance
                - model
                - output
                - display
                - general
              uiHints:
                type: object
                properties:
                  inputType:
                    type: string
                    description: Kiểu input HTML
                    enum:
                    - text
                    - number
                    - url
                    - file
                    - checkbox
                  widget:
                    type: string
                    description: Kiểu widget UI khuyến nghị
                    enum:
                    - input
                    - slider
                    - switch
                    - url-input
                    - file-picker
                  placeholder:
                    type: string
                    description: Chữ placeholder cho ô nhập
              validation:
                type: object
                properties:
                  min:
                    type: number
                    description: Giá trị tối thiểu (cho số)
                  max:
                    type: number
                    description: Giá trị tối đa (cho số)
                  step:
                    type: number
                    description: Giá trị bước (cho slider)
                  pattern:
                    type: string
                    description: Pattern regex (cho chuỗi)
                  patternDescription:
                    type: string
                    description: Mô tả pattern dễ đọc
                  enum:
                    type: array
                    description: Các giá trị cho phép (cho enum)
                    items:
                      type: string
              examples:
                type: array
                description: Các giá trị ví dụ
                items:
                  type: string
          example:
            rtsp_url:
              name: rtsp_url
              type: string
              required: true
              description: URL stream RTSP (vd. rtsp://camera-ip:8554/stream)
              category: connection
              uiHints:
                inputType: url
                widget: url-input
                placeholder: rtsp://camera-ip:8554/stream
              validation:
                pattern: ^(rtsp|rtmp|http|https|file|udp)://.+
                patternDescription: Phải là URL hợp lệ (rtsp://, rtmp://, http://, https://, file:// hoặc udp://)
              examples:
              - rtsp://192.168.1.100:8554/stream1
              - rtsp://admin:password@camera-ip:554/stream
            channel:
              name: channel
              type: integer
              required: false
              default: '0'
              currentValue: '0'
              description: Số kênh cho xử lý đa kênh (0-15)
              category: connection
              uiHints:
                inputType: number
                widget: input
                placeholder: '0'
              validation:
                min: 0
                max: 15
        input:
          type: array
          description: 'Đầu vào mà node này cần từ pipeline. Mỗi mục mô tả loại đầu vào.

            - source: external_source - nhận từ nguồn ngoài (RTSP, file, v.v.)

            - detector: video_frames - cần khung hình từ node trước

            - processor: video_frames, metadata - cần khung hình và metadata

            - destination: video_frames, metadata - cần khung hình và metadata

            - broker: metadata, detection_results - cần metadata và kết quả phát hiện

            '
          items:
            type: object
            properties:
              type:
                type: string
                description: Định danh loại đầu vào
                example: video_frames
              description:
                type: string
                description: Mô tả chi tiết đầu vào
                example: Video frames from previous node
              format:
                type: string
                description: Định dạng dữ liệu (nếu có)
                example: BGR/RGB image frames
              multiple:
                type: boolean
                description: Đầu vào/ra này có hỗ trợ nhiều kết nối hay không
                example: false
              optional:
                type: boolean
                description: Đầu vào này có tùy chọn hay không
                example: false
              minInputs:
                type: integer
                description: Số đầu vào tối thiểu (khi có nhiều đầu vào)
                example: 2
              maxInputs:
                type: integer
                description: Số đầu vào tối đa (-1 = không giới hạn)
                example: -1
              maxOutputs:
                type: integer
                description: Số đầu ra tối đa (-1 = không giới hạn, chỉ cho output)
                example: -1
          example:
          - type: external_source
            description: Nhận đầu vào từ nguồn ngoài (file, RTSP, RTMP, v.v.)
          - type: video_frames
            description: Khung hình từ nhiều kênh/node (hỗ trợ nhiều đầu vào)
            format: BGR/RGB image frames
            multiple: true
            minInputs: 2
            maxInputs: -1
        output:
          type: array
          description: 'Đầu ra mà node này tạo cho pipeline. Mỗi mục mô tả loại đầu ra và cách truy cập.

            - source: video_frames - xuất khung hình

            - detector: video_frames, detection_results - xuất khung hình và kết quả phát hiện

            - processor: video_frames, metadata - xuất khung đã xử lý và metadata

            - destination: loại cụ thể (rtsp_stream, rtmp_stream, video_file, v.v.) - xuất ra đích ngoài

            - broker: loại cụ thể (mqtt_messages, kafka_messages, v.v.) - xuất ra broker ngoài

            '
          items:
            type: object
            properties:
              type:
                type: string
                description: Định danh loại đầu ra
                example: rtsp_stream
              description:
                type: string
                description: Mô tả chi tiết đầu ra
                example: RTSP video stream
              protocol:
                type: string
                description: Giao thức sử dụng (nếu có)
                example: RTSP
              format:
                type: string
                description: Định dạng dữ liệu (nếu có)
                example: MP4 video file
              accessInfo:
                type: string
                description: Cách truy cập/sử dụng đầu ra
                example: 'Access via RTSP URL: rtsp://<host>:8000/stream (default: rtsp://localhost:8000/stream)'
              example:
                type: string
                description: Ví dụ cách truy cập đầu ra
                example: rtsp://localhost:8000/stream
              configurableParameters:
                type: array
                description: Tham số có thể cấu hình để ảnh hưởng đầu ra
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Tên tham số
                      example: port
                    description:
                      type: string
                      description: Mô tả tham số
                      example: RTSP server port
                    default:
                      type: string
                      description: Giá trị mặc định
                      example: '8000'
                    affects:
                      type: string
                      description: Phần đầu ra mà tham số này ảnh hưởng
                      example: RTSP URL port
              multiple:
                type: boolean
                description: Đầu ra này có hỗ trợ nhiều kết nối hay không
                example: false
              maxOutputs:
                type: integer
                description: Số đầu ra tối đa (-1 = không giới hạn)
                example: -1
          example:
          - type: rtsp_stream
            description: RTSP video stream
            protocol: RTSP
            accessInfo: 'Access via RTSP URL: rtsp://<host>:8000/stream (default: rtsp://localhost:8000/stream)'
            example: rtsp://localhost:8000/stream
            configurableParameters:
            - name: port
              description: Cổng máy chủ RTSP
              default: '8000'
              affects: Cổng URL RTSP
            - name: stream_name
              description: Tên/đường dẫn stream RTSP
              default: stream
              affects: Đường dẫn URL RTSP
        createdAt:
          type: string
          format: date-time
          description: Thời điểm tạo node (định dạng ISO 8601)
          example: '2025-01-15T10:30:00Z'
        message:
          type: string
          description: Thông báo thành công (cho thao tác tạo/cập nhật)
          example: Đã tạo node thành công
        oldNodeId:
          type: string
          description: ID node trước (cho thao tác cập nhật)
          example: node_old123
        newNodeId:
          type: string
          description: ID node mới (cho thao tác cập nhật)
          example: node_new456
