# API endpoint: /v1/core/instance/{instanceId}/lines
# Tag: Lines Core

/v1/core/instance/{instanceId}/lines:
  get:
    summary: Lấy tất cả đường vượt (crossing lines)
    description: 'Trả về tất cả đường vượt (crossing lines) đã cấu hình cho instance ba_crossline. Đường dùng để đếm đối tượng vượt qua đường xác định trên luồng video.

      '
    operationId: getAllLines
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance
      example: '{instanceId}'
    responses:
      '200':
        description: Danh sách đường vượt (crossing lines)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinesResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Tạo một hoặc nhiều đường vượt (crossing lines)
    description: 'Tạo một hoặc nhiều đường vượt (crossing lines) cho instance ba_crossline. Đường được vẽ trên luồng video và dùng để đếm đối tượng. **Định dạng:** Một đường — gửi một object (CreateLineRequest); Nhiều đường — gửi mảng [CreateLineRequest, ...]. **Cập nhật thời gian thực:** Đường được áp dụng ngay không cần khởi động lại instance.

      '
    operationId: createLine
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/CreateLineRequest'
            - type: array
              items:
                $ref: '#/components/schemas/CreateLineRequest'
          examples:
            singleLine:
              summary: Một đường (object)
              value:
                name: Counting Line 1
                coordinates:
                - x: 100.0
                  y: 300.0
                - x: 600.0
                  y: 300.0
                direction: Both
                classes:
                - Person
                - Vehicle
                color:
                - 255
                - 0
                - 0
                - 255
            multipleLines:
              summary: Nhiều đường (mảng)
              value:
              - name: Entry Line
                coordinates:
                - x: 0
                  y: 250
                - x: 700
                  y: 220
                direction: Up
                classes:
                - Vehicle
                color:
                - 255
                - 0
                - 0
                - 255
              - name: Exit Line
                coordinates:
                - x: 100
                  y: 400
                - x: 800
                  y: 380
                direction: Down
                classes:
                - Vehicle
                color:
                - 0
                - 255
                - 0
                - 255
    responses:
      '201':
        description: Đã tạo đường thành công. Trả về một object đường với yêu cầu đơn, hoặc object kèm metadata với yêu cầu mảng
          for array request.
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/CrossingLine'
              - type: object
                properties:
                  message:
                    type: string
                    example: Đã tạo đường vượt thành công
                  count:
                    type: integer
                    example: 2
                  lines:
                    type: array
                    items:
                      $ref: '#/components/schemas/CrossingLine'
      '400':
        description: Yêu cầu không hợp lệ (tọa độ hoặc tham số sai)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Xóa tất cả đường vượt (crossing lines)
    description: 'Xóa tất cả đường vượt (crossing lines) của instance ba_crossline. Đường được gỡ ngay khỏi luồng video đang chạy, không cần khởi động lại instance.

      '
    operationId: deleteAllLines
    tags:
    - Lines Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance
      example: '{Counting}'
    responses:
      '200':
        description: Đã xóa tất cả lines thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Đã xóa tất cả đường vượt thành công
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho các endpoint lines
    operationId: linesOptions
    tags:
    - Lines Core
    responses:
      '200':
        description: Phản hồi CORS preflight
