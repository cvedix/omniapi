# API endpoint: /v1/core/font/{fontName}
# Tag: Fonts

/v1/core/font/{fontName}:
  put:
    summary: Đổi tên file font
    description: 'Đổi tên file font trên máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm trong thư mục con.

      '
    operationId: renameFont
    tags:
    - Fonts
    parameters:
    - name: fontName
      in: path
      required: true
      schema:
        type: string
      description: Tên hiện tại của file font cần đổi tên
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Subdirectory path where the font file is located (e.g., "projects/myproject/fonts", "themes/custom").

        If not specified, the file is assumed to be in the base fonts directory.

        '
      example: projects/myproject/fonts
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - newName
            properties:
              newName:
                type: string
                description: New name for the font file (must have valid font file extension)
                example: string.otf
    responses:
      '200':
        description: Đã đổi tên file font thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                oldName:
                  type: string
                newName:
                  type: string
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy file font
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Tên mới đã tồn tại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Xóa file font
    description: 'Xóa file font khỏi máy chủ. Có thể chỉ định thư mục con qua tham số query `directory` nếu file nằm trong thư mục con.

      '
    operationId: deleteFont
    tags:
    - Fonts
    parameters:
    - name: fontName
      in: path
      required: true
      schema:
        type: string
      description: Name of the font file to delete
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Subdirectory path where the font file is located (e.g., "projects/myproject/fonts", "themes/custom").

        If not specified, the file is assumed to be in the base fonts directory.

        '
      example: projects/myproject/fonts
    responses:
      '200':
        description: Font file deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                filename:
                  type: string
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy file font
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for font operations
    operationId: fontOptionsHandler
    tags:
    - Fonts
    responses:
      '200':
        description: Phản hồi CORS preflight
