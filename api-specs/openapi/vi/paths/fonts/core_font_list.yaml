# API endpoint: /v1/core/font/list
# Tag: Fonts

/v1/core/font/list:
  get:
    summary: Liệt kê file font đã tải lên
    description: "Returns a list of font files that have been uploaded to the server.\n- If `directory` parameter is not specified:\
      \ Recursively searches and lists all font files\n  in the entire fonts directory tree (including all subdirectories).\n\
      - If `directory` parameter is specified: Lists only files in that specific directory\n  (non-recursive, does not search\
      \ subdirectories).\n"
    operationId: listFonts
    tags:
    - Fonts
    parameters:
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Subdirectory path to list files from (e.g., "projects/myproject/fonts", "themes/custom").

        If specified, only lists files in that directory (non-recursive).

        If not specified, recursively searches all subdirectories.

        '
      example: projects/myproject/fonts
    responses:
      '200':
        description: Danh sách file font
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                fonts:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                      path:
                        type: string
                      size:
                        type: integer
                      modified:
                        type: string
                count:
                  type: integer
                directory:
                  type: string
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
