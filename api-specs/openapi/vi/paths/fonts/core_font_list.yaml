# API endpoint: /v1/core/font/list
# Tag: Fonts

/v1/core/font/list:
  get:
    summary: Liệt kê file font đã tải lên
    description: "Trả về danh sách các file font đã được tải lên máy chủ.\n- Nếu không chỉ định tham số `directory`: Tìm kiếm đệ quy và liệt kê tất cả file font trong toàn bộ cây thư mục fonts (bao gồm mọi thư mục con).\n- Nếu chỉ định tham số `directory`: Chỉ liệt kê file trong thư mục đó (không đệ quy, không tìm trong thư mục con).\n"
    operationId: listFonts
    tags:
    - Fonts
    parameters:
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Đường dẫn thư mục con để liệt kê file (ví dụ: "projects/myproject/fonts", "themes/custom"). Nếu chỉ định, chỉ liệt kê file trong thư mục đó (không đệ quy). Nếu không chỉ định, tìm kiếm đệ quy tất cả thư mục con.'

      example: projects/myproject/fonts
    responses:
      '200':
        description: Danh sách file font
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                fonts:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                      path:
                        type: string
                      size:
                        type: integer
                      modified:
                        type: string
                count:
                  type: integer
                directory:
                  type: string
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
