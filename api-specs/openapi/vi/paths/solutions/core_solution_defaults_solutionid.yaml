# API endpoint: /v1/core/solution/defaults/{solutionId}
# Tag: Solutions

/v1/core/solution/defaults/{solutionId}:
  post:
    summary: Nạp solution mặc định
    description: 'Nạp solution mặc định từ examples/default_solutions/ vào solution registry.

      Endpoint cho phép nạp mẫu solution mặc định vào hệ thống để dùng khi tạo instance.'
    operationId: loadDefaultSolution
    tags:
    - Solutions
    parameters:
    - name: solutionId
      in: path
      required: true
      schema:
        type: string
      description: Định danh solution mặc định cần nạp
    responses:
      '200':
        description: Đã nạp solution mặc định thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                solutionId:
                  type: string
                  description: Định danh solution đã nạp
                message:
                  type: string
                  example: Đã nạp solution mặc định thành công
      '404':
        description: Không tìm thấy solution mặc định
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho nạp default solution
    operationId: loadDefaultSolutionOptions
    tags:
    - Solutions
    responses:
      '200':
        description: Phản hồi CORS preflight
