# API endpoint: /v1/core/solution/defaults
# Tag: Solutions

/v1/core/solution/defaults:
  get:
    summary: Liệt kê solution mặc định
    description: Lấy danh sách tất cả solution mặc định có sẵn từ examples/default_solutions/
    operationId: listDefaultSolutions
    tags:
    - Solutions
    responses:
      '200':
        description: List of default solutions
        content:
          application/json:
            schema:
              type: object
              properties:
                solutions:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Solution ID
                      name:
                        type: string
                        description: Solution name
                      description:
                        type: string
                        description: Solution description
                total:
                  type: integer
                  description: Total number of default solutions
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho default solutions
    operationId: listDefaultSolutionsOptions
    tags:
    - Solutions
    responses:
      '200':
        description: Phản hồi CORS preflight
