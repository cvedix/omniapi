# API endpoint: /v1/core/solution/{solutionId}
# Tag: Solutions

/v1/core/solution/{solutionId}:
  get:
    summary: Lấy chi tiết solution
    description: Trả về thông tin chi tiết của một solution, gồm cấu hình pipeline đầy đủ.
    operationId: getSolution
    tags:
    - Solutions
    parameters:
    - name: solutionId
      in: path
      required: true
      schema:
        type: string
      description: Solution ID
    responses:
      '200':
        description: Solution details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolutionConfig'
      '404':
        description: Solution not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Cập nhật solution
    description: Cập nhật cấu hình solution tùy chỉnh. Solution mặc định không thể cập nhật.
    operationId: updateSolution
    tags:
    - Solutions
    parameters:
    - name: solutionId
      in: path
      required: true
      schema:
        type: string
      description: Solution ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateSolutionRequest'
    responses:
      '200':
        description: Solution updated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolutionConfig'
      '400':
        description: Bad request (validation failed)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Cannot update default solution
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Solution not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Xóa solution
    description: Xóa solution tùy chỉnh. Solution mặc định không thể xóa.
    operationId: deleteSolution
    tags:
    - Solutions
    parameters:
    - name: solutionId
      in: path
      required: true
      schema:
        type: string
      description: Solution ID
    responses:
      '200':
        description: Solution deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                solutionId:
                  type: string
      '403':
        description: Cannot delete default solution
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Solution not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho solution
    operationId: getSolutionOptions
    tags:
    - Solutions
    responses:
      '200':
        description: Phản hồi CORS preflight
