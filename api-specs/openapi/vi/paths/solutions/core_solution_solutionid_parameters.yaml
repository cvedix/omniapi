# API endpoint: /v1/core/solution/{solutionId}/parameters
# Tag: Solutions

/v1/core/solution/{solutionId}/parameters:
  get:
    summary: Lấy schema tham số solution
    description: 'Trả về schema tham số cần thiết để tạo instance với solution này.

      Bao gồm:

      - **Tham số bổ sung**: Tham số theo solution trích từ pipeline nodes (vd. RTSP_URL, MODEL_PATH, FILE_PATH)

      - **Trường chuẩn**: Các trường tạo instance chung (name, group, persistent, autoStart, ...)


      Tham số đánh dấu bắt buộc phải có trong object `additionalParams` khi tạo instance.

      Tham số có giá trị mặc định là tùy chọn.

      '
    operationId: getSolutionParameters
    tags:
    - Solutions
    parameters:
    - name: solutionId
      in: path
      required: true
      schema:
        type: string
      description: Định danh solution
    responses:
      '200':
        description: Schema tham số solution
        content:
          application/json:
            schema:
              type: object
              properties:
                solutionId:
                  type: string
                  description: Định danh solution
                  example: face_detection
                solutionName:
                  type: string
                  description: Tên hiển thị solution
                  example: Face Detection
                solutionType:
                  type: string
                  description: Loại solution
                  example: face_detection
                pipeline:
                  type: array
                  description: Các node pipeline kèm thông tin tham số chi tiết
                  items:
                    type: object
                    properties:
                      nodeType:
                        type: string
                        description: Định danh loại node
                        example: rtsp_src
                      nodeName:
                        type: string
                        description: Template tên node
                        example: source_{instanceId}
                      displayName:
                        type: string
                        description: Tên hiển thị node
                        example: RTSP Source
                      description:
                        type: string
                        description: Mô tả node
                        example: Receive video stream from RTSP URL
                      category:
                        type: string
                        description: Danh mục node
                        enum:
                        - source
                        - detector
                        - processor
                        - destination
                        - broker
                        example: source
                      requiredParameters:
                        type: array
                        description: Tham số bắt buộc cho loại node này
                        items:
                          type: string
                        example:
                        - rtsp_url
                      optionalParameters:
                        type: array
                        description: Tham số tùy chọn cho loại node này
                        items:
                          type: string
                        example:
                        - channel
                        - resize_ratio
                      defaultParameters:
                        type: object
                        description: Giá trị tham số mặc định
                        additionalProperties:
                          type: string
                        example:
                          channel: '0'
                          resize_ratio: '1.0'
                      parameters:
                        type: object
                        description: Giá trị tham số hiện tại trong solution
                        additionalProperties:
                          type: string
                        example:
                          rtsp_url: ${RTSP_URL}
                  example:
                  - nodeType: rtsp_src
                    nodeName: source_{instanceId}
                    displayName: RTSP Source
                    description: Nhận stream video từ URL RTSP
                    category: source
                    requiredParameters:
                    - rtsp_url
                    optionalParameters:
                    - channel
                    - resize_ratio
                    defaultParameters:
                      channel: '0'
                      resize_ratio: '1.0'
                    parameters:
                      rtsp_url: ${RTSP_URL}
                additionalParams:
                  type: object
                  description: Tham số theo solution trích từ pipeline nodes
                  additionalProperties:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Tên tham số
                      type:
                        type: string
                        description: Kiểu tham số
                        example: string
                      required:
                        type: boolean
                        description: Tham số này có bắt buộc hay không
                      default:
                        type: string
                        description: Giá trị mặc định (nếu có)
                      description:
                        type: string
                        description: Mô tả tham số
                      usedInNodes:
                        type: array
                        description: Danh sách loại node dùng tham số này
                        items:
                          type: string
                        example:
                        - rtsp_src
                        - rtmp_src
                  example:
                    RTSP_URL:
                      name: RTSP_URL
                      type: string
                      required: true
                      description: URL cho node rtsp_src
                    MODEL_PATH:
                      name: MODEL_PATH
                      type: string
                      required: false
                      default: ./models/default.onnx
                      description: Đường dẫn file cho node yunet_face_detector
                requiredAdditionalParams:
                  type: array
                  description: Danh sách tên tham số bổ sung bắt buộc
                  items:
                    type: string
                  example:
                  - RTSP_URL
                standardFields:
                  type: object
                  description: Các trường tạo instance chuẩn
                  additionalProperties:
                    type: object
                    properties:
                      type:
                        type: string
                        description: Kiểu trường
                      required:
                        type: boolean
                        description: Trường này có bắt buộc hay không
                      default:
                        description: Giá trị mặc định
                      description:
                        type: string
                        description: Mô tả trường
                      pattern:
                        type: string
                        description: Pattern validation (cho chuỗi)
                      enum:
                        type: array
                        description: Các giá trị cho phép (cho enum)
                        items:
                          type: string
                      minimum:
                        type: number
                        description: Giá trị tối thiểu (cho số)
                  example:
                    name:
                      type: string
                      required: true
                      description: 'Tên instance (pattern: ^[A-Za-z0-9 -_]+$)'
                      pattern: ^[A-Za-z0-9 -_]+$
                    group:
                      type: string
                      required: false
                      description: 'Tên nhóm (pattern: ^[A-Za-z0-9 -_]+$)'
                      pattern: ^[A-Za-z0-9 -_]+$
                    persistent:
                      type: boolean
                      required: false
                      default: false
                      description: Lưu instance ra file JSON
                    autoStart:
                      type: boolean
                      required: false
                      default: false
                      description: Tự động khởi động instance khi tạo
                requiredStandardFields:
                  type: array
                  description: Danh sách tên trường chuẩn bắt buộc
                  items:
                    type: string
                  example:
                  - name
            example:
              solutionId: face_detection
              solutionName: Face Detection
              solutionType: face_detection
              pipeline:
              - nodeType: rtsp_src
                nodeName: source_{instanceId}
                displayName: RTSP Source
                description: Nhận stream video từ URL RTSP
                category: source
                requiredParameters:
                - rtsp_url
                optionalParameters:
                - channel
                - resize_ratio
                defaultParameters:
                  channel: '0'
                  resize_ratio: '1.0'
                parameters:
                  rtsp_url: ${RTSP_URL}
              - nodeType: yunet_face_detector
                nodeName: detector_{instanceId}
                displayName: YuNet Face Detector
                description: Nhận diện khuôn mặt bằng mô hình YuNet
                category: detector
                requiredParameters:
                - model_path
                optionalParameters:
                - score_threshold
                - nms_threshold
                - top_k
                defaultParameters:
                  score_threshold: '0.7'
                  nms_threshold: '0.5'
                  top_k: '50'
                parameters:
                  model_path: ${MODEL_PATH}
              additionalParams:
                RTSP_URL:
                  name: RTSP_URL
                  type: string
                  required: true
                  description: Tham số bắt buộc cho rtsp_src (rtsp_url)
                  usedInNodes:
                  - rtsp_src
                MODEL_PATH:
                  name: MODEL_PATH
                  type: string
                  required: true
                  description: Tham số bắt buộc cho yunet_face_detector (model_path)
                  usedInNodes:
                  - yunet_face_detector
              requiredAdditionalParams:
              - RTSP_URL
              standardFields:
                name:
                  type: string
                  required: true
                  description: 'Tên instance (pattern: ^[A-Za-z0-9 -_]+$)'
                  pattern: ^[A-Za-z0-9 -_]+$
                group:
                  type: string
                  required: false
                  description: 'Tên nhóm (pattern: ^[A-Za-z0-9 -_]+$)'
                  pattern: ^[A-Za-z0-9 -_]+$
                persistent:
                  type: boolean
                  required: false
                  default: false
                  description: Lưu instance ra file JSON
                autoStart:
                  type: boolean
                  required: false
                  default: false
                  description: Tự động khởi động instance khi tạo
              requiredStandardFields:
              - name
      '404':
        description: Không tìm thấy solution
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho tham số solution
    operationId: getSolutionParametersOptions
    tags:
    - Solutions
    responses:
      '200':
        description: Phản hồi CORS preflight
