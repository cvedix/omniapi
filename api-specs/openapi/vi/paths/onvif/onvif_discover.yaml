# API endpoint: /v1/onvif/discover
# Tag: ONVIF

/v1/onvif/discover:
  post:
    summary: Khám phá camera ONVIF
    description: 'Khám phá các camera ONVIF trên mạng bằng giao thức WS-Discovery.

      Endpoint này khởi động quá trình khám phá bất đồng bộ để tìm kiếm các camera tuân thủ ONVIF trên mạng cục bộ.

      **Tham số Timeout:** - Tham số truy vấn tùy chọn `timeout` (1-30 giây, mặc định: 5) - Điều khiển thời gian chờ phản
      hồi từ camera trong quá trình khám phá

      **Phản hồi:** - Trả về 204 No Content khi quá trình khám phá được khởi động - Sử dụng GET /v1/onvif/cameras để lấy danh
      sách camera đã khám phá sau khi hoàn tất '
    operationId: discoverONVIFCameras
    tags:
    - ONVIF
    parameters:
    - name: timeout
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 30
        default: 5
      description: 'Thời gian chờ khám phá tính bằng giây (1-30, mặc định: 5)'
      example: 5
    responses:
      '204':
        description: Quá trình khám phá đã được khởi động thành công
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho khám phá ONVIF
    operationId: discoverONVIFCamerasOptions
    tags:
    - ONVIF
    responses:
      '200':
        description: Phản hồi CORS preflight
