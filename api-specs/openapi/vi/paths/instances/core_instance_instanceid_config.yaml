# API endpoint: /v1/core/instance/{instanceId}/config
# Tag: Instances

/v1/core/instance/{instanceId}/config:
  get:
    summary: Lấy cấu hình instance
    description: 'Trả về cấu hình của instance. Các thiết lập cấu hình khác với trạng thái runtime (AutoRestart, AutoStart, Detector, Input, v.v.). **Lưu ý:** Đây là định dạng cấu hình, không phải trạng thái runtime. Để xem trạng thái runtime, dùng endpoint chi tiết instance.'

    operationId: getConfig
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance (UUID)
      example: '{Updated}'
    responses:
      '200':
        description: Cấu hình instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceConfig'
            example:
              AutoRestart: false
              AutoStart: false
              Detector:
                preset_values:
                  MosaicInference:
                    Detector/conf_threshold: 0.7
              DetectorRegions: {}
              DisplayName: Test Instance
              Input:
                match_fps: true
                media_format:
                  color_format: 0
                  default_format: true
                  height: 0
                  is_software: false
                  name: Giống nguồn
                media_type: Images
                output_fps: 8
                uri: https://some_uri
              InstanceId: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Đặt giá trị config tại đường dẫn cụ thể
    description: 'Đặt giá trị cấu hình tại đường dẫn chỉ định. Đường dẫn là key trong cấu hình; với cấu hình lồng nhau
      dùng key lồng nhau phân tách bằng dấu gạch chéo "/". **Lưu ý:** Thao tác này sẽ ghi đè giá trị tại đường dẫn đã cho. **Ví dụ đường dẫn:** Đường dẫn đơn `"DisplayName"` - đặt DisplayName cấp cao; đường dẫn lồng `"Output/handlers/Mqtt"` - đặt handler Mqtt trong Output.handlers. **Định dạng jsonValue:** Chuỗi: `"\"my string\""` (chuỗi JSON escaped)

      - For object values: `"{\"key\":\"value\"}"` (escaped JSON object)


      The instance must exist and not be read-only. If the instance is currently running, it will be automatically restarted
      to apply the changes.

      '
    operationId: setConfig
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance (UUID)
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SetConfigRequest'
          examples:
            stringValue:
              summary: Đặt giá trị chuỗi
              value:
                path: my/nested/path
                jsonValue: '"my string"'
            objectValue:
              summary: Đặt giá trị object
              value:
                path: Output/handlers/Mqtt
                jsonValue: '{"uri":"mqtt://localhost:1883/events"}'
    responses:
      '204':
        description: Đã thiết lập giá trị cấu hình thành công
      '400':
        description: Yêu cầu không hợp lệ (đầu vào sai hoặc thiếu trường bắt buộc)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Đặt giá trị config tại đường dẫn cụ thể
    description: 'PUT alias của POST để đặt giá trị cấu hình tại đường dẫn chỉ định.


      Hữu ích cho client muốn cập nhật tài nguyên theo ngữ nghĩa PUT.


      Để bật/tắt face detection global cho instance, dùng:

      - path: `"AdditionalParams/ENABLE_FACE_DETECTION"`, jsonValue: `"\"true\""` hoặc `"\"false\""`

      - path: `"AdditionalParams/FACE_DETECTION_MODEL_PATH"`, jsonValue: `"\"/opt/cvedix/models/face/yunet.onnx\""`

      '
    operationId: setConfigPut
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance (UUID)
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SetConfigRequest'
          examples:
            enableFaceDetection:
              summary: Bật face detection global
              value:
                path: AdditionalParams/ENABLE_FACE_DETECTION
                jsonValue: '"true"'
            setFaceDetectionModelPath:
              summary: Thiết lập đường dẫn model face detection
              value:
                path: AdditionalParams/FACE_DETECTION_MODEL_PATH
                jsonValue: '"/opt/cvedix/models/face/yunet.onnx"'
    responses:
      '204':
        description: Đã thiết lập giá trị cấu hình thành công
      '400':
        description: Yêu cầu không hợp lệ (đầu vào sai hoặc thiếu trường bắt buộc)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho thiết lập config
    operationId: setConfigOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
