# API endpoint: /v1/core/instance/{instanceId}/restart
# Tag: Instances

/v1/core/instance/{instanceId}/restart:
  post:
    summary: Khởi động lại instance
    description: 'Khởi động lại instance bằng cách dừng (nếu đang chạy) rồi start lại. Hữu ích để áp dụng
      thay đổi cấu hình hoặc phục hồi sau lỗi. **Hành vi:** Nếu instance đang chạy sẽ bị dừng trước, rồi được start lại; đảm bảo khởi động lại sạch với cấu hình hiện tại; trả về thông tin instance sau restart. **Lưu ý:** Khởi động lại instance có thể mất vài giây do pipeline dừng rồi khởi động lại.'

    operationId: restartInstance
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    responses:
      '200':
        description: Đã khởi động lại instance thành công
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/InstanceInfo'
              - type: object
                properties:
                  message:
                    type: string
      '400':
        description: Khởi động lại instance thất bại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho khởi động lại instance
    operationId: restartInstanceOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
