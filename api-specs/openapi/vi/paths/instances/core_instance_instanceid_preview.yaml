# API endpoint: /v1/core/instance/{instanceId}/preview
# Tag: Instances

/v1/core/instance/{instanceId}/preview:
  get:
    summary: Lấy preview instance
    description: Lấy ảnh/frame preview từ instance
    operationId: getInstancePreview
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    responses:
      '200':
        description: Ảnh xem trước
        content:
          image/jpeg:
            schema:
              type: string
              format: binary
          image/png:
            schema:
              type: string
              format: binary
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
