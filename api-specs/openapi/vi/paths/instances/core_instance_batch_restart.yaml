# API endpoint: /v1/core/instance/batch/restart
# Tag: Instances

/v1/core/instance/batch/restart:
  post:
    summary: Khởi động lại nhiều instance đồng thời
    description: Khởi động lại nhiều instance đồng thời bằng cách dừng rồi khởi động. Mọi thao tác chạy song song để tối ưu hiệu năng.
    operationId: batchRestartInstances
    tags:
    - Instances
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - instanceIds
            properties:
              instanceIds:
                type: array
                items:
                  type: string
                description: Mảng định danh instance cần khởi động lại
                example:
                - instance-1
                - instance-2
                - instance-3
    responses:
      '200':
        description: Đã hoàn thành thao tác khởi động lại hàng loạt
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    type: object
                    properties:
                      instanceId:
                        type: string
                      success:
                        type: boolean
                      status:
                        type: string
                      running:
                        type: boolean
                      error:
                        type: string
                total:
                  type: integer
                success:
                  type: integer
                failed:
                  type: integer
                message:
                  type: string
            example:
              results:
              - instanceId: instance-1
                success: true
                status: restarted
                running: true
              - instanceId: instance-2
                success: false
                status: failed
                error: Could not restart instance. Check if instance exists and has a pipeline.
              total: 2
              success: 1
              failed: 1
              message: Batch restart operation completed
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho batch restart
    operationId: batchRestartInstancesOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
