# API endpoint: /v1/core/instance/{instanceId}
# Tag: Instances

/v1/core/instance/{instanceId}:
  get:
    summary: Lấy thông tin chi tiết instance
    description: 'Trả về thông tin chi tiết của một instance: cấu hình đầy đủ, trạng thái, runtime
      Phản hồi gồm: cấu hình instance (tên hiển thị, nhóm, solution, ...), trạng thái runtime (đang chạy, đã nạp, FPS, ...), thiết lập (chế độ detector, độ nhạy, giới hạn frame rate, ...), cấu hình Input/Output, thông tin originator. Instance phải tồn tại; nếu không tìm thấy sẽ trả về lỗi 404.'

    operationId: getInstance
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    responses:
      '200':
        description: Chi tiết instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceInfo'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Cập nhật thông tin instance
    description: 'Cập nhật cấu hình instance. Chỉ các trường gửi lên được cập nhật. Hỗ trợ hai kiểu update
      **Định dạng cập nhật 1 - Từng trường (camelCase):** Cập nhật từng trường như `name`, `group`, `autoStart`, `frameRateLimit`, ...; dùng `additionalParams` cho tham số riêng solution (RTSP_URL, MODEL_PATH, ...). **Định dạng 2 - Config trực tiếp (PascalCase):** Cập nhật theo PascalCase giống file cấu hình instance; có thể cập nhật `Input`, `Output`, `Detector`, `Zone`, ... **Hành vi:** Nếu instance đang chạy sẽ được khởi động lại tự động để áp dụng thay đổi; nếu không chạy thì thay đổi có hiệu lực khi start; instance phải tồn tại và không read-only; chỉ các trường gửi lên được cập nhật.'

    operationId: updateInstance
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateInstanceRequest'
    responses:
      '200':
        description: Đã cập nhật instance thành công
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/InstanceInfo'
              - type: object
                properties:
                  message:
                    type: string
                    example: Đã cập nhật instance thành công
      '400':
        description: Yêu cầu không hợp lệ hoặc validation thất bại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  patch:
    summary: Cập nhật instance với dữ liệu một phần (patch)
    description: 'Cập nhật instance với dữ liệu một phần (tương tự PUT nhưng dành cho partial updates)
      where only specific fields need to be changed.


      **Difference from PUT:**

      - **PATCH**: Explicitly designed for partial updates, only update provided fields

      - **PUT**: Can be used for full or partial updates


      **Behavior:**

      - Only provided fields will be updated; other fields remain unchanged

      - Supports both camelCase (field-by-field) and PascalCase (direct config) formats

      - If the instance is currently running, it will be automatically restarted to apply the changes

      - The instance must exist and not be read-only


      **Use Cases:**

      - Update a single field (e.g., just the name)

      - Update a few related fields

      - Partial configuration updates


      **Example:**

      Update only the instance name:

      ```json

      {

      "name": "Updated Instance Name"

      }

      ```


      Update name and frame rate limit:

      ```json

      {

      "name": "Updated Instance Name",

      "frameRateLimit": 30

      }

      ```

      '
    operationId: corePatchInstanceV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
      example: '{threshold}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateInstanceRequest'
          examples:
            updateName:
              summary: Chỉ cập nhật tên instance
              value:
                name: Updated Instance Name
            updateMultiple:
              summary: Cập nhật nhiều trường
              value:
                name: Updated Instance Name
                frameRateLimit: 30
                autoStart: true
    responses:
      '204':
        description: Đã cập nhật instance thành công
      '400':
        description: Yêu cầu không hợp lệ (lỗi phân tích hoặc tham số không hợp lệ)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Yêu cầu không hợp lệ
              message: Body yêu cầu không hợp lệ hoặc validation thất bại
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Không tìm thấy
              message: 'Không tìm thấy instance: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Internal Server Error
              message: Cập nhật instance thất bại
  options:
    summary: CORS preflight cho cập nhật instance
    operationId: updateInstanceOptions
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    responses:
      '200':
        description: Phản hồi CORS preflight
        headers:
          Access-Control-Allow-Origin:
            schema:
              type: string
              example: '*'
          Access-Control-Allow-Methods:
            schema:
              type: string
              example: GET, PUT, PATCH, DELETE, OPTIONS
          Access-Control-Allow-Headers:
            schema:
              type: string
              example: Content-Type, Authorization
  delete:
    summary: Xóa một instance
    description: 'Xóa instance và dừng pipeline nếu đang chạy. Thao tác xóa vĩnh viễn instance khỏi
      the system.


      **Behavior:**

      - If the instance is currently running, it will be stopped first

      - The instance configuration will be removed from memory

      - If the instance is persistent, its configuration file will be deleted from storage

      - All resources associated with the instance will be released


      **Prerequisites:**

      - Instance must exist

      - Instance must not be read-only (system instances cannot be deleted)


      **Lưu ý:** Thao tác này không thể hoàn tác. Sau khi xóa, cần tạo lại instance bằng endpoint tạo instance.'

    operationId: deleteInstance
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    responses:
      '200':
        description: Đã xóa instance thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                instanceId:
                  type: string
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
