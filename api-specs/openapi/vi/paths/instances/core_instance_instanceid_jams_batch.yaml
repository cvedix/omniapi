# API endpoint: /v1/core/instance/{instanceId}/jams/batch
# Tag: Instances

/v1/core/instance/{instanceId}/jams/batch:
  post:
    summary: Cập nhật hàng loạt vùng kẹt xe (jam zones)
    description: 'Cập nhật nhiều vùng kẹt xe (jam zones) cho instance ba_jam trong một yêu cầu.

      Endpoint này cho phép cập nhật nhiều vùng cùng lúc, hiệu quả hơn so với cập nhật từng vùng. Instance sẽ được khởi động lại tự động để áp dụng thay đổi nếu đang chạy.
      '
    operationId: batchUpdateJams
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
              - id
              - roi
              properties:
                id:
                  type: string
                  description: ID vùng kẹt xe (jam zone)
                name:
                  type: string
                  description: Tên vùng kẹt xe
                roi:
                  type: array
                  items:
                    type: object
                    properties:
                      x:
                        type: number
                      y:
                        type: number
                  description: Vùng quan tâm ROI (đa giác ít nhất 3 điểm)
                threshold:
                  type: number
                  description: Ngưỡng phát hiện
                maxCount:
                  type: integer
                  description: Ngưỡng số lượng tối đa
            example:
            - id: jam1
              name: Zone 1
              roi:
              - x: 0
                y: 0
              - x: 100
                y: 0
              - x: 100
                y: 100
              - x: 0
                y: 100
    responses:
      '200':
        description: Đã cập nhật vùng kẹt xe thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                updated:
                  type: integer
                  description: Số vùng kẹt xe đã cập nhật
                  example: 2
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho cập nhật hàng loạt jam zones
    operationId: batchUpdateJamsOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
