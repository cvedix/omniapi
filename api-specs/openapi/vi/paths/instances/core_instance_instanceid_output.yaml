# API endpoint: /v1/core/instance/{instanceId}/output
# Tag: Instances

/v1/core/instance/{instanceId}/output:
  get:
    summary: Lấy đầu ra và kết quả xử lý của instance
    description: 'Trả về output và kết quả xử lý thời gian thực của instance tại thời điểm yêu cầu.

      Endpoint cung cấp thông tin tổng hợp: số liệu xử lý hiện tại (FPS, giới hạn frame rate), nguồn đầu vào (FILE hoặc RTSP), loại đầu ra và chi tiết (file FILE hoặc stream RTMP), thiết lập phát hiện và chế độ xử lý, trạng thái hiện tại. Với instance đầu ra FILE: số file, tổng dung lượng, thông tin file mới nhất, trạng thái hoạt động. Với instance đầu ra RTMP: URL RTMP và RTSP.

      '
    operationId: getInstanceOutput
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    responses:
      '200':
        description: Đầu ra instance và kết quả xử lý
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceOutputResponse'
            examples:
              fileOutput:
                summary: Instance với đầu ra FILE
                value:
                  timestamp: '2025-01-15 14:30:25.123'
                  instanceId: abc-123-def
                  displayName: face_detection_file_source
                  solutionId: face_detection
                  solutionName: Face Detection
                  running: true
                  loaded: true
                  metrics:
                    fps: 25.5
                    frameRateLimit: 0
                  input:
                    type: FILE
                    path: /path/to/video.mp4
                  output:
                    type: FILE
                    files:
                      exists: true
                      directory: ./output/abc-123-def
                      fileCount: 15
                      totalSizeBytes: 15728640
                      totalSize: 15 MB
                      latestFile: face_detection_20250115_143025.mp4
                      latestFileTime: '2025-01-15 14:30:25'
                      recentFileCount: 3
                      isActive: true
                  detection:
                    sensitivity: Low
                    mode: SmartDetection
                    movementSensitivity: Low
                    sensorModality: RGB
                  modes:
                    statisticsMode: true
                    metadataMode: false
                    debugMode: true
                    diagnosticsMode: false
                  status:
                    running: true
                    processing: true
                    message: Instance is running and processing frames
              rtmpOutput:
                summary: Instance với đầu ra RTMP
                value:
                  timestamp: '2025-01-15 14:30:25.123'
                  instanceId: xyz-789
                  displayName: face_detection_rtmp_stream
                  solutionId: face_detection_rtmp
                  solutionName: Face Detection RTMP
                  running: true
                  loaded: true
                  metrics:
                    fps: 30.0
                    frameRateLimit: 25
                  input:
                    type: FILE
                    path: /path/to/video.mp4
                  output:
                    type: RTMP_STREAM
                    rtmpUrl: rtmp://localhost:1935/live/face_stream
                    rtspUrl: rtsp://localhost:8554/live/face_stream_0
                  detection:
                    sensitivity: High
                    mode: SmartDetection
                    movementSensitivity: Low
                    sensorModality: RGB
                  modes:
                    statisticsMode: true
                    metadataMode: true
                    debugMode: false
                    diagnosticsMode: false
                  status:
                    running: true
                    processing: true
                    message: Instance is running and processing frames
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho lấy output instance
    operationId: getInstanceOutputOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
