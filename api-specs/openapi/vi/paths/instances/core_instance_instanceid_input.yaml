# API endpoint: /v1/core/instance/{instanceId}/input
# Tag: Instances

/v1/core/instance/{instanceId}/input:
  post:
    summary: Thiết lập nguồn đầu vào cho instance
    description: 'Thiết lập cấu hình nguồn đầu vào cho instance. Thay thế trường Input trong Instance File theo
      to the request.


      **Input Types:**

      - **RTSP**: Uses `rtsp_src` node for RTSP streams

      - **HLS**: Uses `hls_src` node for HLS streams

      - **Manual**: Uses `v4l2_src` node for V4L2 devices


      The instance must exist and not be read-only. If the instance is currently running, it will be automatically restarted
      to apply the changes.

      '
    operationId: setInstanceInput
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of the instance (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SetInputRequest'
          example:
            type: Manual
            uri: http://localhost
    responses:
      '204':
        description: Input settings updated successfully
      '400':
        description: Bad request (invalid input or missing required fields)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho thiết lập input
    operationId: setInstanceInputOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
