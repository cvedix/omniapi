# API endpoint: /v1/core/instance/{instanceId}/input
# Tag: Instances

/v1/core/instance/{instanceId}/input:
  post:
    summary: Thiết lập nguồn đầu vào cho instance
    description: 'Thiết lập cấu hình nguồn đầu vào cho instance. Thay thế trường Input trong Instance File theo yêu cầu. **Loại đầu vào:** **RTSP** - dùng node `rtsp_src`; **HLS** - dùng node `hls_src`; **Manual** - dùng node `v4l2_src` cho thiết bị V4L2. Instance phải tồn tại và không read-only. Nếu instance đang chạy sẽ được khởi động lại tự động để áp dụng thay đổi.'

    operationId: setInstanceInput
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SetInputRequest'
          example:
            type: Manual
            uri: http://localhost
    responses:
      '204':
        description: Đã cập nhật cài đặt đầu vào thành công
      '400':
        description: Yêu cầu không hợp lệ (đầu vào sai hoặc thiếu trường bắt buộc)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho thiết lập input
    operationId: setInstanceInputOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
