# API endpoint: /v1/core/instance/{instanceId}/output/rtsp
# Tag: Instances

/v1/core/instance/{instanceId}/output/rtsp:
  post:
    summary: Cấu hình RTSP output cho instance
    description: 'Bật hoặc tắt RTSP (Real-Time Streaming Protocol) output cho instance tại URI được chỉ định.

      **RTSP Output:** - RTSP stream có thể truy cập qua RTSP clients (VLC, ffplay, v.v.) - URI có thể được cung cấp trong
      request body hoặc sẽ dùng mặc định - Stream hỗ trợ nhiều RTSP clients đồng thời'
    operationId: coreSetOutputRtspV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enabled
            properties:
              enabled:
                type: boolean
                description: Bật hoặc tắt RTSP output
              uri:
                type: string
                description: RTSP URI (tùy chọn, sẽ dùng mặc định nếu không cung cấp)
                example: rtsp://localhost:8554/stream
          examples:
            enableRtsp:
              summary: Bật RTSP output với URI tùy chỉnh
              value:
                enabled: true
                uri: rtsp://localhost:8554/stream
            enableRtspDefault:
              summary: Bật RTSP output với URI mặc định
              value:
                enabled: true
            disableRtsp:
              summary: Tắt RTSP output
              value:
                enabled: false
    responses:
      '204':
        description: Cấu hình RTSP output thành công
      '400':
        description: Yêu cầu không hợp lệ (lỗi parsing hoặc tham số không hợp lệ)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho endpoint RTSP output
    operationId: rtspOutputOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
