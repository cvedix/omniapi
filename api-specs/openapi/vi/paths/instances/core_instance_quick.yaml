# API endpoint: /v1/core/instance/quick
# Tag: Instances

/v1/core/instance/quick:
  post:
    summary: Tạo instance nhanh
    description: 'Tạo instance AI mới với tham số đơn giản. Tự động ánh xạ loại solution sang solution ID và cung cấp giá trị mặc định. Endpoint dùng để tạo instance nhanh với cấu hình tối thiểu:
      - Ánh xạ solution types (ví dụ "face_detection", "ba_crossline") sang solution IDs
      - Điền giá trị mặc định cho tham số thiếu
      - Chuyển đường dẫn dev sang production
      '
    operationId: createQuickInstance
    tags:
    - Instances
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - solutionType
            properties:
              name:
                type: string
                description: Tên hiển thị instance
                example: My Quick Instance
              solutionType:
                type: string
                description: Loại solution (vd. \"face_detection\", \"ba_crossline\", \"ba_jam\", \"ba_stop\")
                example: face_detection
              group:
                type: string
                description: Tên nhóm instance
                example: default
              persistent:
                type: boolean
                description: Có lưu cấu hình instance hay không
                default: true
              autoStart:
                type: boolean
                description: Có tự động khởi động instance hay không
                default: false
              input:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - file
                    - rtsp
                    - http
                    description: Loại input
                  source:
                    type: string
                    description: Nguồn input (đường dẫn file, URL RTSP, v.v.)
              inputType:
                type: string
                description: Loại input (thay thế cho input.type)
              output:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - file
                    - rtmp
                    - http
                    description: Loại output
                  destination:
                    type: string
                    description: Đích đầu ra (output)
              outputType:
                type: string
                description: Loại output (thay thế cho output.type)
    responses:
      '201':
        description: Đã tạo instance thành công
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceInfo'
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho tạo instance nhanh
    operationId: createQuickInstanceOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
