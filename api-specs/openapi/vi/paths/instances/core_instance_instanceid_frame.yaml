# API endpoint: /v1/core/instance/{instanceId}/frame
# Tag: Instances

/v1/core/instance/{instanceId}/frame:
  get:
    summary: Lấy frame cuối từ instance
    description: 'Trả về frame đã xử lý cuối cùng từ instance đang chạy. Frame mã hóa JPEG và trả về dạng
      base64-encoded string.


      **Features:**

      - Frame is captured from the pipeline after processing (includes OSD/detection overlays)

      - Frame is automatically cached when pipeline processes new frames

      - Frame cache is automatically cleaned up when instance stops or is deleted


      **Important Notes:**

      - Frame capture only works if the pipeline has an `app_des_node`

      - If pipeline doesn''t have `app_des_node`, frame will be empty string

      - Instance must be running to have a frame

      - Frame is cached automatically each time pipeline processes a new frame

      '
    operationId: getLastFrame
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID (UUID)
    responses:
      '200':
        description: Last frame retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LastFrameResponse'
            example:
              frame: 
              running: true
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho lấy frame cuối
    operationId: getLastFrameOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
