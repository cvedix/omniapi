# API endpoint: /v1/core/instance/{instanceId}/state
# Tag: Instances

/v1/core/instance/{instanceId}/state:
  get:
    summary: Lấy trạng thái runtime của instance
    description: 'Trả về trạng thái runtime của instance. State khác config — state chứa thiết lập runtime
      chỉ tồn tại khi instance đã nạp; config chứa thiết lập lưu trữ trong file. **State vs Config:** State - thiết lập runtime, chỉ trong bộ nhớ, xóa khi gỡ nạp; Config - thiết lập lưu trữ, tồn tại sau restart. **Hành vi:** Instance phải tồn tại và đã nạp (hoặc đang chạy). Trả về object rỗng `{}` nếu chưa đặt state. State bị xóa khi gỡ nạp. **Lưu ý:** State không tồn tại sau unload hoặc restart. Để cấu hình lưu trữ, dùng endpoint config.'

    operationId: coreGetInstanceStateV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance (UUID)
      example: '{instanceId}'
    responses:
      '200':
        description: Đã lấy trạng thái instance thành công
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceState'
            examples:
              emptyState:
                summary: Trạng thái rỗng (chưa đặt state)
                value: {}
              withState:
                summary: State có giá trị
                value:
                  runtime:
                    mode: production
                    debug:
                      enabled: false
                  metrics:
                    interval: 60
                  Output:
                    handlers:
                      Mqtt:
                        enabled: true
                        broker: localhost
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Không tìm thấy
              message: 'Không tìm thấy instance: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '406':
        description: Instance chưa được nạp
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Không chấp nhận
              message: 'Instance chưa được nạp: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Đặt giá trị trạng thái runtime tại đường dẫn cụ thể
    description: 'Đặt giá trị runtime state tại đường dẫn chỉ định. State khác config — state chứa thiết lập runtime
      settings that only exist when the instance is loaded, while config contains persistent settings.


      **State vs Config:**

      - **State**: Runtime settings, in-memory only, cleared when instance is unloaded

      - **Config**: Persistent settings, stored in files, persists after restart


      **Behavior:**

      - Instance must exist and be loaded (or running)

      - If instance is running but not loaded, state storage will be initialized

      - Path uses forward slashes "/" for nested structures

      - State is cleared when instance is unloaded


      **Path Examples:**

      - Simple path: `"testValue"` - Sets top-level testValue

      Đường dẫn lồng: `"Output/handlers/Mqtt"` - đặt handler Mqtt trong Output.handlers. Đường dẫn sâu: `"runtime/debug/enabled"` - đặt cờ enabled trong runtime.debug. **Định dạng jsonValue:** Chuỗi `"\"my string\""`; object `"{\"key\":\"value\"}"`; số `"123"` hoặc `"45.67"`; boolean `"true"` hoặc `"false"`. **Lưu ý:** State không tồn tại sau unload hoặc restart. Để cấu hình lưu trữ, dùng endpoint config.'

    operationId: corePostInstanceStateV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance (UUID)
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SetStateRequest'
          examples:
            stringValue:
              summary: Đặt giá trị chuỗi
              value:
                path: runtime/mode
                jsonValue: '"production"'
            objectValue:
              summary: Đặt giá trị object
              value:
                path: Output/handlers/Mqtt
                jsonValue: '{"enabled":true,"broker":"localhost","port":1883}'
            nestedPath:
              summary: Đặt giá trị đường dẫn lồng nhau
              value:
                path: runtime/debug/enabled
                jsonValue: 'true'
    responses:
      '204':
        description: Đã thiết lập giá trị state thành công
      '400':
        description: Yêu cầu không hợp lệ (đầu vào sai, thiếu trường bắt buộc hoặc JSON không hợp lệ)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Yêu cầu không hợp lệ
              message: Trường 'jsonValue' phải chứa JSON hợp lệ
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Không tìm thấy
              message: 'Không tìm thấy instance: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '406':
        description: Instance chưa được nạp
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Không chấp nhận
              message: 'Instance chưa được nạp: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho trạng thái instance
    operationId: instanceStateOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
