# API endpoint: /v1/core/instance/{instanceId}/lines/batch
# Tag: Instances

/v1/core/instance/{instanceId}/lines/batch:
  post:
    summary: Cập nhật hàng loạt đường vượt (crossing lines)
    description: 'Cập nhật nhiều đường vượt (crossing lines) cho instance ba_crossline trong một yêu cầu.

      This endpoint allows updating multiple crossing lines at once, which is more efficient than updating them individually.
      The instance will be restarted automatically to apply the changes if it is currently running.
      '
    operationId: batchUpdateLines
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Instance ID (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
              - id
              - coordinates
              properties:
                id:
                  type: string
                  description: Line ID
                name:
                  type: string
                  description: Line name
                coordinates:
                  type: array
                  items:
                    type: object
                    properties:
                      x:
                        type: number
                      y:
                        type: number
                  minItems: 2
                  description: Line coordinates (at least 2 points)
                direction:
                  type: string
                  enum:
                  - bidirectional
                  - forward
                  - backward
                  description: Crossing direction
            example:
            - id: line1
              name: Main Line
              coordinates:
              - x: 0
                y: 50
              - x: 100
                y: 50
              direction: bidirectional
    responses:
      '200':
        description: Lines updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                updated:
                  type: integer
                  description: Number of lines updated
                  example: 2
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho cập nhật hàng loạt lines
    operationId: batchUpdateLinesOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
