# API endpoint: /v1/core/instance/{instanceId}/output/hls
# Tag: Instances

/v1/core/instance/{instanceId}/output/hls:
  post:
    summary: Cấu hình HLS output cho instance
    description: 'Bật hoặc tắt HLS (HTTP Live Streaming) output cho instance. Khi bật, trả về URI của HLS stream.

      **HLS Output:** - HLS stream có thể truy cập qua HTTP - File playlist (.m3u8) được tạo tự động - Video segments (.ts
      files) được tạo tự động - Stream có thể phát trong VLC, trình duyệt web, hoặc các trình phát tương thích HLS khác'
    operationId: coreSetOutputHlsV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance
      example: '{instanceId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enabled
            properties:
              enabled:
                type: boolean
                description: Bật hoặc tắt HLS output
          examples:
            enableHls:
              summary: Bật HLS output
              value:
                enabled: true
            disableHls:
              summary: Tắt HLS output
              value:
                enabled: false
    responses:
      '200':
        description: Cấu hình HLS output thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                uri:
                  type: string
                  description: 'HLS stream URI (ví dụ: http://localhost:8080/hls/{instanceId}/stream.m3u8)'
                  example: http://localhost:8080/hls/{instanceId}/stream.m3u8
      '204':
        description: Tắt HLS output thành công
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '406':
        description: Không thể thiết lập HLS output
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho endpoint HLS output
    operationId: hlsOutputOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
