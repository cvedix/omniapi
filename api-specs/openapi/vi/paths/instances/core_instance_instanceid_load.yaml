# API endpoint: /v1/core/instance/{instanceId}/load
# Tag: Instances

/v1/core/instance/{instanceId}/load:
  post:
    summary: Nạp instance vào bộ nhớ
    description: 'Nạp instance vào bộ nhớ và khởi tạo state storage. Khác với start instance
      - loading prepares the instance and enables state management, while starting begins the processing pipeline.


      **Hành vi:** Instance phải tồn tại. Nếu instance đã nạp thì trả về 406 Not Acceptable. Khởi tạo state storage cho instance. Instance có thể nạp mà chưa start (chạy). **Use case:** Chuẩn bị instance cho quản lý state; nạp instance vào bộ nhớ trước khi đặt state runtime; quản lý bộ nhớ và tài nguyên. **Lưu ý:** State chỉ có thể set/get khi instance đã nạp. State bị xóa khi instance bị gỡ nạp.'

    operationId: coreLoadInstanceV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance (UUID)
      example: '{instanceId}'
    responses:
      '204':
        description: Đã nạp instance thành công
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Không tìm thấy
              message: 'Không tìm thấy instance: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '406':
        description: Không thể nạp instance (đã nạp hoặc trạng thái không hợp lệ)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Không chấp nhận
              message: 'Không thể nạp instance: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho nạp instance
    operationId: loadInstanceOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
