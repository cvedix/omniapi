# API endpoint: /v1/core/instance/batch/stop
# Tag: Instances

/v1/core/instance/batch/stop:
  post:
    summary: Dừng nhiều instance đồng thời
    description: 'Dừng nhiều instance đồng thời. Các thao tác chạy song song để tối ưu
      performance.


      **Hành vi:** Mọi instance dừng song song; mỗi instance dừng độc lập; kết quả trả về cho từng instance; instance đã dừng được đánh dấu thành công. **Định dạng yêu cầu:** Gửi mảng instance ID trong `instanceIds`; mọi ID phải tồn tại. **Phản hồi:** Kết quả chi tiết từng instance; tổng số, số thành công, số thất bại; mỗi kết quả có instance ID, success, running, thông báo lỗi. **Lưu ý:** Dừng nhiều instance cùng lúc sẽ giải phóng tài nguyên; hữu ích để quản lý tải hệ thống.'

    operationId: batchStopInstances
    tags:
    - Instances
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - instanceIds
            properties:
              instanceIds:
                type: array
                items:
                  type: string
                description: Mảng định danh instance cần dừng
                example:
                - instance-1
                - instance-2
                - instance-3
    responses:
      '200':
        description: Đã hoàn thành thao tác dừng hàng loạt
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    type: object
                    properties:
                      instanceId:
                        type: string
                      success:
                        type: boolean
                      status:
                        type: string
                      running:
                        type: boolean
                      error:
                        type: string
                total:
                  type: integer
                success:
                  type: integer
                failed:
                  type: integer
                message:
                  type: string
            example:
              results:
              - instanceId: instance-1
                success: true
                status: stopped
                running: false
              - instanceId: instance-2
                success: false
                status: failed
                error: Could not stop instance. Check if instance exists.
              total: 2
              success: 1
              failed: 1
              message: Batch stop operation completed
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho batch stop
    operationId: batchStopInstancesOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
