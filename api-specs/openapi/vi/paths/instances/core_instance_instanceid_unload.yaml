# API endpoint: /v1/core/instance/{instanceId}/unload
# Tag: Instances

/v1/core/instance/{instanceId}/unload:
  post:
    summary: Gỡ instance khỏi bộ nhớ
    description: 'Gỡ instance khỏi bộ nhớ, xóa state storage và giải phóng tài nguyên. Khác với stop
      Gỡ nạp xóa instance khỏi bộ nhớ và xóa state runtime, còn stop chỉ dừng pipeline. **Hành vi:** Instance phải tồn tại và đã nạp. Nếu đang chạy sẽ bị dừng trước. State storage bị xóa (mọi state runtime mất). Tài nguyên được giải phóng. **Lưu ý:** State bị xóa khi gỡ nạp. State không tồn tại sau unload. Config (cấu hình lưu trữ) không bị ảnh hưởng.'

    operationId: coreUnloadInstanceV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance (UUID)
      example: '{instanceId}'
    responses:
      '204':
        description: Đã gỡ instance khỏi bộ nhớ thành công
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Not found
              message: 'Instance not found: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '406':
        description: Instance chưa được nạp
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Not Acceptable
              message: 'Instance not loaded: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho gỡ instance
    operationId: unloadInstanceOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
