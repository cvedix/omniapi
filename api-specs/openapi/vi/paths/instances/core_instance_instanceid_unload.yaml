# API endpoint: /v1/core/instance/{instanceId}/unload
# Tag: Instances

/v1/core/instance/{instanceId}/unload:
  post:
    summary: Gỡ instance khỏi bộ nhớ
    description: 'Gỡ instance khỏi bộ nhớ, xóa state storage và giải phóng tài nguyên. Khác với stop
      an instance - unloading removes the instance from memory and clears runtime state, while stopping only halts the processing
      pipeline.


      **Behavior:**

      - Instance must exist and be loaded

      - If instance is running, it will be stopped first

      - State storage is cleared (all runtime state is lost)

      - Resources are released


      **Use Cases:**

      - Free memory when instance is not needed

      - Clear runtime state

      - Release resources


      **Note:** State is cleared when instance is unloaded. State does not persist after unload. Config (persistent configuration)
      is not affected.

      '
    operationId: coreUnloadInstanceV1
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of the instance (UUID)
      example: '{instanceId}'
    responses:
      '204':
        description: Instance unloaded successfully
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Not found
              message: 'Instance not found: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '406':
        description: Instance not loaded
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            example:
              error: Not Acceptable
              message: 'Instance not loaded: 291a85b8-d4c0-5765-dcb2-48c9b51f48d0'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho gỡ instance
    operationId: unloadInstanceOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
