# API endpoint: /v1/core/instance/{instanceId}/stops/batch
# Tag: Instances

/v1/core/instance/{instanceId}/stops/batch:
  post:
    summary: Cập nhật hàng loạt vùng dừng (stop zones)
    description: 'Cập nhật nhiều vùng dừng (stop zones) cho instance ba_stop trong một yêu cầu.

      Endpoint cho phép cập nhật nhiều vùng dừng cùng lúc, hiệu quả hơn cập nhật từng cái. Instance sẽ được khởi động lại tự động để áp dụng thay đổi nếu đang chạy.'
    operationId: batchUpdateStops
    tags:
    - Instances
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
              - id
              - roi
              properties:
                id:
                  type: string
                  description: Định danh vùng dừng (stop zone ID)
                name:
                  type: string
                  description: Tên vùng dừng (stop zone)
                roi:
                  type: array
                  items:
                    type: object
                    properties:
                      x:
                        type: number
                      y:
                        type: number
                  description: Vùng quan tâm ROI (đa giác ít nhất 3 điểm)
                threshold:
                  type: number
                  description: Ngưỡng phát hiện
                duration:
                  type: integer
                  description: Thời gian dừng tối thiểu (giây)
            example:
            - id: stop1
              name: Zone 1
              roi:
              - x: 0
                y: 0
              - x: 100
                y: 0
              - x: 100
                y: 100
              - x: 0
                y: 100
    responses:
      '200':
        description: Đã cập nhật vùng dừng thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                updated:
                  type: integer
                  description: Số vùng dừng đã cập nhật
                  example: 2
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho cập nhật hàng loạt stops
    operationId: batchUpdateStopsOptions
    tags:
    - Instances
    responses:
      '200':
        description: Phản hồi CORS preflight
