# API endpoint: /v1/core/video/list
# Tag: Video

/v1/core/video/list:
  get:
    summary: Liệt kê file video đã tải lên
    description: "Trả về danh sách các file video đã được tải lên máy chủ.\n- Nếu không chỉ định tham số `directory`: Tìm kiếm đệ quy và liệt kê tất cả file video trong toàn bộ cây thư mục videos (bao gồm mọi thư mục con).\n- Nếu chỉ định tham số `directory`: Chỉ liệt kê file trong thư mục đó (không đệ quy, không tìm trong thư mục con).\n"
    operationId: listVideos
    tags:
    - Video
    parameters:
    - name: directory
      in: query
      required: false
      schema:
        type: string
      description: 'Đường dẫn thư mục con để liệt kê file (ví dụ: "projects/myproject/videos", "users/user123"). Nếu chỉ định, chỉ liệt kê file trong thư mục đó (không đệ quy). Nếu không chỉ định, tìm kiếm đệ quy tất cả thư mục con.'

      example: projects/myproject/videos
    responses:
      '200':
        description: Danh sách file video
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                videos:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                      path:
                        type: string
                      size:
                        type: integer
                      modified:
                        type: string
                count:
                  type: integer
                directory:
                  type: string
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
