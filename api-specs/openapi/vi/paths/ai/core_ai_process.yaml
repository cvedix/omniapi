# API endpoint: /v1/core/ai/process
# Tag: AI

/v1/core/ai/process:
  post:
    summary: Xử lý một hình ảnh/khung hình
    description: 'Xử lý một hình ảnh/khung hình qua pipeline xử lý AI.

      Hỗ trợ hàng đợi dựa trên độ ưu tiên và giới hạn tốc độ.

      '
    operationId: processImage
    tags:
    - AI
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - image
            properties:
              image:
                type: string
                description: Dữ liệu hình ảnh được mã hóa Base64
                example: /9j/4AAQSkZJRg...
              config:
                type: string
                description: Cấu hình xử lý (chuỗi JSON)
                example: '{"model": "yolo", "threshold": 0.5}'
              priority:
                type: string
                enum:
                - low
                - medium
                - high
                default: medium
                description: Độ ưu tiên yêu cầu
    responses:
      '200':
        description: Công việc xử lý đã được gửi thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                job_id:
                  type: string
                  description: Định danh công việc duy nhất
                  example: job_1234567890
                status:
                  type: string
                  example: queued
      '400':
        description: Yêu cầu không hợp lệ (JSON không hợp lệ hoặc thiếu trường bắt buộc)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '429':
        description: Vượt giới hạn tốc độ (rate limit)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '501':
        description: Chưa triển khai
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
