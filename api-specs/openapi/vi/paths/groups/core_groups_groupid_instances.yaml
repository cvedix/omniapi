# API endpoint: /v1/core/groups/{groupId}/instances
# Tag: Groups

/v1/core/groups/{groupId}/instances:
  get:
    summary: Lấy danh sách instance trong nhóm
    description: 'Trả về danh sách instance thuộc một nhóm: group ID, danh sách instance (ID, tên hiển thị, solution, trạng thái chạy), tổng số instance. Nhóm phải tồn tại; không tìm thấy trả về 404.

      '
    operationId: getGroupInstances
    tags:
    - Groups
    parameters:
    - name: groupId
      in: path
      required: true
      schema:
        type: string
      description: Định danh nhóm (Group ID)
    responses:
      '200':
        description: Danh sách instance trong nhóm
        content:
          application/json:
            schema:
              type: object
              properties:
                groupId:
                  type: string
                  description: Định danh nhóm (Group ID)
                instances:
                  type: array
                  items:
                    type: object
                    properties:
                      instanceId:
                        type: string
                      displayName:
                        type: string
                      solutionId:
                        type: string
                      running:
                        type: boolean
                      loaded:
                        type: boolean
                count:
                  type: integer
                  description: Số instance trong nhóm
            example:
              groupId: cameras
              count: 2
              instances:
              - instanceId: abc-123
                displayName: Camera 1
                solutionId: face_detection
                running: true
                loaded: true
              - instanceId: def-456
                displayName: Camera 2
                solutionId: face_detection
                running: false
                loaded: true
      '404':
        description: Không tìm thấy nhóm
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho instance nhóm
    operationId: getGroupInstancesOptions
    tags:
    - Groups
    responses:
      '200':
        description: Phản hồi CORS preflight
