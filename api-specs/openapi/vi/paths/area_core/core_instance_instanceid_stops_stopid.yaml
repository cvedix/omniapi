# API endpoint: /v1/core/instance/{instanceId}/stops/{stopId}
# Tag: Area Core

/v1/core/instance/{instanceId}/stops/{stopId}:
  get:
    summary: Lấy một vùng dừng (stop zone) theo ID
    description: 'Trả về một vùng dừng (stop zone) theo ID cho instance ba_stop.

      '
    operationId: getStop
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance
      example: '{instanceId}'
    - name: stopId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của vùng dừng cần lấy
      example: '{stopId}'
    responses:
      '200':
        description: Đã lấy vùng dừng thành công
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopZone'
      '404':
        description: Không tìm thấy instance hoặc vùng dừng
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Cập nhật một vùng dừng (stop zone) theo ID
    description: 'Cập nhật vùng dừng (stop zone) theo ID cho instance ba_stop. Thay đổi yêu cầu khởi động lại instance.

      '
    operationId: updateStop
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance
      example: '{instanceId}'
    - name: stopId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của vùng dừng cần cập nhật
      example: '{stopId}'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateStopRequest'
  delete:
    summary: Xóa một vùng dừng (stop zone) theo ID
    description: 'Xóa vùng dừng (stop zone) theo ID cho instance ba_stop. Thay đổi yêu cầu khởi động lại instance.

      '
    operationId: deleteStop
    tags:
    - Area Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của instance
      example: '{instanceId}'
    - name: stopId
      in: path
      required: true
      schema:
        type: string
      description: Định danh duy nhất của vùng dừng cần xóa
      example: '{stopId}'
    responses:
      '200':
        description: Đã xóa vùng dừng thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Đã xóa vùng dừng thành công
      '404':
        description: Không tìm thấy instance hoặc vùng dừng
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho endpoint chi tiết vùng dừng
    operationId: stopOptions
    tags:
    - Area Core
    responses:
      '200':
        description: Phản hồi CORS preflight
