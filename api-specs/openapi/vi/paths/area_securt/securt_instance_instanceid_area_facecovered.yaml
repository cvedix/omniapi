# API endpoint: /v1/securt/instance/{instanceId}/area/faceCovered
# Tag: Area SecuRT

/v1/securt/instance/{instanceId}/area/faceCovered:
  post:
    summary: Tạo vùng che mặt (face covered - thử nghiệm)
    description: Tạo vùng che mặt (face covered area) mới cho instance SecuRT. Tính năng thử nghiệm.
    operationId: createFaceCoveredArea
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FaceCoveredAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng che mặt (face covered area) thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                areaId:
                  type: string
                  description: Định danh vùng đã tạo (created area ID)
                  example: '{instanceId}'
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Tạo vùng che mặt với ID (face covered - thử nghiệm)
    description: Tạo vùng che mặt với ID cụ thể cho instance SecuRT. Tính năng thử nghiệm.
    operationId: createFaceCoveredAreaWithId
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    - name: areaId
      in: path
      required: true
      schema:
        type: string
      description: Định danh vùng (area ID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FaceCoveredAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng che mặt (face covered area) thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Vùng đã tồn tại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho vùng face covered
    operationId: createFaceCoveredAreaOptions
    tags:
    - Area SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
