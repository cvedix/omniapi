# API endpoint: /v1/securt/instance/{instanceId}/area/crowding
# Tag: Area SecuRT

/v1/securt/instance/{instanceId}/area/crowding:
  post:
    summary: Tạo vùng tụ tập (crowding area)
    operationId: createCrowdingArea
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrowdingAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng tụ tập (crowding area) thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                areaId:
                  type: string
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Tạo vùng tụ tập với ID (crowding area with ID)
    operationId: createCrowdingAreaWithId
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    - name: areaId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrowdingAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng tụ tập (crowding area) thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Vùng đã tồn tại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho vùng crowding
    operationId: createCrowdingAreaOptions
    tags:
    - Area SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
