# API endpoint: /v1/securt/instance/{instanceId}/area/crowdEstimation
# Tag: Area SecuRT

/v1/securt/instance/{instanceId}/area/crowdEstimation:
  post:
    summary: Tạo vùng ước lượng đám đông (crowd estimation area)
    operationId: createCrowdEstimationArea
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrowdEstimationAreaWrite'
    responses:
      '201':
        description: Crowd estimation area created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                areaId:
                  type: string
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Tạo vùng ước lượng đám đông với ID (crowd estimation area with ID)
    operationId: createCrowdEstimationAreaWithId
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    - name: areaId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrowdEstimationAreaWrite'
    responses:
      '201':
        description: Crowd estimation area created successfully
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Area already exists
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for crowd estimation area
    operationId: createCrowdEstimationAreaOptions
    tags:
    - Area SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
