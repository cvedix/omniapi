# API endpoint: /v1/securt/instance/{instanceId}/area/crossing
# Tag: Area SecuRT

/v1/securt/instance/{instanceId}/area/crossing:
  post:
    summary: Tạo vùng vượt (crossing area)
    description: Creates a new crossing area for a SecuRT instance
    operationId: createCrossingArea
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrossingAreaWrite'
    responses:
      '201':
        description: Crossing area created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                areaId:
                  type: string
                  description: Created area ID
                  example: '{Face}'
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Tạo vùng vượt với ID (crossing area with ID)
    description: Creates a crossing area with a specific ID for a SecuRT instance
    operationId: createCrossingAreaWithId
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    - name: areaId
      in: path
      required: true
      schema:
        type: string
      description: Định danh vùng (area ID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrossingAreaWrite'
    responses:
      '201':
        description: Crossing area created successfully
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Area already exists
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight for crossing area
    operationId: createCrossingAreaOptions
    tags:
    - Area SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
