# API endpoint: /v1/securt/instance/{instanceId}/area/intrusion
# Tag: Area SecuRT

/v1/securt/instance/{instanceId}/area/intrusion:
  post:
    summary: Tạo vùng xâm nhập (intrusion area)
    description: Tạo vùng xâm nhập (intrusion area) mới cho instance SecuRT
    operationId: createIntrusionArea
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IntrusionAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng xâm nhập (intrusion area) thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                areaId:
                  type: string
                  example: '{instanceId}'
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Tạo vùng xâm nhập với ID (intrusion area with ID)
    description: Tạo vùng xâm nhập với ID cụ thể cho instance SecuRT
    operationId: createIntrusionAreaWithId
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    - name: areaId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IntrusionAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng xâm nhập (intrusion area) thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Vùng đã tồn tại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho vùng intrusion
    operationId: createIntrusionAreaOptions
    tags:
    - Area SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
