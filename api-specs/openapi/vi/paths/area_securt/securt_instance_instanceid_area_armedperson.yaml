# API endpoint: /v1/securt/instance/{instanceId}/area/armedPerson
# Tag: Area SecuRT

/v1/securt/instance/{instanceId}/area/armedPerson:
  post:
    summary: Tạo vùng người mang vũ khí (armed person area)
    operationId: createArmedPersonArea
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ArmedPersonAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng người mang vũ khí (armed person area) thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                areaId:
                  type: string
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Tạo vùng người mang vũ khí với ID (armed person area with ID)
    operationId: createArmedPersonAreaWithId
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    - name: areaId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ArmedPersonAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng người mang vũ khí (armed person area) thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Vùng đã tồn tại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho vùng armed person
    operationId: createArmedPersonAreaOptions
    tags:
    - Area SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
