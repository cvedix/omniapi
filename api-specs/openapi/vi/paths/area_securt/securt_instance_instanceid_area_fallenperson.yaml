# API endpoint: /v1/securt/instance/{instanceId}/area/fallenPerson
# Tag: Area SecuRT

/v1/securt/instance/{instanceId}/area/fallenPerson:
  post:
    summary: Tạo vùng người ngã (fallen person area)
    operationId: createFallenPersonArea
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FallenPersonAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng người ngã (fallen person area) thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                areaId:
                  type: string
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Tạo vùng người ngã với ID (fallen person area with ID)
    operationId: createFallenPersonAreaWithId
    tags:
    - Area SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
    - name: areaId
      in: path
      required: true
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FallenPersonAreaWrite'
    responses:
      '201':
        description: Đã tạo vùng người ngã (fallen person area) thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Vùng đã tồn tại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho vùng fallen person
    operationId: createFallenPersonAreaOptions
    tags:
    - Area SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
