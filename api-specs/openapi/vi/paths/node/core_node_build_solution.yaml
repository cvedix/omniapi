# API endpoint: /v1/core/node/build-solution
# Tag: Node

/v1/core/node/build-solution:
  post:
    summary: Build solution từ các node
    description: 'Build cấu hình solution từ các node cấu hình sẵn đã chọn.

      Endpoint cho phép tạo solution bằng cách kết hợp nhiều node cấu hình sẵn. Solution được tạo với các node và cấu hình đã chỉ định.'
    operationId: buildSolutionFromNodes
    tags:
    - Node
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - nodes
            properties:
              nodes:
                type: array
                items:
                  type: string
                description: Mảng định danh node đưa vào solution
                example:
                - node1
                - node2
              name:
                type: string
                description: Tên solution
                example: My Custom Solution
              description:
                type: string
                description: Mô tả solution
    responses:
      '201':
        description: Đã build solution thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                solutionId:
                  type: string
                  description: Định danh solution đã tạo (created solution ID)
                message:
                  type: string
                  example: Đã build solution thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho build solution
    operationId: buildSolutionOptions
    tags:
    - Node
    responses:
      '200':
        description: Phản hồi CORS preflight
