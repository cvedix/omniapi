# API endpoint: /v1/core/node/{nodeId}
# Tag: Node

/v1/core/node/{nodeId}:
  get:
    summary: Lấy chi tiết node
    description: Trả về thông tin chi tiết của một node cấu hình sẵn
    operationId: getNode
    tags:
    - Node
    parameters:
    - name: nodeId
      in: path
      required: true
      schema:
        type: string
      description: Định danh node duy nhất
      example: node_a1b2c3d4
    responses:
      '200':
        description: Đã lấy chi tiết node thành công
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeResponse'
            example:
              nodeId: node_rtsp_des_default
              templateId: rtsp_des_template
              displayName: RTSP Destination
              nodeType: rtsp_des
              category: destination
              description: Xuất stream video qua RTSP
              inUse: false
              parameters:
                channel: '0'
                port: '8000'
              requiredParameters:
              - port
              optionalParameters:
              - channel
              - stream_name
              templateDetailUrl: /v1/core/node/template/rtsp_des_template
              input:
              - type: video_frames
                description: Frame video từ node trước
                format: BGR/RGB image frames
              - type: metadata
                description: Metadata từ các node trước
                format: JSON metadata
              output:
              - type: rtsp_stream
                description: Stream video RTSP
                protocol: RTSP
                accessInfo: 'Access via RTSP URL: rtsp://<host>:8000/stream (default: rtsp://localhost:8000/stream)'
                example: rtsp://localhost:8000/stream
                configurableParameters:
                - name: port
                  description: Cổng server RTSP
                  default: '8000'
                  affects: Cổng URL RTSP
                - name: stream_name
                  description: Tên/đường dẫn stream RTSP
                  default: stream
                  affects: Đường dẫn URL RTSP
              createdAt: '2025-12-16T11:33:52Z'
      '404':
        description: Không tìm thấy node
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  put:
    summary: Cập nhật node
    description: 'Cập nhật tham số node. Chỉ node không đang được sử dụng mới có thể cập nhật.

      Lưu ý: Thao tác cập nhật xóa node cũ và tạo node mới với tham số đã cập nhật.

      '
    operationId: updateNode
    tags:
    - Node
    parameters:
    - name: nodeId
      in: path
      required: true
      schema:
        type: string
      description: Định danh node duy nhất
      example: node_a1b2c3d4
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateNodeRequest'
    responses:
      '200':
        description: Đã cập nhật node thành công
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeResponse'
      '400':
        description: Yêu cầu không hợp lệ (thiếu trường parameters)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy node
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Xung đột (node đang được sử dụng)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Xóa node
    description: Xóa node cấu hình sẵn. Chỉ node không đang được sử dụng mới có thể xóa.
    operationId: deleteNode
    tags:
    - Node
    parameters:
    - name: nodeId
      in: path
      required: true
      schema:
        type: string
      description: Định danh node duy nhất
      example: node_a1b2c3d4
    responses:
      '200':
        description: Đã xóa node thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Đã xóa node thành công
                nodeId:
                  type: string
                  example: node_a1b2c3d4
      '404':
        description: Không tìm thấy node
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Xung đột (node đang được sử dụng)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho node
    operationId: getNodeOptions
    tags:
    - Node
    responses:
      '200':
        description: Phản hồi CORS preflight
