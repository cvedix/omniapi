# API endpoint: /v1/core/node/template/{templateId}
# Tag: Node

/v1/core/node/template/{templateId}:
  get:
    summary: Lấy chi tiết template
    description: Trả về thông tin chi tiết của một node template
    operationId: getTemplate
    tags:
    - Node
    parameters:
    - name: templateId
      in: path
      required: true
      schema:
        type: string
      description: Định danh template duy nhất
      example: rtsp_src_template
    responses:
      '200':
        description: Đã lấy chi tiết template thành công
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateResponse'
      '404':
        description: Không tìm thấy template
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho template
    operationId: getTemplateOptions
    tags:
    - Node
    responses:
      '200':
        description: Phản hồi CORS preflight
