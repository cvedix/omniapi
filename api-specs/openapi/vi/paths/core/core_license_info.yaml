# API endpoint: /v1/core/license/info
# Tag: Core

/v1/core/license/info:
  get:
    summary: Lấy thông tin license
    description: Lấy thông tin chi tiết về license hiện tại
    operationId: getLicenseInfo
    tags:
    - Core
    responses:
      '200':
        description: Thông tin license
        content:
          application/json:
            schema:
              type: object
              properties:
                licenseType:
                  type: string
                  description: Type of license
                  example: Standard
                expirationDate:
                  type: string
                  format: date
                  description: License expiration date
                  example: '2024-12-31'
                features:
                  type: array
                  items:
                    type: string
                  description: Enabled license features
                  example:
                  - face_detection
                  - analytics
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho thông tin license
    operationId: getLicenseInfoOptions
    tags:
    - Core
    responses:
      '200':
        description: Phản hồi CORS preflight
