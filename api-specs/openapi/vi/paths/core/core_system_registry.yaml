# API endpoint: /v1/core/system/registry
# Tag: Core

/v1/core/system/registry:
  get:
    summary: Lấy registry key value
    description: Trả về registry key value từ hệ thống
    operationId: coreGetRegistryKeyValueV1
    tags:
    - Core
    parameters:
    - name: key
      in: query
      required: true
      schema:
        type: string
      description: Registry key path
      example: test
    responses:
      '200':
        description: Registry key value
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                test:
                  value_bool: true
                  value_float: 3.14
                  value_int: 42
                  value_string: hello
                system:
                  version: 1.0.0
      '404':
        description: Registry key không tìm thấy
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi server
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho system registry
    operationId: coreSystemRegistryOptions
    tags:
    - Core
    responses:
      '200':
        description: Phản hồi CORS preflight
