# API endpoint: /v1/core/system/status
# Tag: Core

/v1/core/system/status:
  get:
    summary: Lấy trạng thái hệ thống
    description: Trả về trạng thái hệ thống hiện tại bao gồm mức sử dụng CPU, mức sử dụng RAM, tải trung bình và thời gian
      hoạt động
    operationId: getSystemStatus
    tags:
    - Core
    responses:
      '200':
        description: Thông tin trạng thái hệ thống
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemStatusResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho trạng thái hệ thống
    operationId: getSystemStatusOptions
    tags:
    - Core
    responses:
      '200':
        description: Phản hồi CORS preflight
