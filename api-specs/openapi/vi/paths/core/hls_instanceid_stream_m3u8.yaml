# API endpoint: /hls/{instanceId}/stream.m3u8
# Tag: Core

/hls/{instanceId}/stream.m3u8:
  get:
    summary: Lấy playlist HLS
    description: 'Lấy file playlist HLS (HTTP Live Streaming) (.m3u8) cho một instance. Endpoint phục vụ file playlist HLS mà client dùng để phát video từ instance. Playlist chứa tham chiếu tới các segment video (.ts) được tạo tự động.

      '
    operationId: getHlsPlaylist
    tags:
    - Core
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    responses:
      '200':
        description: File playlist HLS
        content:
          application/vnd.apple.mpegurl:
            schema:
              type: string
              example: |
                #EXTM3U
                #EXT-X-VERSION:3
                #EXT-X-TARGETDURATION:10
                #EXTINF:10.0,
                segment_0.ts
                #EXTINF:10.0,
                segment_1.ts
      '404':
        description: Không tìm thấy instance hoặc HLS chưa bật
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
