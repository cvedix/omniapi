# API endpoint: /v1/core/license/check
# Tag: Core

/v1/core/license/check:
  get:
    summary: Kiểm tra tính hợp lệ license
    description: Kiểm tra license có hợp lệ và đang hoạt động hay không
    operationId: checkLicense
    tags:
    - Core
    responses:
      '200':
        description: Kết quả kiểm tra license
        content:
          application/json:
            schema:
              type: object
              properties:
                valid:
                  type: boolean
                  description: Trạng thái tính hợp lệ license
                  example: true
                message:
                  type: string
                  description: Thông báo trạng thái license
                  example: License hợp lệ
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho kiểm tra license
    operationId: checkLicenseOptions
    tags:
    - Core
    responses:
      '200':
        description: Phản hồi CORS preflight
