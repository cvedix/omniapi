# API endpoint: /v1/core/health
# Tag: Core

/v1/core/health:
  get:
    summary: Kiểm tra trạng thái sức khỏe
    description: Trả về trạng thái sức khỏe của dịch vụ API
    operationId: getHealth
    tags:
    - Core
    responses:
      '200':
        description: Dịch vụ đang hoạt động tốt
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthResponse'
            example:
              status: healthy
              timestamp: '2024-01-01T00:00:00.000Z'
              uptime: 3600
              service: edgeos-api
              version: 1.0.0
      '500':
        description: Dịch vụ không hoạt động bình thường
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
