# API endpoint: /v1/securt/instance/{instanceId}/line/tailgating/{lineId}
# Tag: Lines SecuRT

/v1/securt/instance/{instanceId}/line/tailgating/{lineId}:
  put:
    summary: Tạo tailgating line với ID
    description: Tạo đường bám đuôi (tailgating line) với ID chỉ định cho instance SecuRT
    operationId: createTailgatingLineWithId
    tags:
    - Lines SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    - name: lineId
      in: path
      required: true
      schema:
        type: string
      description: Line ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TailgatingLineWrite'
    responses:
      '201':
        description: Tailgating line created successfully
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Line already exists
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho tailgating line với ID
    operationId: createTailgatingLineWithIdOptions
    tags:
    - Lines SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
