# API endpoint: /v1/securt/instance/{instanceId}/line/crossing
# Tag: Lines SecuRT

/v1/securt/instance/{instanceId}/line/crossing:
  post:
    summary: Tạo đường vượt (crossing line)
    description: Tạo đường vượt (crossing line) mới cho instance SecuRT
    operationId: createCrossingLine
    tags:
    - Lines SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrossingLineWrite'
    responses:
      '201':
        description: Đã tạo đường vượt (crossing line) thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                lineId:
                  type: string
                  description: Định danh đường đã tạo
                  example: '{lineId}'
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho crossing line
    operationId: createCrossingLineOptions
    tags:
    - Lines SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
