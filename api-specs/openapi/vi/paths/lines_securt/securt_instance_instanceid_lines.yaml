# API endpoint: /v1/securt/instance/{instanceId}/lines
# Tag: Lines SecuRT

/v1/securt/instance/{instanceId}/lines:
  get:
    summary: Lấy các đường phân tích (analytics lines) của instance SecuRT
    description: Trả về tất cả đường phân tích (analytics lines) đã cấu hình cho instance SecuRT, gồm crossing lines, counting lines,
      and tailgating lines.
    operationId: getSecuRTLines
    tags:
    - Lines SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    responses:
      '200':
        description: Đã lấy đường analytics thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                crossing:
                  type: array
                  description: Đường vượt (crossing lines)
                  items:
                    type: object
                counting:
                  type: array
                  description: Đường đếm (counting lines)
                  items:
                    type: object
                tailgating:
                  type: array
                  description: Đường bám đuôi (tailgating lines)
                  items:
                    type: object
            example:
              crossing: []
              counting: []
              tailgating: []
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Xóa tất cả lines của instance SecuRT
    description: Xóa tất cả đường phân tích (analytics lines) của instance SecuRT
    operationId: deleteAllSecuRTLines
    tags:
    - Lines SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    responses:
      '204':
        description: Đã xóa tất cả lines thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho lines
    operationId: getSecuRTLinesOptions
    tags:
    - Lines SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
