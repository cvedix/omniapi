# API endpoint: /v1/securt/instance/{instanceId}/line/counting
# Tag: Lines SecuRT

/v1/securt/instance/{instanceId}/line/counting:
  post:
    summary: Tạo đường đếm (counting line)
    description: Tạo đường đếm (counting line) mới cho instance SecuRT
    operationId: createCountingLine
    tags:
    - Lines SecuRT
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CountingLineWrite'
    responses:
      '201':
        description: Đã tạo đường đếm thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                lineId:
                  type: string
                  description: Định danh đường đã tạo
                  example: '{lineId}'
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho counting line
    operationId: createCountingLineOptions
    tags:
    - Lines SecuRT
    responses:
      '200':
        description: Phản hồi CORS preflight
