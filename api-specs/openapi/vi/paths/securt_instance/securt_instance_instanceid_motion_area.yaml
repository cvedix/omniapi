# API endpoint: /v1/securt/instance/{instanceId}/motion_area
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/motion_area:
  post:
    summary: Thiết lập vùng chuyển động (motion area)
    description: Cấu hình vùng phát hiện chuyển động (motion area) cho instance SecuRT
    operationId: setMotionArea
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - coordinates
            properties:
              coordinates:
                type: array
                items:
                  type: object
                  properties:
                    x:
                      type: number
                    y:
                      type: number
                description: Array of coordinates defining the motion area polygon
                example:
                - x: 0
                  y: 0
                - x: 100
                  y: 0
                - x: 100
                  y: 100
                - x: 0
                  y: 100
    responses:
      '204':
        description: Motion area configured successfully
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho motion area
    operationId: motionAreaOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
