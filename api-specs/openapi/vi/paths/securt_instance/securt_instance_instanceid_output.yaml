# API endpoint: /v1/securt/instance/{instanceId}/output
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/output:
  post:
    summary: Thiết lập đích đầu ra cho instance SecuRT
    description: 'Cấu hình đích đầu ra cho instance SecuRT. Hỗ trợ MQTT, RTMP, RTSP, HLS. Instance đang chạy sẽ được khởi động lại để áp dụng. Có thể gọi nhiều lần để cấu hình nhiều output; cấu hình lưu trong AdditionalParams của instance.

      '
    operationId: setSecuRTInstanceOutput
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecuRTOutputRequest'
          examples:
            mqttOutput:
              summary: MQTT output
              value:
                type: MQTT
                broker: localhost
                port: '1883'
                topic: securt/detections
            rtmpOutput:
              summary: RTMP output
              value:
                type: RTMP
                uri: rtmp://live.example.com/live/stream_key
            rtspOutput:
              summary: RTSP output
              value:
                type: RTSP
                uri: rtsp://localhost:8554/stream
            hlsOutput:
              summary: HLS output
              value:
                type: HLS
                uri: hls://localhost:8080/hls/stream
    responses:
      '204':
        description: Đã cập nhật cấu hình output thành công
      '400':
        description: Yêu cầu không hợp lệ (loại output sai hoặc thiếu trường bắt buộc)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho output
    operationId: setSecuRTInstanceOutputOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
