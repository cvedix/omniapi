# API endpoint: /v1/securt/instance/{instanceId}/feature_extraction
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/feature_extraction:
  post:
    summary: Thiết lập feature extraction
    description: Cấu hình các loại feature extraction cho instance SecuRT
    operationId: setFeatureExtraction
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - types
            properties:
              types:
                type: array
                items:
                  type: string
                description: Mảng loại trích xuất đặc trưng
                example:
                - face
                - body
    responses:
      '204':
        description: Đã cấu hình trích xuất đặc trưng thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  get:
    summary: Lấy cấu hình feature extraction
    description: Lấy các loại feature extraction đã cấu hình của instance SecuRT
    operationId: getFeatureExtraction
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    responses:
      '200':
        description: Cấu hình trích xuất đặc trưng
        content:
          application/json:
            schema:
              type: object
              properties:
                types:
                  type: array
                  items:
                    type: string
                  description: Mảng loại trích xuất đặc trưng đã cấu hình
                  example:
                  - face
                  - body
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho feature extraction
    operationId: featureExtractionOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
