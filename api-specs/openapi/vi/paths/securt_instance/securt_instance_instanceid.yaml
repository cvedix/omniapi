# API endpoint: /v1/securt/instance/{instanceId}
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}:
  put:
    summary: Tạo instance SecuRT với ID chỉ định
    description: Tạo instance SecuRT với ID chỉ định. Nếu instance đã tồn tại sẽ trả về lỗi conflict.
    operationId: createSecuRTInstanceWithId
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecuRTInstanceWrite'
          example:
            name: My SecuRT Instance
            detectorMode: SmartDetection
            detectionSensitivity: Low
            movementSensitivity: Low
            sensorModality: RGB
            frameRateLimit: 0
            metadataMode: false
            statisticsMode: false
            diagnosticsMode: false
            debugMode: false
    responses:
      '201':
        description: Đã tạo instance thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                instanceId:
                  type: string
                  description: ID của instance đã tạo
                  example: securt-instance-123
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Instance đã tồn tại
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  patch:
    summary: Cập nhật instance SecuRT
    description: Cập nhật instance SecuRT với cấu hình cung cấp. Chỉ các trường được gửi lên mới được cập nhật.
    operationId: updateSecuRTInstance
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecuRTInstanceWrite'
          example:
            name: Updated Instance Name
            detectorMode: Detection
            detectionSensitivity: Medium
    responses:
      '204':
        description: Đã cập nhật instance thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Xóa instance SecuRT
    description: Xóa instance SecuRT. Instance phải tồn tại.
    operationId: deleteSecuRTInstance
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    responses:
      '204':
        description: Instance deleted successfully
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho thao tác instance
    operationId: securtInstanceOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
