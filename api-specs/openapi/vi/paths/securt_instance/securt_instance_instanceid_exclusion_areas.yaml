# API endpoint: /v1/securt/instance/{instanceId}/exclusion_areas
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/exclusion_areas:
  post:
    summary: Thêm vùng loại trừ (exclusion area)
    description: Thêm vùng loại trừ (exclusion area) vào instance SecuRT để loại một số vùng khỏi phân tích
    operationId: addExclusionArea
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - coordinates
            properties:
              coordinates:
                type: array
                items:
                  type: object
                  properties:
                    x:
                      type: number
                    y:
                      type: number
                description: Array of coordinates defining the exclusion area polygon
                example:
                - x: 0
                  y: 0
                - x: 100
                  y: 0
                - x: 100
                  y: 100
                - x: 0
                  y: 100
    responses:
      '204':
        description: Đã thêm vùng loại trừ thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  get:
    summary: Lấy danh sách vùng loại trừ (exclusion areas)
    description: Lấy tất cả vùng loại trừ (exclusion areas) của instance SecuRT
    operationId: getExclusionAreas
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    responses:
      '200':
        description: Danh sách vùng loại trừ (exclusion areas)
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  coordinates:
                    type: array
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  delete:
    summary: Xóa tất cả vùng loại trừ (exclusion areas)
    description: Xóa tất cả vùng loại trừ của instance SecuRT
    operationId: deleteExclusionAreas
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    responses:
      '204':
        description: Đã xóa tất cả vùng loại trừ thành công
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho exclusion areas
    operationId: exclusionAreasOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
