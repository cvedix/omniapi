# API endpoint: /v1/securt/instance/{instanceId}/lpr
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/lpr:
  post:
    summary: Thiết lập nhận diện biển số (LPR)
    description: Bật hoặc tắt nhận diện biển số (LPR) cho instance SecuRT
    operationId: setLPR
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enable
            properties:
              enable:
                type: boolean
                description: Bật nhận diện biển số
                example: true
    responses:
      '204':
        description: Đã cấu hình LPR thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  get:
    summary: Lấy cấu hình nhận diện biển số (LPR)
    description: Lấy cấu hình LPR của instance SecuRT
    operationId: getLPR
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    responses:
      '200':
        description: Cấu hình LPR
        content:
          application/json:
            schema:
              type: object
              properties:
                enable:
                  type: boolean
                  description: Trạng thái bật LPR
                  example: true
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho LPR
    operationId: lprOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
