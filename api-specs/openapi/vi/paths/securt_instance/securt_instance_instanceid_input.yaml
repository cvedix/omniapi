# API endpoint: /v1/securt/instance/{instanceId}/input
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/input:
  post:
    summary: Thiết lập nguồn đầu vào cho instance SecuRT
    description: 'Thiết lập nguồn đầu vào cho instance SecuRT. Hỗ trợ File, RTSP, RTMP, HLS. Instance phải tồn tại; nếu đang chạy sẽ được khởi động lại để áp dụng thay đổi.

      '
    operationId: setSecuRTInstanceInput
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecuRTInputRequest'
          examples:
            rtspInput:
              summary: RTSP input from camera
              value:
                type: RTSP
                uri: rtsp://192.168.1.100:554/stream1
                additionalParams:
                  RTSP_TRANSPORT: tcp
                  GST_DECODER_NAME: avdec_h264
            fileInput:
              summary: Video file input
              value:
                type: File
                uri: ./test_video.mp4
            rtmpInput:
              summary: RTMP stream input
              value:
                type: RTMP
                uri: rtmp://live.example.com/live/stream
            hlsInput:
              summary: HLS stream input
              value:
                type: HLS
                uri: http://example.com/stream.m3u8
    responses:
      '204':
        description: Đã cập nhật cấu hình input thành công
      '400':
        description: Yêu cầu không hợp lệ (loại input sai hoặc thiếu trường bắt buộc)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho input
    operationId: setSecuRTInstanceInputOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
