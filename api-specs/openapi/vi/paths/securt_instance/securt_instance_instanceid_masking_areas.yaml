# API endpoint: /v1/securt/instance/{instanceId}/masking_areas
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/masking_areas:
  post:
    summary: Thiết lập vùng che (masking areas)
    description: Cấu hình vùng che (masking areas) cho instance SecuRT để ẩn một số vùng khỏi xử lý
    operationId: setMaskingAreas
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - areas
            properties:
              areas:
                type: array
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      x:
                        type: number
                      y:
                        type: number
                description: Mảng đa giác vùng che (masking area), mỗi đa giác là mảng tọa độ
                example:
                - - x: 0
                    y: 0
                  - x: 100
                    y: 0
                  - x: 100
                    y: 100
                  - x: 0
                    y: 100
    responses:
      '204':
        description: Đã cấu hình vùng che (masking areas) thành công
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho masking areas
    operationId: maskingAreasOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
