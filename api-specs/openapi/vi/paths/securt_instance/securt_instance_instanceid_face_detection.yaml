# API endpoint: /v1/securt/instance/{instanceId}/face_detection
# Tag: SecuRT Instance

/v1/securt/instance/{instanceId}/face_detection:
  post:
    summary: Thiết lập face detection
    description: Bật hoặc tắt nhận diện khuôn mặt (face detection) cho instance SecuRT
    operationId: setFaceDetection
    tags:
    - SecuRT Instance
    parameters:
    - name: instanceId
      in: path
      required: true
      schema:
        type: string
      description: Định danh instance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - enable
            properties:
              enable:
                type: boolean
                description: Enable face detection
                example: true
    responses:
      '204':
        description: Face detection configured successfully
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Không tìm thấy instance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho face detection
    operationId: faceDetectionOptions
    tags:
    - SecuRT Instance
    responses:
      '200':
        description: Phản hồi CORS preflight
