# API endpoint: /v1/recognition/subjects/{subject}
# Tag: Recognition

/v1/recognition/subjects/{subject}:
  put:
    summary: Đổi tên face subject
    description: "Đổi tên một face subject có sẵn. Endpoint tìm tên subject trong face database và cho phép đổi tên.\n\n**Cách hoạt động:** 1. Endpoint tìm tên subject trong đường dẫn URL (`{subject}`) trong face database. 2. Nếu tìm thấy, đổi tên subject sang tên mới trong body. 3. Mọi đăng ký face gắn với tên cũ được cập nhật sang tên mới.\n\n**Hành vi:** Nếu tên subject mới chưa tồn tại, mọi khuôn mặt từ subject cũ được chuyển sang tên mới. Nếu tên mới đã tồn tại, các subject được gộp (embedding trung bình, mọi face của subject cũ gán sang subject tên mới, subject cũ bị xóa). Mọi ánh xạ image_id được cập nhật tự động. File face database được cập nhật để lưu thay đổi.\n\n**Lưu ý:** Tên subject trong đường dẫn URL phải khớp chính xác với một tên trong database. Dùng GET /v1/recognition/faces để liệt kê tất cả subject. Endpoint có từ phiên bản 0.6."
    operationId: renameSubject
    tags:
    - Recognition
    parameters:
    - name: subject
      in: path
      required: true
      schema:
        type: string
      description: 'Tên subject hiện tại cần đổi. Phải khớp chính xác với một tên trong face database. Dùng GET /v1/recognition/faces để xem tất cả subject.'

      example: subject1
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RenameSubjectRequest'
          example:
            subject: testing_face
    responses:
      '200':
        description: Đã đổi tên subject thành công
        content:
          application/json:
            schema:
              type: object
              required:
              - updated
              - old_subject
              - new_subject
              - message
              properties:
                updated:
                  type: string
                  enum:
                  - 'true'
                  description: Cho biết thao tác thành công
                old_subject:
                  type: string
                  description: Tên subject gốc
                  example: subject1
                new_subject:
                  type: string
                  description: Tên subject mới
                  example: testing_face
                message:
                  type: string
                  description: Thông báo thành công
                  example: Đã đổi tên subject thành công
            example:
              updated: 'true'
              old_subject: subject1
              new_subject: testing_face
              message: Đã đổi tên subject thành công
      '400':
        description: Yêu cầu không hợp lệ (không tìm thấy subject, thiếu subject, JSON không hợp lệ, v.v.)
        content:
          application/json:
            schema:
              type: object
              required:
              - updated
              - error
              - old_subject
              properties:
                updated:
                  type: string
                  enum:
                  - 'false'
                  description: Cho biết thao tác thất bại
                error:
                  type: string
                  description: Thông báo lỗi giải thích vì sao đổi tên thất bại
                  example: Không tìm thấy subject 'subject1' trong face database
                old_subject:
                  type: string
                  description: Tên subject đã thử đổi
                  example: subject1
            example:
              updated: 'false'
              error: Không tìm thấy subject 'subject1' trong face database
              old_subject: subject1
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho đổi tên subject
    operationId: renameSubjectOptions
    tags:
    - Recognition
    responses:
      '200':
        description: Phản hồi CORS preflight
