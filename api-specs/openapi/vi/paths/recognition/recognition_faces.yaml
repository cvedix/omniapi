# API endpoint: /v1/recognition/faces
# Tag: Recognition

/v1/recognition/faces:
  get:
    summary: Liệt kê face subject
    description: 'Lấy danh sách tất cả face subject đã lưu, có hỗ trợ phân trang.

      Có thể lọc theo tên subject hoặc lấy tất cả subject. Endpoint này trả về kết quả phân trang gồm image_id và tên subject.'

    operationId: listFaceSubjects
    tags:
    - Recognition
    parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Số trang mẫu cần trả về. Dùng cho phân trang. Giá trị mặc định 0.
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Số khuôn mặt mỗi trang (kích thước trang). Dùng cho phân trang. Giá trị mặc định 20.
      example: 20
    - name: subject
      in: query
      required: false
      schema:
        type: string
      description: Chỉ định subject mẫu cần trả về. Để trống thì trả về mẫu của mọi subject.
      example: subject1
    responses:
      '200':
        description: Đã lấy danh sách face subject thành công
        content:
          application/json:
            schema:
              type: object
              required:
              - faces
              - page_number
              - page_size
              - total_pages
              - total_elements
              properties:
                faces:
                  type: array
                  description: Danh sách face subject
                  items:
                    type: object
                    required:
                    - image_id
                    - subject
                    properties:
                      image_id:
                        type: string
                        format: uuid
                        description: Định danh duy nhất của khuôn mặt
                        example: '{Edge}'
                      subject:
                        type: string
                        description: Subject (người) gắn với ảnh đã lưu
                        example: subject1
                page_number:
                  type: integer
                  description: Số trang hiện tại
                  example: 0
                page_size:
                  type: integer
                  description: Kích thước trang yêu cầu
                  example: 20
                total_pages:
                  type: integer
                  description: Tổng số trang có sẵn
                  example: 2
                total_elements:
                  type: integer
                  description: Tổng số khuôn mặt có sẵn
                  example: 12
            example:
              faces:
              - image_id: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                subject: subject1
              - image_id: 7c246g6c-b476-5633-c2g2-5d0bd3ee1839
                subject: subject1
              page_number: 0
              page_size: 20
              total_pages: 2
              total_elements: 12
      '401':
        description: Chưa xác thực (thiếu hoặc API key không hợp lệ)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Đăng ký face subject
    description: 'Đăng ký face subject bằng cách lưu ảnh. Có thể thêm nhiều ảnh để huấn luyện hệ thống.

      Ảnh nên chỉ chứa một khuôn mặt. **Xác thực phát hiện khuôn mặt:** Trước khi đăng ký, hệ thống thực hiện phát hiện khuôn mặt bắt buộc. Nếu không phát hiện khuôn mặt trong ảnh tải lên, đăng ký sẽ bị từ chối với lỗi 400. Người dùng cần tải lên ảnh khác có khuôn mặt rõ, có thể phát hiện. Endpoint này chấp nhận dữ liệu ảnh theo hai định dạng: 1) **Multipart/form-data**: Tải file trực tiếp (khuyến nghị); 2) **Application/json**: Gửi chuỗi ảnh mã hóa Base64. Định dạng ảnh hỗ trợ: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP. Kích thước file tối đa: 5MB. Hệ thống sẽ phát hiện khuôn mặt trong ảnh và lưu đặc trưng khuôn mặt để nhận diện.'

    operationId: registerFaceSubject
    tags:
    - Recognition
    parameters:
    - name: subject
      in: query
      required: true
      schema:
        type: string
      description: Tên subject cần đăng ký (vd. \"subject1\")
      example: subject1
    - name: det_prob_threshold
      in: query
      required: false
      schema:
        type: number
        format: float
        default: 0.5
      description: Ngưỡng xác suất nhận diện (0.0 đến 1.0)
      example: 0.5
    requestBody:
      required: true
      description: 'Image data can be sent in two formats:

        1. Multipart/form-data: Upload file directly (recommended for file uploads)

        2. Application/json: Send base64-encoded image string


        Supported image formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP

        Maximum file size: 5MB

        '
      content:
        multipart/form-data:
          schema:
            type: object
            required:
            - file
            properties:
              file:
                type: string
                format: binary
                description: 'Image file to upload. Supported formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP. Max size:
                  5MB'
        application/json:
          schema:
            type: object
            required:
            - file
            properties:
              file:
                type: string
                description: 'Base64-encoded image data. Supported formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP. Max
                  size: 5MB'
                example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
          example:
            file: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
    responses:
      '200':
        description: Đã đăng ký face subject thành công
        content:
          application/json:
            schema:
              type: object
              required:
              - image_id
              - subject
              properties:
                image_id:
                  type: string
                  format: uuid
                  description: Định danh duy nhất của ảnh đã đăng ký
                  example: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                subject:
                  type: string
                  description: Tên subject đã đăng ký
                  example: subject1
            example:
              image_id: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
              subject: subject1
      '400':
        description: 'Yêu cầu không hợp lệ. Có thể do:

          - Thiếu tham số truy vấn bắt buộc: subject

          - Invalid image format or corrupted image data

          - No face detected in the uploaded image (registration will be rejected)

          - Face detected but confidence below threshold

          '
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Chưa xác thực (thiếu hoặc API key không hợp lệ)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho đăng ký face subject
    operationId: registerFaceSubjectOptions
    tags:
    - Recognition
    responses:
      '200':
        description: Phản hồi CORS preflight
