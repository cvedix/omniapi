# API endpoint: /v1/recognition/faces
# Tag: Recognition

/v1/recognition/faces:
  get:
    summary: Liệt kê face subject
    description: 'Lấy danh sách tất cả face subject đã lưu, có hỗ trợ phân trang.

      You can filter by subject name or retrieve all subjects.


      This endpoint returns paginated results with face information including image_id and subject name.

      '
    operationId: listFaceSubjects
    tags:
    - Recognition
    parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Page number of examples to return. Used for pagination. Default value is 0.
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of faces per page (page size). Used for pagination. Default value is 20.
      example: 20
    - name: subject
      in: query
      required: false
      schema:
        type: string
      description: Specifies the subject examples to return. If empty, returns examples for all subjects.
      example: subject1
    responses:
      '200':
        description: Đã lấy danh sách face subject thành công
        content:
          application/json:
            schema:
              type: object
              required:
              - faces
              - page_number
              - page_size
              - total_pages
              - total_elements
              properties:
                faces:
                  type: array
                  description: Danh sách face subject
                  items:
                    type: object
                    required:
                    - image_id
                    - subject
                    properties:
                      image_id:
                        type: string
                        format: uuid
                        description: Unique identifier of the face
                        example: '{Edge}'
                      subject:
                        type: string
                        description: Subject (person) associated with the saved image
                        example: subject1
                page_number:
                  type: integer
                  description: Current page number
                  example: 0
                page_size:
                  type: integer
                  description: Requested page size
                  example: 20
                total_pages:
                  type: integer
                  description: Total number of pages available
                  example: 2
                total_elements:
                  type: integer
                  description: Total number of faces available
                  example: 12
            example:
              faces:
              - image_id: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                subject: subject1
              - image_id: 7c246g6c-b476-5633-c2g2-5d0bd3ee1839
                subject: subject1
              page_number: 0
              page_size: 20
              total_pages: 2
              total_elements: 12
      '401':
        description: Unauthorized (missing or invalid API key)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  post:
    summary: Đăng ký face subject
    description: 'Đăng ký face subject bằng cách lưu ảnh. Có thể thêm nhiều ảnh để huấn luyện hệ thống.

      Images should contain only a single face.


      **Face Detection Validation**: Before registration, the system performs mandatory face detection.

      If no face is detected in the uploaded image, the registration will be rejected with a 400 error.

      The user must upload a different image that contains a clear, detectable face.


      This endpoint accepts image data in two formats:

      1. **Multipart/form-data**: Upload file directly (recommended for file uploads)

      2. **Application/json**: Send base64-encoded image string


      Supported image formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP

      Maximum file size: 5MB


      The system will detect the face in the image and store the face features for recognition.

      '
    operationId: registerFaceSubject
    tags:
    - Recognition
    parameters:
    - name: subject
      in: query
      required: true
      schema:
        type: string
      description: Subject name to register (e.g., "subject1")
      example: subject1
    - name: det_prob_threshold
      in: query
      required: false
      schema:
        type: number
        format: float
        default: 0.5
      description: Detection probability threshold (0.0 to 1.0)
      example: 0.5
    requestBody:
      required: true
      description: 'Image data can be sent in two formats:

        1. Multipart/form-data: Upload file directly (recommended for file uploads)

        2. Application/json: Send base64-encoded image string


        Supported image formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP

        Maximum file size: 5MB

        '
      content:
        multipart/form-data:
          schema:
            type: object
            required:
            - file
            properties:
              file:
                type: string
                format: binary
                description: 'Image file to upload. Supported formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP. Max size:
                  5MB'
        application/json:
          schema:
            type: object
            required:
            - file
            properties:
              file:
                type: string
                description: 'Base64-encoded image data. Supported formats: JPEG, JPG, PNG, BMP, GIF, ICO, TIFF, WebP. Max
                  size: 5MB'
                example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
          example:
            file: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
    responses:
      '200':
        description: Face subject registered successfully
        content:
          application/json:
            schema:
              type: object
              required:
              - image_id
              - subject
              properties:
                image_id:
                  type: string
                  format: uuid
                  description: Unique identifier for the registered image
                  example: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                subject:
                  type: string
                  description: Subject name that was registered
                  example: subject1
            example:
              image_id: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
              subject: subject1
      '400':
        description: 'Invalid request. Possible reasons:

          - Missing required query parameter: subject

          - Invalid image format or corrupted image data

          - No face detected in the uploaded image (registration will be rejected)

          - Face detected but confidence below threshold

          '
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized (missing or invalid API key)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho đăng ký face subject
    operationId: registerFaceSubjectOptions
    tags:
    - Recognition
    responses:
      '200':
        description: Phản hồi CORS preflight
