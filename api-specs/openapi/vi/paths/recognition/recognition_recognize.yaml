# API endpoint: /v1/recognition/recognize
# Tag: Recognition

/v1/recognition/recognize:
  post:
    summary: Nhận diện khuôn mặt từ ảnh tải lên
    description: 'Nhận diện khuôn mặt từ ảnh tải lên. Ảnh có thể gửi dạng base64

      in a multipart/form-data request. Returns face detection results including bounding boxes,

      landmarks, recognized subjects, and execution times.

      '
    operationId: recognizeFaces
    tags:
    - Recognition
    parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 0
      description: Số khuôn mặt tối đa cần nhận diện (0 = không giới hạn). Ưu tiên nhận diện khuôn mặt lớn nhất trước.
    - name: prediction_count
      in: query
      required: false
      schema:
        type: integer
        default: 1
      description: Số dự đoán trả về cho mỗi khuôn mặt
    - name: det_prob_threshold
      in: query
      required: false
      schema:
        type: number
        format: float
        default: 0.5
      description: Ngưỡng xác suất nhận diện (0.0 đến 1.0)
    - name: threshold
      in: query
      required: false
      schema:
        type: number
        format: float
      description: Ngưỡng độ tương đồng tùy chọn (0.0 đến 1.0). Nếu có, subject có độ tương đồng dưới ngưỡng sẽ bị lọc bỏ. Nếu bỏ qua, trả về top-N độ tương đồng không lọc.
    - name: face_plugins
      in: query
      required: false
      schema:
        type: string
      description: Các face plugin cần bật (phân tách bằng dấu phẩy)
    - name: status
      in: query
      required: false
      schema:
        type: string
      description: Bộ lọc trạng thái
    - name: detect_faces
      in: query
      required: false
      schema:
        type: boolean
        default: true
      description: Có phát hiện khuôn mặt (true) hay chỉ nhận diện khuôn mặt đã có (false)
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
            - file
            properties:
              file:
                type: string
                format: binary
                description: File ảnh dạng base64 hoặc dữ liệu nhị phân
    responses:
      '200':
        description: Kết quả nhận diện khuôn mặt
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: array
                  items:
                    $ref: '#/components/schemas/FaceRecognitionResult'
            example:
              result:
              - box:
                  probability: 1.0
                  x_max: 1420
                  y_max: 1368
                  x_min: 548
                  y_min: 295
                landmarks:
                - - 814
                  - 713
                - - 1104
                  - 829
                - - 832
                  - 937
                - - 704
                  - 1030
                - - 1017
                  - 1133
                subjects:
                - similarity: 0.97858
                  subject: subject1
                execution_time:
                  age: 28.0
                  gender: 26.0
                  detector: 117.0
                  calculator: 45.0
                  mask: 36.0
      '400':
        description: Yêu cầu không hợp lệ (thiếu file, định dạng ảnh không hợp lệ, v.v.)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Chưa xác thực (thiếu hoặc API key không hợp lệ)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho face recognition
    operationId: recognizeFacesOptions
    tags:
    - Recognition
    responses:
      '200':
        description: Phản hồi CORS preflight
