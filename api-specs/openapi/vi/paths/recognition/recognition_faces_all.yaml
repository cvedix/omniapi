# API endpoint: /v1/recognition/faces/all
# Tag: Recognition

/v1/recognition/faces/all:
  delete:
    summary: Xóa tất cả face subject
    description: 'Xóa tất cả face subject khỏi database. Thao tác không thể hoàn tác.

      Mọi image ID và ánh xạ subject sẽ bị xóa. **Cảnh báo:** Endpoint này sẽ xóa tất cả khuôn mặt đã đăng ký. Dùng với thận trọng.'

    operationId: deleteAllFaceSubjects
    tags:
    - Recognition
    responses:
      '200':
        description: Đã xóa tất cả face subject thành công
        content:
          application/json:
            schema:
              type: object
              required:
              - deleted_count
              - message
              properties:
                deleted_count:
                  type: integer
                  description: Tổng số face subject đã xóa
                  example: 15
                message:
                  type: string
                  description: Thông báo thành công
                  example: Đã xóa tất cả face subject thành công
            example:
              deleted_count: 15
              message: All face subjects deleted successfully
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho xóa tất cả face subject
    operationId: deleteAllFaceSubjectsOptions
    tags:
    - Recognition
    responses:
      '200':
        description: Phản hồi CORS preflight
