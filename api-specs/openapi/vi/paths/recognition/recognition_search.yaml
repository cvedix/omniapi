# API endpoint: /v1/recognition/search
# Tag: Recognition

/v1/recognition/search:
  post:
    summary: Tìm kiếm appearance subject
    description: 'Tìm khuôn mặt tương tự trong database từ ảnh khuôn mặt đầu vào.

      Returns a list of matching faces sorted by similarity (highest first) above the specified threshold.


      **How it works:**

      1. Detects faces in the uploaded image

      2. Extracts face embeddings from the first detected face

      3. Compares with all faces in the database

      4. Returns matches with similarity >= threshold, sorted from highest to lowest


      **Response fields:**

      - `image_id`: Unique identifier of the matched face

      - `subject`: Name of the matched subject

      - `similarity`: Cosine similarity score (0.0 - 1.0)

      - `face_image`: Base64 encoded face image (reserved for future use)

      '
    operationId: searchAppearanceSubject
    tags:
    - Recognition
    parameters:
    - name: threshold
      in: query
      required: false
      schema:
        type: number
        format: float
        default: 0.5
        minimum: 0.0
        maximum: 1.0
      description: Minimum similarity threshold for matches (0.0 - 1.0)
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Maximum number of results to return (0 = no limit)
    - name: det_prob_threshold
      in: query
      required: false
      schema:
        type: number
        format: float
        default: 0.5
        minimum: 0.0
        maximum: 1.0
      description: Face detection probability threshold
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
                description: Image file containing a face to search
            required:
            - file
        application/json:
          schema:
            type: object
            properties:
              file:
                type: string
                format: base64
                description: Base64 encoded image data
            required:
            - file
    responses:
      '200':
        description: Search results
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: array
                  items:
                    type: object
                    properties:
                      image_id:
                        type: string
                        description: Unique identifier of the matched face
                      subject:
                        type: string
                        description: Name of the matched subject
                      similarity:
                        type: number
                        format: float
                        description: Cosine similarity score (0.0 - 1.0)
                      face_image:
                        type: string
                        description: Base64 encoded face image (reserved for future use)
                faces_found:
                  type: integer
                  description: Number of matching faces found
                threshold:
                  type: number
                  format: float
                  description: Threshold used for search
            example:
              result:
              - image_id: abc123-def456-ghi789
                subject: John Doe
                similarity: 0.95
                face_image: ''
              - image_id: xyz789-uvw456-rst123
                subject: Jane Smith
                similarity: 0.82
                face_image: ''
              faces_found: 2
              threshold: 0.5
      '400':
        description: Yêu cầu không hợp lệ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho tìm kiếm appearance subject
    operationId: searchAppearanceSubjectOptions
    tags:
    - Recognition
    responses:
      '200':
        description: Phản hồi CORS preflight
