# API endpoint: /v1/recognition/faces/delete
# Tag: Recognition

/v1/recognition/faces/delete:
  post:
    summary: Xóa nhiều face subject
    description: 'Xóa nhiều face subject theo image ID. Các ID không tồn tại sẽ bị bỏ qua. Endpoint có từ phiên bản 1.0.'

    operationId: deleteMultipleFaceSubjects
    tags:
    - Recognition
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            items:
              type: string
              format: uuid
            description: Mảng image ID cần xóa
          example:
          - 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
          - 7c246g6c-b476-5633-c2g2-5d0bd3ee1839
    responses:
      '200':
        description: Đã xóa face subject thành công
        content:
          application/json:
            schema:
              type: object
              required:
              - deleted
              properties:
                deleted:
                  type: array
                  description: Mảng face subject đã xóa
                  items:
                    type: object
                    required:
                    - image_id
                    - subject
                    properties:
                      image_id:
                        type: string
                        format: uuid
                        description: UUID của face subject đã xóa
                        example: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                      subject:
                        type: string
                        description: Tên người gắn với khuôn mặt đã xóa
                        example: subject1
            example:
              deleted:
              - image_id: 6b135f5b-a365-4522-b1f1-4c9ac2dd0728
                subject: subject1
              - image_id: 7c246g6c-b476-5633-c2g2-5d0bd3ee1839
                subject: subject2
      '400':
        description: Yêu cầu không hợp lệ (JSON không hợp lệ, không phải mảng, v.v.)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Chưa xác thực (thiếu hoặc API key không hợp lệ)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Lỗi máy chủ
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  options:
    summary: CORS preflight cho xóa nhiều face subject
    operationId: deleteMultipleFaceSubjectsOptions
    tags:
    - Recognition
    responses:
      '200':
        description: Phản hồi CORS preflight
